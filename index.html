<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | Все животные + Huge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(46, 34, 59, 0.95), rgba(26, 15, 36, 0.95));
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        .game-container[data-theme="forest"] { background: linear-gradient(135deg, rgba(30, 50, 30, 0.95), rgba(15, 30, 15, 0.95)); border-color: #4caf50; }
        .game-container[data-theme="volcano"] { background: linear-gradient(135deg, rgba(70, 35, 20, 0.95), rgba(45, 20, 10, 0.95)); border-color: #ff5722; }
        .game-container[data-theme="ice"] { background: linear-gradient(135deg, rgba(30, 55, 75, 0.95), rgba(15, 35, 50, 0.95)); border-color: #00bcd4; }
        .game-container[data-theme="sky"] { background: linear-gradient(135deg, rgba(40, 45, 85, 0.95), rgba(25, 30, 65, 0.95)); border-color: #ffd700; }
        .game-container[data-theme="hell"] { background: linear-gradient(135deg, rgba(70, 25, 40, 0.95), rgba(45, 15, 25, 0.95)); border-color: #ff3366; }
        .game-container[data-theme="paradise"] { background: linear-gradient(135deg, rgba(80, 45, 100, 0.95), rgba(55, 30, 75, 0.95)); border-color: #ff88ff; }

        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .resource-icon { font-size: 40px; }
        .resource-info { flex: 1; }
        .resource-name { color: rgba(255,255,255,0.7); font-size: 12px; text-transform: uppercase; }
        .resource-value { color: #ffd700; font-size: 24px; font-weight: bold; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 968px) { .main-layout { grid-template-columns: 1fr; } }

        .pet-area {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .pet-area:active { transform: scale(0.98); }
        .current-pet { font-size: 120px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .pet-name { font-size: 24px; font-weight: bold; color: #2a1a3a; margin-top: 10px; }
        .pet-power { color: #ff6600; font-size: 18px; margin-top: 5px; }

        .slots-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .slots-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .slot-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            min-width: 100px;
        }

        .slot-card.unlocked { border-color: #ffd700; background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2)); }
        .slot-number { font-size: 24px; font-weight: bold; color: #ffd700; }
        .slot-pet-emoji { font-size: 32px; margin-top: 5px; }

        .location-selector {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .location-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
        }

        .location-nav {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .location-info { flex: 1; text-align: center; }
        .location-name { font-size: 18px; font-weight: bold; color: #ffd700; }
        .location-multiplier { font-size: 12px; color: rgba(255,255,255,0.7); }
        .location-progress { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .location-progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ff8800); width: 0%; transition: width 0.3s; }

        .eggs-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .eggs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .egg-bulk-buttons {
            display: flex;
            gap: 10px;
        }

        .bulk-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            color: #ffd700;
            transition: all 0.3s;
        }

        .bulk-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            color: #2a1a3a;
        }

        .bulk-btn:hover { transform: scale(1.05); }

        .eggs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .egg-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .egg-card:hover { transform: translateY(-5px); border-color: #ffd700; }
        .egg-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .egg-emoji { font-size: 56px; }
        .egg-title { font-size: 20px; font-weight: bold; color: #ffd700; }
        .egg-price { font-size: 18px; margin: 10px 0; display: inline-block; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 25px; }
        .pet-list { margin-top: 15px; border-top: 1px solid rgba(255,215,0,0.3); padding-top: 15px; max-height: 300px; overflow-y: auto; }
        .pet-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,215,0,0.1); }
        .pet-name-chance { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .pet-emoji-small { font-size: 28px; }
        .chance-badge { background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #ffd700; }
        .huge-badge { background: linear-gradient(135deg, #ff3366, #ff88ff); color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-left: 8px; }
        .power-badge { background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 12px; font-size: 10px; color: #ffaa66; }

        .pets-collection {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }

        .pet-card.active-pet {
            border: 2px solid #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
        }

        .pet-card.huge-pet {
            background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(255,136,255,0.1));
            border-color: #ff66cc;
        }

        .pet-card-emoji { font-size: 40px; }
        .pet-card-name { font-size: 11px; color: white; font-weight: bold; }
        .pet-card-power { font-size: 10px; color: #ffd700; }
        .huge-tag { position: absolute; top: -8px; right: -8px; background: linear-gradient(135deg, #ff3366, #ff88ff); border-radius: 20px; padding: 2px 6px; font-size: 9px; font-weight: bold; color: white; }
        .equipped-badge { position: absolute; top: -5px; left: -5px; background: #ffd700; color: #2a1a3a; font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: bold; }
        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 4px 8px;
            border-radius: 15px;
            color: white;
            font-size: 10px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .world-selector, .boost-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
        }

        .world-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .world-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            transform: scale(1.05);
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #2a1a3a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .floating-effect {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            animation: floatRandom 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatRandom {
            0% { opacity: 1; transform: translate(0, 0) scale(0.8); }
            100% { opacity: 0; transform: translate(var(--dx, 50px), var(--dy, -80px)) scale(1.2); }
        }

        .egg-opening-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            animation: eggShake 0.5s ease-in-out, eggPop 0.3s ease-out 0.5s forwards;
            z-index: 2000;
            pointer-events: none;
        }

        @keyframes eggShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(10deg); }
            75% { transform: translate(-50%, -50%) rotate(-10deg); }
        }

        @keyframes eggPop {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .shake { animation: shakeAnim 0.2s ease-in-out; }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="resources-bar">
            <div class="resource-card"><div class="resource-icon">💰</div><div class="resource-info"><div class="resource-name">Монеты</div><div class="resource-value" id="coins">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">💎</div><div class="resource-info"><div class="resource-name">Алмазы</div><div class="resource-value" id="gems">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">⚡</div><div class="resource-info"><div class="resource-name">Сила клика</div><div class="resource-value" id="clickPower">1</div></div></div>
            <div class="resource-card"><div class="resource-icon">🚀</div><div class="resource-info"><div class="resource-name">Множитель</div><div class="resource-value" id="multiplier">1x</div></div></div>
        </div>

        <div class="main-layout">
            <div>
                <div class="pet-area" id="petArea">
                    <div class="current-pet" id="currentPetEmoji">🐣</div>
                    <div class="pet-name" id="currentPetName">Маленький питомец</div>
                    <div class="pet-power" id="currentPetPower">Сила: 1</div>
                </div>

                <div class="slots-section">
                    <h3 style="color: #ffd700;">📦 Активные питомцы</h3>
                    <div class="slots-grid" id="slotsContainer"></div>
                    <button class="btn" id="buySlotBtn">🔓 Купить слот</button>
                </div>

                <div class="location-selector">
                    <h3 style="color: #ffd700;">📍 Локация</h3>
                    <div class="location-controls">
                        <button class="location-nav" id="prevLocationBtn">◀</button>
                        <div class="location-info">
                            <div class="location-name" id="locationName">Локация 1</div>
                            <div class="location-multiplier" id="locationMultiplier">Множитель: x1.00</div>
                            <div class="location-progress"><div class="location-progress-fill" id="locationProgress"></div></div>
                        </div>
                        <button class="location-nav" id="nextLocationBtn">▶</button>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="world-selector">
                    <h3 style="color: #ffd700;">🌍 Миры</h3>
                    <div class="world-buttons" id="worldsContainer"></div>
                </div>
                <div class="boost-section">
                    <h3 style="color: #ffd700;">⚡ Бусты</h3>
                    <div id="boostsContainer"></div>
                    <button class="btn" id="buyBoostBtn">💪 Буст x2 (100💎)</button>
                </div>
            </div>
        </div>

        <div class="eggs-section">
            <div class="eggs-header">
                <h2 style="color: #ffd700;">🥚 МАГИЧЕСКИЕ ЯЙЦА 🥚</h2>
                <div class="egg-bulk-buttons" id="bulkButtons">
                    <div class="bulk-btn" data-bulk="1">🔓 1x</div>
                    <div class="bulk-btn" data-bulk="4">🔓 4x</div>
                    <div class="bulk-btn" data-bulk="8">🔓 8x</div>
                </div>
            </div>
            <div class="eggs-grid" id="eggsContainer"></div>
        </div>

        <div class="pets-collection">
            <h2 style="color: #ffd700; text-align: center;">🐕 КОЛЛЕКЦИЯ ПИТОМЦЕВ 🐈</h2>
            <div class="pets-stats">
                <span>📊 Всего: <span id="totalPets">0</span></span>
                <span>⭐ Общая сила: <span id="totalPower">0</span></span>
                <span>💰 Стоимость: <span id="totalSellValue">0</span>💰</span>
                <span>🌟 Huge: <span id="hugeCount">0</span></span>
            </div>
            <div class="pets-grid" id="petsContainer"></div>
            <button class="btn" id="sellAllBtn" style="background: linear-gradient(135deg, #ff4444, #aa2222);">💰 ПРОДАТЬ ВСЕХ (КРОМЕ АКТИВНЫХ)</button>
        </div>

        <div class="upgrades-section" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px;">
            <h2 style="color: #ffd700; text-align: center;">✨ УЛУЧШЕНИЯ ✨</h2>
            <div class="upgrades-grid" id="upgradesContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        // ВСЕ ЖИВОТНЫЕ ИЗ ЭМОДЗИ
        const ALL_ANIMALS = {

                { emoji: "🐉💎", name: "Кристальный дракон" }, { emoji: "🐉🌑", name: "Теневой дракон" }, { emoji: "🐉🌈", name: "Радужный дракон" },
                { emoji: "🦁👑", name: "Король зверей" }, { emoji: "🐻‍❄️✨", name: "Ледяной медведь" }, { emoji: "🐺⚡", name: "Электрический волк" }

        const HUGE_PETS = [
            { emoji: "🌟🐉", name: "Huge Золотой Дракон", powerMultiplier: 100 },
            { emoji: "💎🦄", name: "Huge Алмазный Единорог", powerMultiplier: 110 },
            { emoji: "⚡🐺", name: "Huge Громовой Волк", powerMultiplier: 105 },
            { emoji: "🔥🐦‍🔥", name: "Huge Бессмертный Феникс", powerMultiplier: 120 },
            { emoji: "👑🐻", name: "Huge Король Медведей", powerMultiplier: 95 },
            { emoji: "🌌🐲", name: "Huge Космический Дракон", powerMultiplier: 130 },
            { emoji: "❄️👑", name: "Huge Ледяной Король", powerMultiplier: 100 },
            { emoji: "🌈🦄", name: "Huge Радужный Единорог", powerMultiplier: 115 }
        ];

        function generateLocations(worldMultiplier) {
            const locations = [];
            for (let i = 1; i <= 99; i++) {
                let multiplier = 1 + (i - 1) * 0.05;
                let unlockCost = Math.floor(5000 * Math.pow(1.08, i - 1) * worldMultiplier);
                locations.push({
                    id: i,
                    name: `Локация ${i}`,
                    multiplier: multiplier,
                    unlockCost: unlockCost,
                    unlocked: i === 1
                });
            }
            return locations;
        }

        // Генерация питомцев для конкретного яйца (все разные!)
        function generateEggPets(eggType, locationId, worldMultiplier, worldTheme) {
            const basePower = Math.floor(locationId * worldMultiplier);
            let powerMultiplier = 1;
            
            // Чем дороже яйцо, тем сильнее питомцы
            switch(eggType) {
                case 'common': powerMultiplier = 1; break;
                case 'rare': powerMultiplier = 3; break;
                case 'epic': powerMultiplier = 8; break;
                case 'legendary': powerMultiplier = 20; break;
                case 'mythic': powerMultiplier = 50; break;
                default: powerMultiplier = 1;
            }
            
            const pets = [];
            const animalList = ALL_ANIMALS[eggType] || ALL_ANIMALS.common;
            
            // 5 обычных питомцев с разными шансами
            const chances = [35, 28, 22, 12, 3];
            
            for (let i = 0; i < 5; i++) {
                const animal = animalList[Math.floor(Math.random() * animalList.length)];
                let power = Math.floor(basePower * powerMultiplier * (i + 1));
                if (power < 1) power = 1;
                
                pets.push({
                    emoji: animal.emoji,
                    name: animal.name,
                    power: power,
                    chance: chances[i],
                    isHuge: false
                });
            }
            
            // Huge питомец (специальный для каждого яйца)
            const hugeIndex = (locationId + eggType.length) % HUGE_PETS.length;
            const hugePet = HUGE_PETS[hugeIndex];
            const hugePower = Math.floor(basePower * powerMultiplier * 50);
            
            pets.push({
                emoji: hugePet.emoji,
                name: hugePet.name,
                power: hugePower,
                chance: 0.2,
                isHuge: true
            });
            
            return pets;
        }

        class PetSimulator99 {
            constructor() {
                this.coins = 50000;
                this.gems = 500;
                this.clickPower = 1;
                this.totalClicks = 0;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                this.bulkAmount = 1;
                
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌳 Лесная чаща", multiplier: 1, unlocked: true, cost: 0, icon: "🌳", theme: "forest", locations: [], currentLocation: 0 },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 50000, icon: "🔥", theme: "volcano", locations: [], currentLocation: 0 },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 200000, icon: "❄️", theme: "ice", locations: [], currentLocation: 0 },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 800000, icon: "⚡", theme: "sky", locations: [], currentLocation: 0 },
                    { name: "💀 Преисподняя", multiplier: 8, unlocked: false, cost: 2500000, icon: "💀", theme: "hell", locations: [], currentLocation: 0 },
                    { name: "👑 Райский сад", multiplier: 12, unlocked: false, cost: 10000000, icon: "👑", theme: "paradise", locations: [], currentLocation: 0 }
                ];
                
                this.worlds.forEach(world => {
                    world.locations = generateLocations(world.multiplier);
                });
                
                this.pets = [];
                this.activeSlots = 1;
                this.maxSlots = 99;
                this.slotPets = [null];
                
                this.upgrades = [
                    { id: "click", name: "💪 Усиление клика", desc: "+5 к силе", price: 500, priceType: "coins", effect: () => { this.clickPower += 5; }, level: 0, basePrice: 500 },
                    { id: "auto", name: "🤖 Авто-кликер", desc: "+1 клик/сек", price: 800, priceType: "coins", effect: () => { this.autoClickerLevel++; this.startAutoClicker(); }, level: 0, basePrice: 800 },
                    { id: "multiplier", name: "✨ Множитель", desc: "+0.5x доход", price: 1500, priceType: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, basePrice: 1500 }
                ];
                
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                
                this.init();
            }
            
            formatNumber(num) {
                if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B';
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            }
            
            isPetEquipped(petId) {
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i] && this.slotPets[i].id === petId) return true;
                }
                return false;
            }
            
            init() {
                this.loadGame();
                this.updateBulkUnlock();
                this.renderWorlds();
                this.renderSlots();
                this.renderLocation();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAutoClicker();
                this.setupEventListeners();
                this.startBoostTimer();
                this.updateTheme();
            }
            
            setupEventListeners() {
                document.getElementById('petArea').addEventListener('click', (e) => this.clickPet(e));
                document.getElementById('buyBoostBtn').addEventListener('click', () => this.buyBoost());
                document.getElementById('sellAllBtn').addEventListener('click', () => this.sellAllPets());
                document.getElementById('buySlotBtn').addEventListener('click', () => this.buySlot());
                document.getElementById('prevLocationBtn').addEventListener('click', () => this.changeLocation(-1));
                document.getElementById('nextLocationBtn').addEventListener('click', () => this.changeLocation(1));
                
                document.querySelectorAll('.bulk-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const bulk = parseInt(btn.dataset.bulk);
                        if (this.canUseBulkAmount(bulk)) {
                            this.bulkAmount = bulk;
                            document.querySelectorAll('.bulk-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        } else {
                            this.showMessage(`❌ Открытие ${bulk}x яиц доступно только на ${this.getBulkUnlockRequirement(bulk)} локации!`);
                        }
                    });
                });
            }
            
            canUseBulkAmount(amount) {
                const currentLocation = this.worlds[this.currentWorld].currentLocation + 1;
                if (amount === 1) return true;
                if (amount === 4) return currentLocation >= 300;
                if (amount === 8) return currentLocation >= 594;
                return false;
            }
            
            getBulkUnlockRequirement(amount) {
                if (amount === 4) return "300 (3-й мир)";
                if (amount === 8) return "594 (6-й мир, 99 локация)";
                return "";
            }
            
            updateBulkUnlock() {
                const currentLocation = this.worlds[this.currentWorld].currentLocation + 1;
                const can4x = currentLocation >= 300;
                const can8x = currentLocation >= 594;
                
                document.querySelectorAll('.bulk-btn').forEach(btn => {
                    const bulk = parseInt(btn.dataset.bulk);
                    if (bulk === 4 && !can4x) btn.style.opacity = '0.5';
                    else if (bulk === 8 && !can8x) btn.style.opacity = '0.5';
                    else btn.style.opacity = '1';
                });
            }
            
            showEggAnimation(eggEmoji, callback) {
                const anim = document.createElement('div');
                anim.className = 'egg-opening-animation';
                anim.textContent = eggEmoji;
                document.body.appendChild(anim);
                setTimeout(() => {
                    anim.remove();
                    if (callback) callback();
                }, 800);
            }
            
            openEgg(eggData, count = 1) {
                const totalPrice = eggData.price * count;
                if (this.coins >= totalPrice) {
                    this.coins -= totalPrice;
                } else {
                    this.showMessage(`❌ Недостаточно монет! Нужно ${this.formatNumber(totalPrice)}`);
                    return false;
                }
                
                this.showEggAnimation(eggData.icon, () => {
                    for (let c = 0; c < count; c++) {
                        const roll = Math.random() * 100;
                        let cumulative = 0;
                        let selectedPet = null;
                        
                        for (const pet of eggData.pets) {
                            cumulative += pet.chance;
                            if (roll <= cumulative) {
                                selectedPet = { ...pet };
                                break;
                            }
                        }
                        
                        if (!selectedPet) selectedPet = { ...eggData.pets[0] };
                        
                        const newPet = {
                            id: Date.now() + Math.random() + c,
                            emoji: selectedPet.emoji,
                            name: selectedPet.name,
                            power: selectedPet.power,
                            rarity: selectedPet.isHuge ? 'huge' : eggData.type,
                            isHuge: selectedPet.isHuge || false
                        };
                        
                        this.pets.push(newPet);
                        
                        const emptySlot = this.findEmptySlot();
                        if (emptySlot !== -1) {
                            this.assignPetToSlot(emptySlot, newPet);
                        }
                        
                        this.showRandomEffect(`${selectedPet.isHuge ? '🌟 HUGE! 🌟 ' : '🎉'} +${newPet.name} (⚡${this.formatNumber(newPet.power)})`, window.innerWidth/2, window.innerHeight/2, selectedPet.isHuge ? '#ff66cc' : '#ffd700');
                    }
                    
                    this.showMessage(`🎉 Открыто ${count} яиц! Получено ${count} питомцев!`);
                    this.renderPets();
                    this.renderSlots();
                    this.updateUI();
                    this.saveGame();
                });
                
                return true;
            }
            
            clickPet(event) {
                const currentWorldData = this.worlds[this.currentWorld];
                const locationBonus = currentWorldData.locations[currentWorldData.currentLocation].multiplier;
                const worldBonus = currentWorldData.multiplier;
                const boostBonus = this.boostActive ? 2 : 1;
                const slotBonus = this.activeSlots;
                let earned = Math.floor(this.clickPower * locationBonus * worldBonus * this.multiplier * boostBonus * slotBonus);
                
                this.coins += earned;
                this.totalClicks++;
                
                if (Math.random() < 0.05) {
                    const diamondsEarned = Math.floor(Math.random() * 100) + 1;
                    this.gems += diamondsEarned;
                    this.showRandomEffect(`💎 +${diamondsEarned}💎`, event.clientX, event.clientY, '#ff88ff');
                }
                
                const isCrit = Math.random() < 0.1;
                if (isCrit) {
                    earned *= 2;
                    this.coins += earned;
                    this.showRandomEffect(`✨ КРИТИЧЕСКИЙ УДАР! x2 ✨`, event.clientX + 50, event.clientY - 30, '#ff3366');
                }
                
                this.showRandomEffect(`+${this.formatNumber(earned)}💰`, event.clientX, event.clientY, '#ffd700');
                
                const petArea = document.getElementById('petArea');
                petArea.classList.add('shake');
                setTimeout(() => petArea.classList.remove('shake'), 200);
                
                this.updateUI();
                this.saveGame();
            }
            
            showRandomEffect(text, x, y, color) {
                const floating = document.createElement('div');
                floating.className = 'floating-effect';
                floating.textContent = text;
                const randomX = (Math.random() - 0.5) * 100;
                const randomY = (Math.random() - 0.5) * 80 - 20;
                floating.style.left = `${x + randomX}px`;
                floating.style.top = `${y + randomY}px`;
                floating.style.color = color;
                floating.style.setProperty('--dx', `${randomX + 50}px`);
                floating.style.setProperty('--dy', `${randomY - 60}px`);
                floating.style.fontSize = `${Math.floor(Math.random() * 10) + 20}px`;
                document.body.appendChild(floating);
                setTimeout(() => floating.remove(), 800);
            }
            
            buySlot() {
                const nextSlot = this.activeSlots;
                if (nextSlot >= this.maxSlots) {
                    this.showMessage("❌ Максимум слотов достигнут! (99)");
                    return;
                }
                let price = 1000 * Math.pow(2, nextSlot - 1);
                if (nextSlot > 10) price = 100000 * Math.pow(1.5, nextSlot - 10);
                price = Math.floor(price);
                
                if (this.gems >= price) {
                    this.gems -= price;
                    this.activeSlots++;
                    this.slotPets.push(null);
                    this.showMessage(`🔓 Открыт слот ${this.activeSlots}! Цена: ${this.formatNumber(price)}💎`);
                    this.renderSlots();
                    this.updateUI();
                    this.saveGame();
                } else {
                    this.showMessage(`❌ Нужно ${this.formatNumber(price)} алмазов!`);
                }
            }
            
            assignPetToSlot(slotIndex, pet) {
                if (slotIndex < this.activeSlots) {
                    for (let i = 0; i < this.activeSlots; i++) {
                        if (this.slotPets[i] && this.slotPets[i].id === pet.id && i !== slotIndex) {
                            return false;
                        }
                    }
                    this.slotPets[slotIndex] = pet;
                    this.renderSlots();
                    this.renderPets();
                    this.updateClickPower();
                    this.updateUI();
                    this.saveGame();
                    return true;
                }
                return false;
            }
            
            removePetFromSlot(slotIndex) {
                this.slotPets[slotIndex] = null;
                this.renderSlots();
                this.renderPets();
                this.updateClickPower();
                this.updateUI();
                this.saveGame();
            }
            
            findEmptySlot() {
                for (let i = 0; i < this.activeSlots; i++) {
                    if (!this.slotPets[i]) return i;
                }
                return -1;
            }
            
            selectPet(pet) {
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i] && this.slotPets[i].id === pet.id) {
                        this.showMessage(`❌ Питомец уже в слоте ${i + 1}!`);
                        return;
                    }
                }
                const emptySlot = this.findEmptySlot();
                if (emptySlot !== -1) {
                    this.assignPetToSlot(emptySlot, pet);
                    this.showMessage(`✅ ${pet.name} назначен в слот ${emptySlot + 1}!`);
                } else {
                    this.showMessage("❌ Нет свободных слотов!");
                }
            }
            
            changeLocation(delta) {
                const currentWorldData = this.worlds[this.currentWorld];
                const newLocation = currentWorldData.currentLocation + delta;
                const locations = currentWorldData.locations;
                if (newLocation >= 0 && newLocation < locations.length) {
                    const location = locations[newLocation];
                    if (location.unlocked) {
                        currentWorldData.currentLocation = newLocation;
                        this.renderLocation();
                        this.renderEggs();
                        this.updateBulkUnlock();
                        this.updateUI();
                        this.saveGame();
                    } else {
                        if (this.coins >= location.unlockCost) {
                            this.coins -= location.unlockCost;
                            location.unlocked = true;
                            currentWorldData.currentLocation = newLocation;
                            this.renderLocation();
                            this.renderEggs();
                            this.updateBulkUnlock();
                            this.updateUI();
                            this.saveGame();
                            this.showMessage(`🔓 Открыта ${location.name}! Множитель: x${location.multiplier.toFixed(2)}`);
                            this.checkAllLocationsUnlocked();
                        } else {
                            this.showMessage(`❌ Нужно ${this.formatNumber(location.unlockCost)} монет!`);
                        }
                    }
                }
            }
            
            checkAllLocationsUnlocked() {
                const currentWorldData = this.worlds[this.currentWorld];
                const allUnlocked = currentWorldData.locations.every(loc => loc.unlocked === true);
                if (allUnlocked && this.currentWorld + 1 < this.worlds.length) {
                    const nextWorld = this.worlds[this.currentWorld + 1];
                    if (!nextWorld.unlocked) {
                        nextWorld.unlocked = true;
                        this.showMessage(`🎉 ВСЕ 99 ЛОКАЦИЙ ОТКРЫТЫ! 🌍 ОТКРЫТ НОВЫЙ МИР: ${nextWorld.name}! 🎉`);
                        this.renderWorlds();
                        this.saveGame();
                    }
                }
            }
            
            sellPet(petId) {
                const petIndex = this.pets.findIndex(p => p.id === petId);
                if (petIndex === -1) return;
                const pet = this.pets[petIndex];
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i] && this.slotPets[i].id === petId) {
                        this.showMessage("❌ Сначала уберите питомца из слота!");
                        return;
                    }
                }
                const sellValue = Math.floor(pet.power * 10);
                this.coins += sellValue;
                this.pets.splice(petIndex, 1);
                this.showMessage(`💰 Продано: ${pet.name} за ${this.formatNumber(sellValue)} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            sellAllPets() {
                const activePetIds = this.slotPets.filter(p => p !== null).map(p => p.id);
                const toSell = this.pets.filter(p => !activePetIds.includes(p.id));
                if (toSell.length === 0) {
                    this.showMessage("❌ Нет питомцев для продажи!");
                    return;
                }
                let totalSell = 0;
                for (const pet of toSell) totalSell += Math.floor(pet.power * 10);
                this.coins += totalSell;
                this.pets = this.pets.filter(p => activePetIds.includes(p.id));
                this.showMessage(`💰 Продано ${toSell.length} питомцев! Получено: ${this.formatNumber(totalSell)} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            updateClickPower() {
                let totalPower = 0;
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i]) totalPower += this.slotPets[i].power;
                }
                this.clickPower = Math.max(1, totalPower);
                this.updateUI();
            }
            
            buyUpgrade(upgrade) {
                let cost = upgrade.price;
                if (upgrade.priceType === "coins" && this.coins >= cost) {
                    this.coins -= cost;
                } else if (upgrade.priceType === "gems" && this.gems >= cost) {
                    this.gems -= cost;
                } else {
                    this.showMessage("Недостаточно ресурсов!");
                    return;
                }
                upgrade.effect();
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.basePrice * Math.pow(1.5, upgrade.level));
                this.updateUI();
                this.renderUpgrades();
                this.saveGame();
            }
            
            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.showMessage("⚡ Буст активирован на 5 минут! x2 к доходу ⚡");
                    this.renderBoosts();
                    this.saveGame();
                } else {
                    this.showMessage("Нужно 100 алмазов!");
                }
            }
            
            unlockWorld(worldIndex) {
                const world = this.worlds[worldIndex];
                const prevWorld = this.worlds[worldIndex - 1];
                if (worldIndex > 0 && prevWorld) {
                    const allPrevUnlocked = prevWorld.locations.every(loc => loc.unlocked === true);
                    if (!allPrevUnlocked) {
                        const unlockedCount = prevWorld.locations.filter(loc => loc.unlocked).length;
                        this.showMessage(`❌ Нужно открыть все 99 локаций в мире "${prevWorld.name}"! (${unlockedCount}/99)`);
                        return;
                    }
                }
                if (!world.unlocked && this.coins >= world.cost) {
                    this.coins -= world.cost;
                    world.unlocked = true;
                    this.showMessage(`🌍 Мир "${world.name}" открыт!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                } else if (!world.unlocked) {
                    this.showMessage(`Нужно ${this.formatNumber(world.cost)} монет!`);
                }
            }
            
            changeWorld(worldIndex) {
                if (this.worlds[worldIndex].unlocked) {
                    this.currentWorld = worldIndex;
                    this.renderWorlds();
                    this.renderLocation();
                    this.renderEggs();
                    this.updateBulkUnlock();
                    this.updateTheme();
                    this.updateUI();
                    this.saveGame();
                }
            }
            
            updateTheme() {
                const theme = this.worlds[this.currentWorld].theme;
                document.getElementById('gameContainer').setAttribute('data-theme', theme);
                const themes = {
                    forest: 'linear-gradient(135deg, #0a2a0a 0%, #051005 100%)',
                    volcano: 'linear-gradient(135deg, #4a1a0a 0%, #2a0a05 100%)',
                    ice: 'linear-gradient(135deg, #1a3a5a 0%, #0a1a2a 100%)',
                    sky: 'linear-gradient(135deg, #2a2a5a 0%, #0a0a2a 100%)',
                    hell: 'linear-gradient(135deg, #4a0a2a 0%, #2a050a 100%)',
                    paradise: 'linear-gradient(135deg, #4a2a6a 0%, #2a0a4a 100%)'
                };
                document.body.style.background = themes[theme] || 'linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%)';
            }
            
            renderSlots() {
                const container = document.getElementById('slotsContainer');
                container.innerHTML = '';
                for (let i = 0; i < this.activeSlots; i++) {
                    const pet = this.slotPets[i];
                    const card = document.createElement('div');
                    card.className = `slot-card ${pet ? 'unlocked' : ''}`;
                    card.innerHTML = `
                        <div class="slot-number">Слот ${i + 1}</div>
                        ${pet ? `<div class="slot-pet-emoji">${pet.emoji}</div><div style="font-size: 10px;">${pet.name}</div><div style="font-size: 9px; color:#ffd700;">⚡${this.formatNumber(pet.power)}</div>` : '<div style="font-size: 12px;">🔓 Пусто</div>'}
                        ${pet ? `<button class="btn" style="margin-top: 5px; padding: 3px 8px; font-size: 10px;" onclick="game.removePetFromSlot(${i})">✖ Убрать</button>` : ''}
                    `;
                    container.appendChild(card);
                }
                this.updateClickPower();
            }
            
            renderLocation() {
                const currentWorldData = this.worlds[this.currentWorld];
                const location = currentWorldData.locations[currentWorldData.currentLocation];
                document.getElementById('locationName').textContent = location.name;
                document.getElementById('locationMultiplier').textContent = `Множитель: x${location.multiplier.toFixed(2)} | Стоимость: ${this.formatNumber(location.unlockCost)}💰`;
                const progress = ((currentWorldData.currentLocation + 1) / 99) * 100;
                document.getElementById('locationProgress').style.width = `${progress}%`;
            }
            
            renderWorlds() {
                const container = document.getElementById('worldsContainer');
                container.innerHTML = '';
                this.worlds.forEach((world, index) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${index === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `<div style="font-size: 24px;">${world.icon}</div><div>${world.name}</div><div>x${world.multiplier}</div>${!world.unlocked ? `<div>💰${this.formatNumber(world.cost)}</div>` : ''}`;
                    btn.onclick = () => world.unlocked ? this.changeWorld(index) : this.unlockWorld(index);
                    container.appendChild(btn);
                });
            }
            
            renderEggs() {
                const container = document.getElementById('eggsContainer');
                const currentWorldData = this.worlds[this.currentWorld];
                const location = currentWorldData.locations[currentWorldData.currentLocation];
                
                // Цены на яйца - чем дороже яйцо, тем лучше питомцы
                const eggTypes = [
                    { type: "common", name: "🥚 Обычное яйцо", price: 500 * location.id * currentWorldData.multiplier, icon: "🥚", color: "#8B4513" },
                    { type: "rare", name: "🔵 Редкое яйцо", price: 2500 * location.id * currentWorldData.multiplier, icon: "🔵🥚", color: "#3498db" },
                    { type: "epic", name: "🟣 Эпическое яйцо", price: 10000 * location.id * currentWorldData.multiplier, icon: "🟣🥚", color: "#9b59b6" },
                    { type: "legendary", name: "⭐ Легендарное яйцо", price: 50000 * location.id * currentWorldData.multiplier, icon: "⭐🥚", color: "#f39c12" },
                    { type: "mythic", name: "💎 Мифическое яйцо", price: 250000 * location.id * currentWorldData.multiplier, icon: "💎🥚", color: "#e91e63" }
                ];
                
                container.innerHTML = '';
                for (const eggType of eggTypes) {
                    const pets = generateEggPets(eggType.type, location.id, currentWorldData.multiplier, currentWorldData.theme);
                    
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header"><div class="egg-emoji">${eggType.icon}</div><div class="egg-title">${eggType.name}</div></div>
                        <div class="egg-price">💰 ${this.formatNumber(eggType.price)} монет</div>
                        <div class="pet-list">
                            <div style="font-size: 12px; color: #ffd700; margin-bottom: 8px;">📋 Питомцы и шансы:</div>
                            ${pets.map(p => `
                                <div class="pet-item">
                                    <div class="pet-name-chance">
                                        <span class="pet-emoji-small">${p.emoji}</span>
                                        <span>${p.name}</span>
                                        ${p.isHuge ? '<span class="huge-badge">🌟 HUGE</span>' : ''}
                                        <span class="power-badge">⚡${this.formatNumber(p.power)}</span>
                                    </div>
                                    <span class="chance-badge">${p.chance}%</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    card.onclick = () => this.openEgg({ ...eggType, pets: pets }, this.bulkAmount);
                    container.appendChild(card);
                }
            }
            
            renderPets() {
                const container = document.getElementById('petsContainer');
                container.innerHTML = '';
                const sortedPets = [...this.pets].sort((a,b) => b.power - a.power);
                let hugeCount = 0;
                sortedPets.forEach(pet => {
                    const isEquipped = this.isPetEquipped(pet.id);
                    if (pet.isHuge) hugeCount++;
                    const card = document.createElement('div');
                    card.className = `pet-card ${isEquipped ? 'active-pet' : ''} ${pet.isHuge ? 'huge-pet' : ''}`;
                    card.innerHTML = `
                        ${pet.isHuge ? '<div class="huge-tag">🌟 HUGE</div>' : ''}
                        ${isEquipped ? '<div class="equipped-badge">✅</div>' : ''}
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡${this.formatNumber(pet.power)}</div>
                        ${!isEquipped ? `<button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 ${this.formatNumber(Math.floor(pet.power * 10))}💰</button>` : '<div style="font-size: 10px; color:#ffd700; margin-top: 5px;">В слоте</div>'}
                    `;
                    card.onclick = (e) => { 
                        if(e.target !== card.querySelector('.sell-btn')) {
                            if (!isEquipped) this.selectPet(pet);
                            else this.showMessage(`✅ ${pet.name} уже в слоте!`);
                        }
                    };
                    container.appendChild(card);
                });
                document.getElementById('totalPets').textContent = this.pets.length;
                document.getElementById('totalPower').textContent = this.formatNumber(this.pets.reduce((s,p) => s + p.power, 0));
                document.getElementById('totalSellValue').textContent = this.formatNumber(this.pets.reduce((s,p) => s + Math.floor(p.power * 10), 0));
                document.getElementById('hugeCount').textContent = hugeCount;
            }
            
            renderUpgrades() {
                const container = document.getElementById('upgradesContainer');
                container.innerHTML = '';
                this.upgrades.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.style.background = 'linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1))';
                    card.style.border = '1px solid rgba(255,215,0,0.3)';
                    card.style.borderRadius = '12px';
                    card.style.padding = '12px';
                    card.style.cursor = 'pointer';
                    card.style.textAlign = 'center';
                    card.innerHTML = `<div style="font-weight: bold;">${up.name}</div><div style="font-size: 12px;">${up.desc}</div><div style="color: #ffd700;">${up.priceType === 'coins' ? '💰' : '💎'} ${this.formatNumber(up.price)}</div><div>Уровень: ${up.level}</div>`;
                    card.onclick = () => this.buyUpgrade(up);
                    container.appendChild(card);
                });
            }
            
            renderBoosts() {
                const container = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const remaining = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;
                    container.innerHTML = `<div style="background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; text-align: center;"><div style="color:#ffd700;">⚡ Активен x2 ⚡</div><div>Осталось: ${minutes}:${seconds.toString().padStart(2,'0')}</div></div>`;
                } else {
                    container.innerHTML = `<div style="background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; text-align: center;"><div>💤 Нет бустов</div><div>Купи за 100💎</div></div>`;
                }
            }
            
            updateUI() {
                document.getElementById('coins').textContent = this.formatNumber(Math.floor(this.coins));
                document.getElementById('gems').textContent = this.formatNumber(Math.floor(this.gems));
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
                if (this.clickPower > 0) document.getElementById('currentPetPower').textContent = `Сила клика: ${this.clickPower}`;
            }
            
            showMessage(text) {
                const msg = document.createElement('div');
                msg.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:12px 24px;border-radius:40px;z-index:1000;animation:fadeOut 2s forwards;font-weight:bold;border:1px solid #ffd700;`;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
            
            startAutoClicker() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        const currentWorldData = this.worlds[this.currentWorld];
                        const locationBonus = currentWorldData.locations[currentWorldData.currentLocation].multiplier;
                        const worldBonus = currentWorldData.multiplier;
                        const boostBonus = this.boostActive ? 2 : 1;
                        const slotBonus = this.activeSlots;
                        let earned = Math.floor(this.autoClickerLevel * 8 * locationBonus * worldBonus * this.multiplier * boostBonus * slotBonus);
                        this.coins += earned;
                        this.updateUI();
                        this.saveGame();
                    }
                }, 1000);
            }
            
            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.showMessage("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.saveGame();
                    }
                }, 1000);
            }
            
            saveGame() {
                const worldsSave = this.worlds.map(world => ({
                    name: world.name,
                    multiplier: world.multiplier,
                    unlocked: world.unlocked,
                    cost: world.cost,
                    icon: world.icon,
                    theme: world.theme,
                    locations: world.locations,
                    currentLocation: world.currentLocation
                }));
                
                const save = {
                    coins: this.coins, gems: this.gems, clickPower: this.clickPower, totalClicks: this.totalClicks,
                    multiplier: this.multiplier, currentWorld: this.currentWorld,
                    worlds: worldsSave,
                    pets: this.pets, slotPets: this.slotPets, activeSlots: this.activeSlots,
                    upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price })),
                    autoClickerLevel: this.autoClickerLevel, boostActive: this.boostActive, boostEndTime: this.boostEndTime
                };
                localStorage.setItem('petSimulatorFinal', JSON.stringify(save));
            }
            
            loadGame() {
                const save = localStorage.getItem('petSimulatorFinal');
                if (save) {
                    const data = JSON.parse(save);
                    this.coins = data.coins; this.gems = data.gems; this.clickPower = data.clickPower;
                    this.totalClicks = data.totalClicks; this.multiplier = data.multiplier;
                    this.currentWorld = data.currentWorld;
                    this.pets = data.pets; this.slotPets = data.slotPets || [null];
                    this.activeSlots = data.activeSlots || 1;
                    this.autoClickerLevel = data.autoClickerLevel;
                    this.boostActive = data.boostActive; this.boostEndTime = data.boostEndTime;
                    
                    if (data.worlds) {
                        this.worlds = data.worlds;
                    }
                    
                    if (data.upgrades) this.upgrades.forEach((u, i) => { if (data.upgrades[i]) { u.level = data.upgrades[i].level; u.price = data.upgrades[i].price; } });
                }
                
                this.worlds.forEach(world => {
                    if (world.currentLocation === undefined) world.currentLocation = 0;
                    if (!world.locations || world.locations.length === 0) {
                        world.locations = generateLocations(world.multiplier);
                    }
                });
                
                if (!this.slotPets || this.slotPets.length < this.activeSlots) {
                    this.slotPets = Array(this.activeSlots).fill(null);
                }
                this.updateClickPower();
            }
        }
        
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }`;
        document.head.appendChild(style);
        
        const game = new PetSimulator99();
        window.game = game;
    </script>
</body>
</html>
