<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            font-weight: bold;
            margin: 5px 0;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
        }
        
        /* Главная страница - кликабельная вся */
        #home-content {
            min-height: 100%;
            cursor: pointer;
            padding: 10px 0;
        }
        
        .clicker-area {
            text-align: center;
            pointer-events: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 6px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            pointer-events: none;
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            pointer-events: none;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        /* Кнопки (КРУПНЫЕ) */
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #4a2a5a 0%, #3a1a4a 100%);
            border: 2px solid #4CAF50;
            padding: 15px 20px;
            font-size: 16px;
        }
        
        /* Нижняя навигация (КРУПНЕЕ) */
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 2px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .nav-item span {
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        /* Магазин */
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .item-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        
        .item-level {
            color: #ff9800;
            font-size: 14px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Сетка недвижимости */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
        }
        
        .property-category:active {
            transform: scale(0.95);
            background: rgba(255, 215, 0, 0.15);
        }
        
        .property-category span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* Список имущества */
        .property-list {
            margin-top: 10px;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 3px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .property-owned {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .business-item:active {
            transform: scale(0.98);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 14px;
            color: #ff9800;
            font-weight: bold;
        }
        
        .business-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .back-btn {
            background: #f44336;
            color: white;
            padding: 15px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">IMPERIA</div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <!-- Контент -->
        <div class="content" id="content"></div>
        
        <!-- Нижняя навигация (КРУПНЫЕ КНОПКИ) -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>МОЙ БИЗНЕС</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <!-- Модальное окно бизнеса -->
    <div class="modal" id="businessModal">
        <div class="modal-content">
            <div class="modal-title" id="businessModalTitle">УПРАВЛЕНИЕ БИЗНЕСОМ</div>
            <div id="businessModalContent"></div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeBusinessModal()" style="background:#f44336; color:white;">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>
    
    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let gameState = {
            balance: 1000000,
            diamonds: 500,
            exp: 0,
            level: 1,
            
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            
            totalClicks: 0,
            totalEarned: 1000000,
            playTime: 0,
            lastOnlineTime: Date.now(),
            
            // БИЗНЕСЫ (10 штук)
            businesses: [
                { id: 0, name: "🚗 ТАКСОПАРК", emoji: "🚕", level: 0, baseIncome: 500, upgradeCost: 500000, upgradeTime: 3600, owned: false, totalEarned: 0 },
                { id: 1, name: "🍔 РЕСТОРАН", emoji: "🍽️", level: 0, baseIncome: 800, upgradeCost: 800000, upgradeTime: 7200, owned: false, totalEarned: 0 },
                { id: 2, name: "⛽ ЗАПРАВКА", emoji: "⛽", level: 0, baseIncome: 1200, upgradeCost: 1200000, upgradeTime: 10800, owned: false, totalEarned: 0 },
                { id: 3, name: "🏭 ЗАВОД", emoji: "🏭", level: 0, baseIncome: 2000, upgradeCost: 2000000, upgradeTime: 14400, owned: false, totalEarned: 0 },
                { id: 4, name: "🏨 ОТЕЛЬ", emoji: "🏨", level: 0, baseIncome: 3000, upgradeCost: 3000000, upgradeTime: 21600, owned: false, totalEarned: 0 },
                { id: 5, name: "🎰 КАЗИНО", emoji: "🎰", level: 0, baseIncome: 5000, upgradeCost: 5000000, upgradeTime: 28800, owned: false, totalEarned: 0 },
                { id: 6, name: "🏦 БАНК", emoji: "🏦", level: 0, baseIncome: 8000, upgradeCost: 8000000, upgradeTime: 36000, owned: false, totalEarned: 0 },
                { id: 7, name: "🛳️ ПОРТ", emoji: "🛳️", level: 0, baseIncome: 12000, upgradeCost: 12000000, upgradeTime: 43200, owned: false, totalEarned: 0 },
                { id: 8, name: "✈️ АЭРОПОРТ", emoji: "✈️", level: 0, baseIncome: 20000, upgradeCost: 20000000, upgradeTime: 50400, owned: false, totalEarned: 0 },
                { id: 9, name: "🏛️ ИМПЕРИЯ", emoji: "🏛️", level: 0, baseIncome: 50000, upgradeCost: 50000000, upgradeTime: 86400, owned: false, totalEarned: 0 }
            ],
            
            // НЕДВИЖИМОСТЬ (ДОРОГО)
            houses: [
                { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 5000000, income: 50000, owned: false },
                { id: 1, name: "ДОМ", emoji: "🏠", price: 20000000, income: 200000, owned: false },
                { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 100000000, income: 1000000, owned: false },
                { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 500000000, income: 5000000, owned: false }
            ],
            cars: [
                { id: 0, name: "ЛАДА", emoji: "🚗", price: 2000000, income: 20000, owned: false },
                { id: 1, name: "МЕРСЕДЕС", emoji: "🚘", price: 10000000, income: 100000, owned: false },
                { id: 2, name: "ФЕРРАРИ", emoji: "🏎️", price: 50000000, income: 500000, owned: false },
                { id: 3, name: "БУГАТТИ", emoji: "🚀", price: 250000000, income: 2500000, owned: false }
            ],
            planes: [
                { id: 0, name: "КУКУРУЗНИК", emoji: "✈️", price: 10000000, income: 100000, owned: false },
                { id: 1, name: "БОИНГ", emoji: "🛩️", price: 50000000, income: 500000, owned: false },
                { id: 2, name: "ЧАСТНЫЙ", emoji: "🛫", price: 200000000, income: 2000000, owned: false },
                { id: 3, name: "РЕАКТИВНЫЙ", emoji: "🛬", price: 1000000000, income: 10000000, owned: false }
            ],
            ships: [
                { id: 0, name: "ЛОДКА", emoji: "🛶", price: 3000000, income: 30000, owned: false },
                { id: 1, name: "КАРТЕР", emoji: "⛵", price: 15000000, income: 150000, owned: false },
                { id: 2, name: "ЯХТА", emoji: "🛥️", price: 100000000, income: 1000000, owned: false },
                { id: 3, name: "ЛАЙНЕР", emoji: "🚢", price: 500000000, income: 5000000, owned: false }
            ]
        };
        
        const prices = {
            clickPower: [50000, 250000, 1000000, 5000000, 25000000],
            autoClicker: [100000, 500000, 2000000, 10000000, 50000000],
            crit: [200000, 1000000, 5000000, 25000000, 100000000]
        };
        
        // ========== ЗАГРУЗКА ==========
        function loadGame() {
            const saved = localStorage.getItem('imperia2026');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {}
            }
            
            const now = Date.now();
            const secondsPassed = Math.floor((now - gameState.lastOnlineTime) / 1000);
            
            if (secondsPassed > 60) {
                let offlineIncome = 0;
                offlineIncome += gameState.autoClickerLevel * secondsPassed;
                
                gameState.businesses.forEach(b => {
                    if (b.owned && b.level > 0) {
                        offlineIncome += b.baseIncome * b.level * secondsPassed;
                        b.totalEarned += b.baseIncome * b.level * secondsPassed;
                    }
                });
                
                [gameState.houses, gameState.cars, gameState.planes, gameState.ships].forEach(cat => {
                    cat.forEach(item => {
                        if (item.owned) {
                            offlineIncome += item.income * secondsPassed / 3600;
                        }
                    });
                });
                
                if (offlineIncome > 0) {
                    gameState.balance += offlineIncome;
                    gameState.totalEarned += offlineIncome;
                    setTimeout(() => {
                        document.getElementById('offlineBadge').style.display = 'inline-block';
                        document.getElementById('offlineBadge').textContent = `⏱️ +${Math.floor(offlineIncome).toLocaleString()}💰`;
                        setTimeout(() => {
                            document.getElementById('offlineBadge').style.display = 'none';
                        }, 5000);
                    }, 500);
                }
            }
            
            gameState.lastOnlineTime = now;
            updateUI();
        }
        
        function saveGame() {
            gameState.lastOnlineTime = Date.now();
            localStorage.setItem('imperia2026', JSON.stringify(gameState));
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(gameState.balance).toLocaleString();
            document.getElementById('diamonds').textContent = Math.floor(gameState.diamonds).toLocaleString();
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 5000;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            const activeTab = document.querySelector('.nav-item.active')?.dataset.tab || 'home';
            renderTab(activeTab);
        }
        
        // ========== КЛИК ==========
        function handleClick() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            if (Math.random() * 100 < gameState.critLevel * 10) power *= 10;
            
            gameState.balance += Math.floor(power);
            gameState.totalClicks++;
            gameState.totalEarned += Math.floor(power);
            gameState.exp += power / 100;
            
            while (gameState.exp >= gameState.level * 5000) {
                gameState.exp -= gameState.level * 5000;
                gameState.level++;
                gameState.diamonds += gameState.level * 100;
            }
            
            const btn = document.querySelector('.click-btn');
            if (btn) {
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = 'scale(1)', 100);
            }
            
            updateUI();
            saveGame();
        }
        
        // ========== ОТОБРАЖЕНИЕ ВКЛАДОК ==========
        function renderTab(tab) {
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                const power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
                content.innerHTML = `
                    <div id="home-content" style="min-height:100%;">
                        <div class="clicker-area">
                            <div class="per-second">⏱️ АВТО: +${gameState.autoClickerLevel}/сек</div>
                            <div class="click-btn">
                                👆
                                <span>+${Math.floor(power)}</span>
                            </div>
                            <div class="offline-earnings">💰 ДОХОД ЗА ОФФЛАЙН РАБОТАЕТ</div>
                        </div>
                    </div>
                `;
                document.getElementById('home-content').addEventListener('click', handleClick);
                
            } else if (tab === 'shop') {
                let html = '<div class="card"><div class="card-title">🏪 МАГАЗИН УЛУЧШЕНИЙ</div>';
                
                if (gameState.clickPowerLevel < 5) {
                    html += `
                        <div class="shop-item">
                            <div class="item-info">
                                <div class="item-name">💪 СИЛА КЛИКА Lv.${gameState.clickPowerLevel+1}</div>
                                <div class="item-price">💰 ${prices.clickPower[gameState.clickPowerLevel].toLocaleString()}</div>
                            </div>
                            <button class="buy-btn" onclick="buyUpgrade('clickPower')">↑</button>
                        </div>
                    `;
                }
                if (gameState.autoClickerLevel < 5) {
                    html += `
                        <div class="shop-item">
                            <div class="item-info">
                                <div class="item-name">🤖 АВТОКЛИКЕР Lv.${gameState.autoClickerLevel+1}</div>
                                <div class="item-price">💰 ${prices.autoClicker[gameState.autoClickerLevel].toLocaleString()}</div>
                            </div>
                            <button class="buy-btn" onclick="buyUpgrade('autoClicker')">↑</button>
                        </div>
                    `;
                }
                if (gameState.critLevel < 5) {
                    html += `
                        <div class="shop-item">
                            <div class="item-info">
                                <div class="item-name">⚡ КРИТ Lv.${gameState.critLevel+1}</div>
                                <div class="item-price">💰 ${prices.crit[gameState.critLevel].toLocaleString()}</div>
                            </div>
                            <button class="buy-btn" onclick="buyUpgrade('crit')">↑</button>
                        </div>
                    `;
                }
                
                html += '<div class="btn btn-gold" onclick="exchangeDiamonds()">💎 ОБМЕНЯТЬ АЛМАЗЫ (1💎=10000💰)</div>';
                html += '</div>';
                content.innerHTML = html;
                
            } else if (tab === 'mybusiness') {
                let html = '<div class="card"><div class="card-title">💼 МОИ БИЗНЕСЫ</div>';
                
                const owned = gameState.businesses.filter(b => b.owned);
                if (owned.length === 0) {
                    html += '<div style="text-align:center; padding:30px;">У ВАС НЕТ БИЗНЕСОВ</div>';
                } else {
                    owned.forEach(b => {
                        html += `
                            <div class="business-item" onclick="openBusiness(${b.id})">
                                <div class="business-header">
                                    <span class="business-name">${b.emoji} ${b.name}</span>
                                    <span class="business-level">УР.${b.level}</span>
                                </div>
                                <div class="business-stats">
                                    <span>💰 +${b.baseIncome * b.level}/сек</span>
                                    <span>📈 ${Math.floor(b.totalEarned).toLocaleString()}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += '<div class="btn btn-success" onclick="renderTab(\'buybusiness\')">🏪 КУПИТЬ НОВЫЙ БИЗНЕС</div>';
                html += '</div>';
                content.innerHTML = html;
                
            } else if (tab === 'buybusiness') {
                let html = '<div class="card"><div class="card-title">🏪 КУПИТЬ БИЗНЕС</div>';
                
                const notOwned = gameState.businesses.filter(b => !b.owned);
                if (notOwned.length === 0) {
                    html += '<div style="text-align:center; padding:30px;">ВСЕ БИЗНЕСЫ КУПЛЕНЫ</div>';
                } else {
                    notOwned.forEach(b => {
                        html += `
                            <div class="shop-item">
                                <div class="item-info">
                                    <div class="item-name">${b.emoji} ${b.name}</div>
                                    <div class="item-desc">ДОХОД: ${b.baseIncome}/сек</div>
                                    <div class="item-price">💰 ${b.upgradeCost.toLocaleString()}</div>
                                </div>
                                <button class="buy-btn" onclick="buyBusiness(${b.id})">КУПИТЬ</button>
                            </div>
                        `;
                    });
                }
                
                html += '<div class="btn" onclick="renderTab(\'mybusiness\')">◀ НАЗАД</div>';
                html += '</div>';
                content.innerHTML = html;
                
            } else if (tab === 'property') {
                const housesOwned = gameState.houses.filter(h => h.owned).length;
                const carsOwned = gameState.cars.filter(c => c.owned).length;
                const planesOwned = gameState.planes.filter(p => p.owned).length;
                const shipsOwned = gameState.ships.filter(s => s.owned).length;
                
                content.innerHTML = `
                    <div class="card">
                        <div class="card-title">🏰 НЕДВИЖИМОСТЬ</div>
                        <div class="property-grid">
                            <div class="property-category" onclick="showPropertyCategory('houses')">
                                <span>🏠</span>
                                <div class="category-name">ДОМА</div>
                                <div class="category-count">${housesOwned}/4</div>
                            </div>
                            <div class="property-category" onclick="showPropertyCategory('cars')">
                                <span>🚗</span>
                                <div class="category-name">МАШИНЫ</div>
                                <div class="category-count">${carsOwned}/4</div>
                            </div>
                            <div class="property-category" onclick="showPropertyCategory('planes')">
                                <span>✈️</span>
                                <div class="category-name">САМОЛЕТЫ</div>
                                <div class="category-count">${planesOwned}/4</div>
                            </div>
                            <div class="property-category" onclick="showPropertyCategory('ships')">
                                <span>🚢</span>
                                <div class="category-name">КОРАБЛИ</div>
                                <div class="category-count">${shipsOwned}/4</div>
                            </div>
                        </div>
                        <div class="btn btn-gold" onclick="renderTab('garage')">🚗 МОЙ ГАРАЖ</div>
                        <div class="btn btn-gold" onclick="renderTab('myhouses')">🏠 МОИ ДОМА</div>
                        <div class="btn btn-gold" onclick="renderTab('myplanes')">✈️ МОИ САМОЛЕТЫ</div>
                        <div class="btn btn-gold" onclick="renderTab('myships')">🚢 МОИ КОРАБЛИ</div>
                    </div>
                `;
                
            } else if (tab === 'garage' || tab === 'myhouses' || tab === 'myplanes' || tab === 'myships') {
                let category, title;
                if (tab === 'garage') { category = 'cars'; title = '🚗 МОЙ ГАРАЖ'; }
                else if (tab === 'myhouses') { category = 'houses'; title = '🏠 МОИ ДОМА'; }
                else if (tab === 'myplanes') { category = 'planes'; title = '✈️ МОИ САМОЛЕТЫ'; }
                else if (tab === 'myships') { category = 'ships'; title = '🚢 МОИ КОРАБЛИ'; }
                
                const items = gameState[category];
                let html = `<div class="card"><div class="card-title">${title}</div>`;
                
                items.forEach(item => {
                    if (item.owned) {
                        html += `
                            <div class="property-item">
                                <div class="property-emoji">${item.emoji}</div>
                                <div class="property-details">
                                    <div class="property-title">${item.name}</div>
                                    <div class="property-income">💰 +${item.income}/час</div>
                                </div>
                                <span class="property-owned">ВЛАДЕЮ</span>
                            </div>
                        `;
                    }
                });
                
                html += '<div class="btn" onclick="renderTab(\'property\')">◀ НАЗАД</div>';
                html += '</div>';
                content.innerHTML = html;
                
            } else if (tab === 'stats') {
                const totalIncome = gameState.autoClickerLevel + 
                    gameState.businesses.filter(b => b.owned).reduce((sum, b) => sum + b.baseIncome * b.level, 0);
                
                content.innerHTML = `
                    <div class="card">
                        <div class="card-title">📊 СТАТИСТИКА</div>
                        <div style="background:rgba(255,255,255,0.07); padding:20px; border-radius:15px;">
                            <div style="margin:15px 0; font-size:16px;">👆 КЛИКОВ: ${gameState.totalClicks.toLocaleString()}</div>
                            <div style="margin:15px 0; font-size:16px;">💰 ЗАРАБОТАНО: ${Math.floor(gameState.totalEarned).toLocaleString()}</div>
                            <div style="margin:15px 0; font-size:16px;">⏱️ ДОХОД/СЕК: ${totalIncome}</div>
                            <div style="margin:15px 0; font-size:16px;">🎮 В ИГРЕ: ${Math.floor(gameState.playTime / 60)} МИН</div>
                            <div style="margin:15px 0; font-size:16px;">💎 АЛМАЗЫ: ${gameState.diamonds}</div>
                        </div>
                    </div>
                `;
            }
        }
        
        // ========== ПОКУПКИ ==========
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'];
            if (level >= 5) return;
            if (gameState.balance >= prices[type][level]) {
                gameState.balance -= prices[type][level];
                gameState[type + 'Level']++;
                updateUI();
                saveGame();
            } else alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
        }
        
        function exchangeDiamonds() {
            if (gameState.diamonds >= 1) {
                gameState.diamonds--;
                gameState.balance += 10000;
                updateUI();
                saveGame();
            }
        }
        
        function buyBusiness(id) {
            const business = gameState.businesses.find(b => b.id === id);
            if (!business || business.owned) return;
            if (gameState.balance >= business.upgradeCost) {
                gameState.balance -= business.upgradeCost;
                business.owned = true;
                business.level = 1;
                updateUI();
                saveGame();
                renderTab('mybusiness');
            } else alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
        }
        
        function openBusiness(id) {
            const business = gameState.businesses.find(b => b.id === id);
            const modal = document.getElementById('businessModal');
            const modalTitle = document.getElementById('businessModalTitle');
            const modalContent = document.getElementById('businessModalContent');
            
            modalTitle.textContent = `${business.emoji} ${business.name}`;
            modalContent.innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:48px; margin:20px;">${business.emoji}</div>
                    <div style="margin:15px; font-size:20px;">УРОВЕНЬ: ${business.level}</div>
                    <div style="margin:15px; font-size:18px;">💰 ДОХОД: ${business.baseIncome * business.level}/сек</div>
                    <div style="margin:15px; font-size:18px;">📈 ЗАРАБОТАНО: ${Math.floor(business.totalEarned).toLocaleString()}</div>
                    <button class="btn btn-gold" onclick="upgradeBusiness(${id})" style="margin:20px 0;">
                        🚀 УЛУЧШИТЬ (${(business.upgradeCost * business.level).toLocaleString()}💰)
                    </button>
                </div>
            `;
            modal.classList.add('active');
        }
        
        function upgradeBusiness(id) {
            const business = gameState.businesses.find(b => b.id === id);
            const cost = business.upgradeCost * business.level;
            if (gameState.balance >= cost) {
                gameState.balance -= cost;
                business.level++;
                updateUI();
                saveGame();
                openBusiness(id);
            } else alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            closeBusinessModal();
        }
        
        function closeBusinessModal() {
            document.getElementById('businessModal').classList.remove('active');
        }
        
        // ========== НЕДВИЖИМОСТЬ ==========
        function showPropertyCategory(category) {
            const items = gameState[category];
            const titles = { houses: '🏠 ДОМА', cars: '🚗 МАШИНЫ', planes: '✈️ САМОЛЕТЫ', ships: '🚢 КОРАБЛИ' };
            
            let html = `<div class="card"><div class="card-title">${titles[category]}</div>`;
            
            items.forEach(item => {
                html += `
                    <div class="property-item">
                        <div class="property-emoji">${item.emoji}</div>
                        <div class="property-details">
                            <div class="property-title">${item.name}</div>
                            <div class="property-price">💰 ${item.price.toLocaleString()}</div>
                            <div class="property-income">⏱️ +${item.income}/ЧАС</div>
                        </div>
                        ${item.owned ? 
                            '<span class="property-owned">ВЛАДЕЮ</span>' : 
                            `<button class="btn btn-gold" style="padding:12px 20px;" onclick="buyProperty('${category}', ${item.id})">КУПИТЬ</button>`
                        }
                    </div>
                `;
            });
            
            html += '<div class="btn" onclick="renderTab(\'property\')">◀ НАЗАД</div>';
            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }
        
        function buyProperty(category, id) {
            const item = gameState[category][id];
            if (gameState.balance >= item.price) {
                gameState.balance -= item.price;
                item.owned = true;
                updateUI();
                saveGame();
                showPropertyCategory(category);
            } else alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            gameState.businesses.forEach(b => {
                if (b.owned && b.level > 0) {
                    const income = b.baseIncome * b.level;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                    b.totalEarned += income;
                }
            });
            
            [gameState.houses, gameState.cars, gameState.planes, gameState.ships].forEach(cat => {
                cat.forEach(item => {
                    if (item.owned) {
                        const income = item.income / 3600;
                        gameState.balance += income;
                        gameState.totalEarned += income;
                    }
                });
            });
            
            gameState.playTime++;
            updateUI();
            saveGame();
        }, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            loadGame();
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) document.getElementById('username').textContent = `👑 ${(user.first_name || 'IMPERIA').toUpperCase()}`;
            }
            renderTab('home');
        };
    </script>
</body>
</html>
