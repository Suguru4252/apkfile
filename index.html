<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | Мега-обновление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Main Game Container */
        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(46, 34, 59, 0.95), rgba(26, 15, 36, 0.95));
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        /* World Themes */
        .game-container[data-theme="forest"] { background: linear-gradient(135deg, rgba(30, 50, 30, 0.95), rgba(15, 30, 15, 0.95)); border-color: #4caf50; }
        .game-container[data-theme="volcano"] { background: linear-gradient(135deg, rgba(70, 35, 20, 0.95), rgba(45, 20, 10, 0.95)); border-color: #ff5722; }
        .game-container[data-theme="ice"] { background: linear-gradient(135deg, rgba(30, 55, 75, 0.95), rgba(15, 35, 50, 0.95)); border-color: #00bcd4; }
        .game-container[data-theme="sky"] { background: linear-gradient(135deg, rgba(40, 45, 85, 0.95), rgba(25, 30, 65, 0.95)); border-color: #ffd700; }
        .game-container[data-theme="hell"] { background: linear-gradient(135deg, rgba(70, 25, 40, 0.95), rgba(45, 15, 25, 0.95)); border-color: #ff3366; }
        .game-container[data-theme="paradise"] { background: linear-gradient(135deg, rgba(80, 45, 100, 0.95), rgba(55, 30, 75, 0.95)); border-color: #ff88ff; }

        /* Resources Bar */
        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: transform 0.3s ease;
        }

        .resource-card:hover { transform: translateY(-2px); }
        .resource-icon { font-size: 40px; }
        .resource-info { flex: 1; }
        .resource-name { color: rgba(255,255,255,0.7); font-size: 12px; text-transform: uppercase; }
        .resource-value { color: #ffd700; font-size: 24px; font-weight: bold; }

        /* Main Game Area */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 968px) { .game-area { grid-template-columns: 1fr; } }

        /* Pet Area */
        .pet-area {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .pet-area:active { transform: scale(0.98); }

        .current-pet {
            font-size: 120px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .pet-name { font-size: 24px; font-weight: bold; color: #2a1a3a; margin-top: 10px; }
        .pet-power { color: #ff6600; font-size: 18px; margin-top: 5px; }

        /* Slots Section */
        .slots-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .slots-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .slot-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .slot-card.unlocked { border-color: #ffd700; background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2)); }
        .slot-card:hover { transform: translateY(-2px); border-color: #ffd700; }
        .slot-number { font-size: 24px; font-weight: bold; color: #ffd700; }
        .slot-price { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 5px; }
        .slot-pet-emoji { font-size: 32px; margin-top: 5px; }

        /* Location Selector */
        .location-selector {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .location-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .location-nav {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .location-info {
            flex: 1;
            text-align: center;
        }

        .location-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .location-multiplier {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .location-progress {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .location-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8800);
            width: 0%;
            transition: width 0.3s;
        }

        /* Side Panel */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        .world-selector, .boost-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
        }

        .world-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .world-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border-color: #fff;
            transform: scale(1.05);
        }

        .world-btn:hover { transform: translateY(-2px); }

        .boost-timer {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
        }

        /* Eggs Section */
        .eggs-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .eggs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .egg-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .egg-card:hover { transform: translateY(-5px); border-color: #ffd700; }
        .egg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .egg-emoji { font-size: 48px; }
        .egg-title { font-size: 18px; font-weight: bold; color: #ffd700; }
        .egg-price { color: #ffd700; font-size: 16px; margin: 8px 0; display: inline-block; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; }
        .pet-list { margin-top: 10px; border-top: 1px solid rgba(255,215,0,0.3); padding-top: 10px; max-height: 180px; overflow-y: auto; }
        .pet-chance { font-size: 11px; padding: 3px 0; display: flex; justify-content: space-between; color: rgba(255,255,255,0.8); }
        .pet-chance span:first-child { color: #ffd700; }

        /* Pets Collection */
        .pets-collection {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .pet-card.active-pet {
            border: 2px solid #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
            transform: scale(1.02);
        }

        .pet-card-emoji { font-size: 40px; }
        .pet-card-name { font-size: 11px; color: white; font-weight: bold; }
        .pet-card-power { font-size: 10px; color: #ffd700; }
        .pet-card-rarity { font-size: 9px; margin-top: 4px; padding: 2px 6px; border-radius: 10px; display: inline-block; }

        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 4px 8px;
            border-radius: 15px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        /* Upgrades Section */
        .upgrades-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .upgrade-card:hover { transform: translateY(-2px); border-color: #ffd700; }

        /* Floating Effects */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.1); }
        }

        .floating-effect {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            animation: floatRandom 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatRandom {
            0% { opacity: 1; transform: translate(0, 0) scale(0.8); }
            100% { opacity: 0; transform: translate(var(--dx, 50px), var(--dy, -80px)) scale(1.2); }
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #2a1a3a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:active { transform: scale(0.95); }
        .shake { animation: shake 0.2s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Resources -->
        <div class="resources-bar">
            <div class="resource-card"><div class="resource-icon">💰</div><div class="resource-info"><div class="resource-name">Монеты</div><div class="resource-value" id="coins">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">💎</div><div class="resource-info"><div class="resource-name">Алмазы</div><div class="resource-value" id="gems">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">⚡</div><div class="resource-info"><div class="resource-name">Сила клика</div><div class="resource-value" id="clickPower">1</div></div></div>
            <div class="resource-card"><div class="resource-icon">🚀</div><div class="resource-info"><div class="resource-name">Множитель</div><div class="resource-value" id="multiplier">1x</div></div></div>
        </div>

        <div class="game-area">
            <div>
                <!-- Pet Area -->
                <div class="pet-area" id="petArea">
                    <div class="current-pet" id="currentPetEmoji">🐣</div>
                    <div class="pet-name" id="currentPetName">Маленький питомец</div>
                    <div class="pet-power" id="currentPetPower">Сила: 1</div>
                </div>

                <!-- Slots Section -->
                <div class="slots-section">
                    <h3 style="color: #ffd700;">📦 Активные питомцы (слоты)</h3>
                    <div class="slots-grid" id="slotsContainer"></div>
                    <button class="btn" id="buySlotBtn" style="margin-top: 10px;">🔓 Купить слот</button>
                </div>

                <!-- Location Selector -->
                <div class="location-selector">
                    <h3 style="color: #ffd700;">📍 Локация в мире</h3>
                    <div class="location-controls">
                        <button class="location-nav" id="prevLocationBtn">◀</button>
                        <div class="location-info">
                            <div class="location-name" id="locationName">Локация 1</div>
                            <div class="location-multiplier" id="locationMultiplier">Множитель: x1.00</div>
                            <div class="location-progress">
                                <div class="location-progress-fill" id="locationProgress"></div>
                            </div>
                        </div>
                        <button class="location-nav" id="nextLocationBtn">▶</button>
                    </div>
                </div>
            </div>

            <!-- Side Panel -->
            <div class="side-panel">
                <div class="world-selector">
                    <h3 style="color: #ffd700;">🌍 Миры</h3>
                    <div class="world-buttons" id="worldsContainer"></div>
                </div>
                <div class="boost-section">
                    <h3 style="color: #ffd700;">⚡ Активные бусты</h3>
                    <div id="boostsContainer"></div>
                    <button class="btn" id="buyBoostBtn">💪 Купить буст (100💎)</button>
                </div>
            </div>
        </div>

        <!-- Eggs -->
        <div class="eggs-section">
            <h2 style="color: #ffd700; text-align: center;" id="eggsTitle">🥚 Яйца с питомцами 🥚</h2>
            <div class="eggs-grid" id="eggsContainer"></div>
        </div>

        <!-- Pets Collection -->
        <div class="pets-collection">
            <h2 style="color: #ffd700; text-align: center;">🐕 Коллекция питомцев 🐈</h2>
            <div class="pets-stats">
                <span>📊 Всего: <span id="totalPets">0</span></span>
                <span>⭐ Общая сила: <span id="totalPower">0</span></span>
                <span>💰 Стоимость: <span id="totalSellValue">0</span>💰</span>
            </div>
            <div class="pets-grid" id="petsContainer"></div>
            <button class="btn" id="sellAllBtn" style="background: linear-gradient(135deg, #ff4444, #aa2222);">💰 ПРОДАТЬ ВСЕХ (КРОМЕ АКТИВНЫХ) 💰</button>
        </div>

        <!-- Upgrades -->
        <div class="upgrades-section">
            <h2 style="color: #ffd700; text-align: center;">✨ Улучшения ✨</h2>
            <div class="upgrades-grid" id="upgradesContainer"></div>
        </div>
    </div>

    <script>
        // Генерация 99 локаций для каждого мира
        function generateLocations() {
            const locations = [];
            for (let i = 1; i <= 99; i++) {
                let multiplier = 1 + (i - 1) * 0.05;
                let unlockCost = Math.floor(500 * Math.pow(1.1, i - 1));
                locations.push({
                    id: i,
                    name: `Локация ${i}`,
                    multiplier: multiplier,
                    unlockCost: unlockCost,
                    unlocked: i === 1
                });
            }
            return locations;
        }

        // Питомцы для каждой локации (уникальные)
        function generatePetsForLocation(worldTheme, locationId) {
            const basePower = Math.floor(locationId * 1.5);
            const rarities = ['common', 'rare', 'epic', 'legendary', 'mythic'];
            const petEmojis = {
                forest: ['🐣', '🐥', '🐦', '🐿️', '🐱', '🐶', '🦊', '🐼', '🐨', '🦌', '🐻', '🦄', '🐉', '🌿', '⭐'],
                volcano: ['🦎', '🐍', '🔥', '🐉', '🌋', '💥', '🗿', '😈', '💀', '👑'],
                ice: ['🐧', '🐻‍❄️', '❄️', '⛄', '🧊', '🗻', '💎', '🌙'],
                sky: ['🐦', '🦅', '⚡', '🌈', '🌙', '⭐', '🌟', '☁️'],
                hell: ['🦇', '👻', '😈', '💀', '👁️', '🌑', '🔥'],
                paradise: ['🕊️', '🦄', '✨', '🌟', '👑', '🌌', '⭐']
            };
            const emojis = petEmojis[worldTheme] || petEmojis.forest;
            const pets = [];
            for (let i = 0; i < 5; i++) {
                const rarity = rarities[Math.min(i, rarities.length - 1)];
                let power = basePower * (i + 1);
                if (rarity === 'rare') power *= 2;
                if (rarity === 'epic') power *= 5;
                if (rarity === 'legendary') power *= 15;
                if (rarity === 'mythic') power *= 50;
                pets.push({
                    emoji: emojis[Math.floor(Math.random() * emojis.length)],
                    name: `${rarity.charAt(0).toUpperCase() + rarity.slice(1)} питомец ${locationId}-${i + 1}`,
                    power: Math.floor(power),
                    rarity: rarity
                });
            }
            return pets;
        }

        class PetSimulator99 {
            constructor() {
                this.coins = 5000;
                this.gems = 100;
                this.clickPower = 1;
                this.totalClicks = 0;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                
                // World
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌳 Лесная чаща", multiplier: 1, unlocked: true, cost: 0, icon: "🌳", theme: "forest", locations: generateLocations() },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 5000, icon: "🔥", theme: "volcano", locations: generateLocations() },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 20000, icon: "❄️", theme: "ice", locations: generateLocations() },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 80000, icon: "⚡", theme: "sky", locations: generateLocations() },
                    { name: "💀 Преисподняя", multiplier: 8, unlocked: false, cost: 250000, icon: "💀", theme: "hell", locations: generateLocations() },
                    { name: "👑 Райский сад", multiplier: 12, unlocked: false, cost: 1000000, icon: "👑", theme: "paradise", locations: generateLocations() }
                ];
                
                this.currentLocation = 0;
                this.pets = [];
                this.activeSlots = 1;
                this.maxSlots = 99;
                this.slotPets = [null];
                this.slotPrices = [0, 1000, 5000, 25000, 100000, 500000, 2500000, 10000000, 50000000, 100000000];
                
                // Upgrades
                this.upgrades = [
                    { id: "click", name: "💪 Усиление клика", desc: "+5 к силе", price: 500, priceType: "coins", effect: () => { this.clickPower += 5; }, level: 0, basePrice: 500 },
                    { id: "auto", name: "🤖 Авто-кликер", desc: "+1 клик/сек", price: 800, priceType: "coins", effect: () => { this.autoClickerLevel++; this.startAutoClicker(); }, level: 0, basePrice: 800 },
                    { id: "multiplier", name: "✨ Множитель", desc: "+0.5x доход", price: 1500, priceType: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, basePrice: 1500 }
                ];
                
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                
                this.init();
            }
            
            formatNumber(num) {
                if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B';
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            }
            
            init() {
                this.loadGame();
                this.renderWorlds();
                this.renderSlots();
                this.renderLocation();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAutoClicker();
                this.setupEventListeners();
                this.startBoostTimer();
                this.updateTheme();
            }
            
            setupEventListeners() {
                document.getElementById('petArea').addEventListener('click', (e) => this.clickPet(e));
                document.getElementById('buyBoostBtn').addEventListener('click', () => this.buyBoost());
                document.getElementById('sellAllBtn').addEventListener('click', () => this.sellAllPets());
                document.getElementById('buySlotBtn').addEventListener('click', () => this.buySlot());
                document.getElementById('prevLocationBtn').addEventListener('click', () => this.changeLocation(-1));
                document.getElementById('nextLocationBtn').addEventListener('click', () => this.changeLocation(1));
            }
            
            clickPet(event) {
                let locationBonus = this.worlds[this.currentWorld].locations[this.currentLocation].multiplier;
                let worldBonus = this.worlds[this.currentWorld].multiplier;
                let boostBonus = this.boostActive ? 2 : 1;
                let slotBonus = this.activeSlots;
                let earned = Math.floor(this.clickPower * locationBonus * worldBonus * this.multiplier * boostBonus * slotBonus);
                
                this.coins += earned;
                this.totalClicks++;
                
                // Шанс 5% на алмазы (появляются рядом с кликом)
                if (Math.random() < 0.05) {
                    const diamondsEarned = Math.floor(Math.random() * 100) + 1;
                    this.gems += diamondsEarned;
                    this.showRandomEffect(`💎 +${diamondsEarned}💎`, event.clientX, event.clientY, '#ff88ff');
                }
                
                // Шанс 10% на критический удар (появляется рядом)
                const isCrit = Math.random() < 0.1;
                if (isCrit) {
                    earned *= 2;
                    this.coins += earned;
                    this.showRandomEffect(`✨ КРИТИЧЕСКИЙ УДАР! x2 ✨`, event.clientX + 50, event.clientY - 30, '#ff3366');
                }
                
                this.showRandomEffect(`+${this.formatNumber(earned)}💰`, event.clientX, event.clientY, '#ffd700');
                
                const petArea = document.getElementById('petArea');
                petArea.classList.add('shake');
                setTimeout(() => petArea.classList.remove('shake'), 200);
                
                this.updateUI();
                this.saveGame();
            }
            
            showRandomEffect(text, x, y, color) {
                const floating = document.createElement('div');
                floating.className = 'floating-effect';
                floating.textContent = text;
                const randomX = (Math.random() - 0.5) * 100;
                const randomY = (Math.random() - 0.5) * 80 - 20;
                floating.style.left = `${x + randomX}px`;
                floating.style.top = `${y + randomY}px`;
                floating.style.color = color;
                floating.style.setProperty('--dx', `${randomX + 50}px`);
                floating.style.setProperty('--dy', `${randomY - 60}px`);
                floating.style.fontSize = `${Math.floor(Math.random() * 10) + 20}px`;
                document.body.appendChild(floating);
                setTimeout(() => floating.remove(), 800);
            }
            
            buySlot() {
                const nextSlot = this.activeSlots;
                if (nextSlot >= this.maxSlots) {
                    this.showMessage("❌ Максимум слотов достигнут! (99)");
                    return;
                }
                let price = 1000 * Math.pow(2, nextSlot - 1);
                if (nextSlot > 10) price = 100000 * Math.pow(1.5, nextSlot - 10);
                price = Math.floor(price);
                
                if (this.gems >= price) {
                    this.gems -= price;
                    this.activeSlots++;
                    this.slotPets.push(null);
                    this.showMessage(`🔓 Открыт слот ${this.activeSlots}! Цена: ${this.formatNumber(price)}💎`);
                    this.renderSlots();
                    this.updateUI();
                    this.saveGame();
                } else {
                    this.showMessage(`❌ Нужно ${this.formatNumber(price)} алмазов!`);
                }
            }
            
            assignPetToSlot(slotIndex, pet) {
                if (slotIndex < this.activeSlots) {
                    this.slotPets[slotIndex] = pet;
                    this.renderSlots();
                    this.saveGame();
                }
            }
            
            changeLocation(delta) {
                const newLocation = this.currentLocation + delta;
                if (newLocation >= 0 && newLocation < this.worlds[this.currentWorld].locations.length) {
                    const location = this.worlds[this.currentWorld].locations[newLocation];
                    if (location.unlocked) {
                        this.currentLocation = newLocation;
                        this.renderLocation();
                        this.renderEggs();
                        this.updateUI();
                        this.saveGame();
                    } else {
                        if (this.coins >= location.unlockCost) {
                            this.coins -= location.unlockCost;
                            location.unlocked = true;
                            this.currentLocation = newLocation;
                            this.renderLocation();
                            this.renderEggs();
                            this.updateUI();
                            this.saveGame();
                            this.showMessage(`🔓 Открыта ${location.name}! Множитель: x${location.multiplier.toFixed(2)}`);
                        } else {
                            this.showMessage(`❌ Нужно ${this.formatNumber(location.unlockCost)} монет для открытия!`);
                        }
                    }
                }
            }
            
            openEgg(egg) {
                if (this.coins >= egg.price) {
                    this.coins -= egg.price;
                } else {
                    this.showMessage("❌ Недостаточно монет!");
                    return;
                }
                
                const newPet = { ...egg.pets[Math.floor(Math.random() * egg.pets.length)], id: Date.now() + Math.random() };
                this.pets.push(newPet);
                
                // Автоматически назначить в пустой слот
                for (let i = 0; i < this.activeSlots; i++) {
                    if (!this.slotPets[i]) {
                        this.assignPetToSlot(i, newPet);
                        break;
                    }
                }
                
                this.showMessage(`🎉 Вы получили ${newPet.name}! Сила: ${newPet.power} 🎉`);
                this.renderPets();
                this.renderSlots();
                this.updateUI();
                this.saveGame();
            }
            
            selectPet(pet) {
                // Найти первый пустой слот и назначить
                for (let i = 0; i < this.activeSlots; i++) {
                    if (!this.slotPets[i]) {
                        this.assignPetToSlot(i, pet);
                        return;
                    }
                }
                this.showMessage("❌ Нет свободных слотов! Купите больше слотов за алмазы!");
            }
            
            removePetFromSlot(slotIndex) {
                this.slotPets[slotIndex] = null;
                this.renderSlots();
                this.saveGame();
            }
            
            sellPet(petId) {
                const petIndex = this.pets.findIndex(p => p.id === petId);
                if (petIndex === -1) return;
                const pet = this.pets[petIndex];
                
                // Проверить, не в слоте ли питомец
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i] && this.slotPets[i].id === petId) {
                        this.showMessage("❌ Сначала уберите питомца из слота!");
                        return;
                    }
                }
                
                const sellValue = Math.floor(pet.power * 10);
                this.coins += sellValue;
                this.pets.splice(petIndex, 1);
                this.showMessage(`💰 Продано: ${pet.name} за ${this.formatNumber(sellValue)} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            sellAllPets() {
                const activePetIds = this.slotPets.filter(p => p !== null).map(p => p.id);
                const toSell = this.pets.filter(p => !activePetIds.includes(p.id));
                if (toSell.length === 0) {
                    this.showMessage("❌ Нет питомцев для продажи!");
                    return;
                }
                let totalSell = 0;
                for (const pet of toSell) totalSell += Math.floor(pet.power * 10);
                this.coins += totalSell;
                this.pets = this.pets.filter(p => activePetIds.includes(p.id));
                this.showMessage(`💰 Продано ${toSell.length} питомцев! Получено: ${this.formatNumber(totalSell)} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            updateClickPower() {
                let totalPower = 0;
                for (let i = 0; i < this.activeSlots; i++) {
                    if (this.slotPets[i]) totalPower += this.slotPets[i].power;
                }
                this.clickPower = Math.max(1, totalPower);
                this.updateUI();
            }
            
            buyUpgrade(upgrade) {
                let cost = upgrade.price;
                if (upgrade.priceType === "coins" && this.coins >= cost) {
                    this.coins -= cost;
                } else if (upgrade.priceType === "gems" && this.gems >= cost) {
                    this.gems -= cost;
                } else {
                    this.showMessage("Недостаточно ресурсов!");
                    return;
                }
                
                upgrade.effect();
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.basePrice * Math.pow(1.5, upgrade.level));
                
                this.updateUI();
                this.renderUpgrades();
                this.saveGame();
            }
            
            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.showMessage("⚡ Буст активирован на 5 минут! x2 к доходу ⚡");
                    this.renderBoosts();
                    this.saveGame();
                } else {
                    this.showMessage("Нужно 100 алмазов!");
                }
            }
            
            unlockWorld(worldIndex) {
                const world = this.worlds[worldIndex];
                if (!world.unlocked && this.coins >= world.cost) {
                    this.coins -= world.cost;
                    world.unlocked = true;
                    this.showMessage(`🌍 Мир "${world.name}" открыт!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                } else if (!world.unlocked) {
                    this.showMessage(`Нужно ${this.formatNumber(world.cost)} монет!`);
                }
            }
            
            changeWorld(worldIndex) {
                if (this.worlds[worldIndex].unlocked) {
                    this.currentWorld = worldIndex;
                    this.currentLocation = 0;
                    this.renderWorlds();
                    this.renderLocation();
                    this.renderEggs();
                    this.updateTheme();
                    this.updateUI();
                    this.saveGame();
                }
            }
            
            updateTheme() {
                const theme = this.worlds[this.currentWorld].theme;
                const container = document.getElementById('gameContainer');
                container.setAttribute('data-theme', theme);
                const themes = {
                    forest: 'linear-gradient(135deg, #0a2a0a 0%, #051005 100%)',
                    volcano: 'linear-gradient(135deg, #4a1a0a 0%, #2a0a05 100%)',
                    ice: 'linear-gradient(135deg, #1a3a5a 0%, #0a1a2a 100%)',
                    sky: 'linear-gradient(135deg, #2a2a5a 0%, #0a0a2a 100%)',
                    hell: 'linear-gradient(135deg, #4a0a2a 0%, #2a050a 100%)',
                    paradise: 'linear-gradient(135deg, #4a2a6a 0%, #2a0a4a 100%)'
                };
                document.body.style.background = themes[theme] || 'linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%)';
            }
            
            renderSlots() {
                const container = document.getElementById('slotsContainer');
                container.innerHTML = '';
                for (let i = 0; i < this.activeSlots; i++) {
                    const pet = this.slotPets[i];
                    const card = document.createElement('div');
                    card.className = `slot-card ${pet ? 'unlocked' : ''}`;
                    card.innerHTML = `
                        <div class="slot-number">Слот ${i + 1}</div>
                        ${pet ? `<div class="slot-pet-emoji">${pet.emoji}</div><div style="font-size: 10px;">${pet.name}</div><div style="font-size: 9px; color:#ffd700;">⚡${pet.power}</div>` : '<div style="font-size: 12px;">🔓 Пусто</div>'}
                        ${pet ? `<button class="btn" style="margin-top: 5px; padding: 3px 8px; font-size: 10px;" onclick="game.removePetFromSlot(${i})">✖ Убрать</button>` : ''}
                    `;
                    container.appendChild(card);
                }
                this.updateClickPower();
            }
            
            renderLocation() {
                const location = this.worlds[this.currentWorld].locations[this.currentLocation];
                document.getElementById('locationName').textContent = location.name;
                document.getElementById('locationMultiplier').textContent = `Множитель: x${location.multiplier.toFixed(2)}`;
                const progress = ((this.currentLocation + 1) / 99) * 100;
                document.getElementById('locationProgress').style.width = `${progress}%`;
            }
            
            renderWorlds() {
                const container = document.getElementById('worldsContainer');
                container.innerHTML = '';
                this.worlds.forEach((world, index) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${index === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `<div style="font-size: 24px;">${world.icon}</div><div style="font-size: 11px;">${world.name}</div><div style="font-size: 10px;">x${world.multiplier}</div>${!world.unlocked ? `<div style="font-size: 10px;">💰${this.formatNumber(world.cost)}</div>` : ''}`;
                    btn.onclick = () => world.unlocked ? this.changeWorld(index) : this.unlockWorld(index);
                    container.appendChild(btn);
                });
            }
            
            renderEggs() {
                const container = document.getElementById('eggsContainer');
                const location = this.worlds[this.currentWorld].locations[this.currentLocation];
                const pets = generatePetsForLocation(this.worlds[this.currentWorld].theme, location.id);
                
                const eggs = [
                    { id: "common", name: "🥚 Обычное яйцо", price: 100 * location.id, icon: "🥚", pets: pets.slice(0, 1) },
                    { id: "rare", name: "🔵 Редкое яйцо", price: 500 * location.id, icon: "🔵🥚", pets: pets.slice(1, 2) },
                    { id: "epic", name: "🟣 Эпическое яйцо", price: 2000 * location.id, icon: "🟣🥚", pets: pets.slice(2, 3) },
                    { id: "legendary", name: "⭐ Легендарное яйцо", price: 8000 * location.id, icon: "⭐🥚", pets: pets.slice(3, 4) },
                    { id: "mythic", name: "💎 Мифическое яйцо", price: 25000 * location.id, icon: "💎🥚", pets: pets.slice(4, 5) }
                ];
                
                container.innerHTML = '';
                eggs.forEach(egg => {
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header"><div class="egg-emoji">${egg.icon}</div><div class="egg-title">${egg.name}</div></div>
                        <div class="egg-price">💰 ${this.formatNumber(egg.price)} монет</div>
                        <div class="pet-list"><div style="font-size: 11px; color: #ffd700;">📋 Кто может выпасть:</div>
                        ${egg.pets.map(p => `<div class="pet-chance"><span>${p.emoji} ${p.name}</span><span>⚡${p.power}</span></div>`).join('')}
                        </div>
                    `;
                    card.onclick = () => this.openEgg(egg);
                    container.appendChild(card);
                });
                document.getElementById('eggsTitle').innerHTML = `🥚 ${location.name} ЯЙЦА 🥚`;
            }
            
            renderPets() {
                const container = document.getElementById('petsContainer');
                container.innerHTML = '';
                const activeIds = this.slotPets.filter(p => p !== null).map(p => p.id);
                const sortedPets = [...this.pets].sort((a,b) => b.power - a.power);
                sortedPets.forEach(pet => {
                    const isActive = activeIds.includes(pet.id);
                    const card = document.createElement('div');
                    card.className = `pet-card ${isActive ? 'active-pet' : ''}`;
                    const rarityColors = { common: '#95a5a6', rare: '#3498db', epic: '#9b59b6', legendary: '#f39c12', mythic: '#e91e63' };
                    card.innerHTML = `
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡${pet.power}</div>
                        <div class="pet-card-rarity" style="background: ${rarityColors[pet.rarity] || '#95a5a6'}">${pet.rarity}</div>
                        ${!isActive ? `<button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 ${this.formatNumber(Math.floor(pet.power * 10))}💰</button>` : '<div style="font-size: 10px; color:#ffd700;">✅ В слоте</div>'}
                    `;
                    card.onclick = (e) => { if(e.target !== card.querySelector('.sell-btn')) this.selectPet(pet); };
                    container.appendChild(card);
                });
                document.getElementById('totalPets').textContent = this.pets.length;
                const totalPower = this.pets.reduce((sum, p) => sum + p.power, 0);
                document.getElementById('totalPower').textContent = this.formatNumber(totalPower);
                const totalSell = this.pets.reduce((sum, p) => sum + Math.floor(p.power * 10), 0);
                document.getElementById('totalSellValue').textContent = this.formatNumber(totalSell);
            }
            
            renderUpgrades() {
                const container = document.getElementById('upgradesContainer');
                container.innerHTML = '';
                this.upgrades.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<div class="upgrade-name">${up.name}</div><div class="upgrade-desc">${up.desc}</div><div class="upgrade-price">${up.priceType === 'coins' ? '💰' : '💎'} ${this.formatNumber(up.price)}</div><div>Уровень: ${up.level}</div>`;
                    card.onclick = () => this.buyUpgrade(up);
                    container.appendChild(card);
                });
            }
            
            renderBoosts() {
                const container = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const remaining = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;
                    container.innerHTML = `<div class="boost-timer"><div style="color:#ffd700;">⚡ Активен x2 ⚡</div><div>Осталось: ${minutes}:${seconds.toString().padStart(2,'0')}</div></div>`;
                } else {
                    container.innerHTML = `<div class="boost-timer"><div>💤 Нет бустов</div><div>Купи за 100💎</div></div>`;
                }
            }
            
            updateUI() {
                document.getElementById('coins').textContent = this.formatNumber(Math.floor(this.coins));
                document.getElementById('gems').textContent = this.formatNumber(Math.floor(this.gems));
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
            }
            
            showMessage(text) {
                const msg = document.createElement('div');
                msg.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:12px 24px;border-radius:40px;z-index:1000;animation:fadeOut 2s forwards;font-weight:bold;border:1px solid #ffd700;`;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
            
            startAutoClicker() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        let locationBonus = this.worlds[this.currentWorld].locations[this.currentLocation].multiplier;
                        let worldBonus = this.worlds[this.currentWorld].multiplier;
                        let boostBonus = this.boostActive ? 2 : 1;
                        let slotBonus = this.activeSlots;
                        let earned = Math.floor(this.autoClickerLevel * 8 * locationBonus * worldBonus * this.multiplier * boostBonus * slotBonus);
                        this.coins += earned;
                        this.updateUI();
                        this.saveGame();
                    }
                }, 1000);
            }
            
            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.showMessage("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.saveGame();
                    }
                }, 1000);
            }
            
            saveGame() {
                const save = {
                    coins: this.coins, gems: this.gems, clickPower: this.clickPower, totalClicks: this.totalClicks,
                    multiplier: this.multiplier, currentWorld: this.currentWorld, currentLocation: this.currentLocation,
                    worlds: this.worlds, pets: this.pets, slotPets: this.slotPets, activeSlots: this.activeSlots,
                    upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price })),
                    autoClickerLevel: this.autoClickerLevel, boostActive: this.boostActive, boostEndTime: this.boostEndTime
                };
                localStorage.setItem('petSimulatorMega', JSON.stringify(save));
            }
            
            loadGame() {
                const save = localStorage.getItem('petSimulatorMega');
                if (save) {
                    const data = JSON.parse(save);
                    this.coins = data.coins; this.gems = data.gems; this.clickPower = data.clickPower;
                    this.totalClicks = data.totalClicks; this.multiplier = data.multiplier;
                    this.currentWorld = data.currentWorld; this.currentLocation = data.currentLocation || 0;
                    this.worlds = data.worlds; this.pets = data.pets; this.slotPets = data.slotPets || [null];
                    this.activeSlots = data.activeSlots || 1;
                    this.autoClickerLevel = data.autoClickerLevel;
                    this.boostActive = data.boostActive; this.boostEndTime = data.boostEndTime;
                    if (data.upgrades) this.upgrades.forEach((u, i) => { if (data.upgrades[i]) { u.level = data.upgrades[i].level; u.price = data.upgrades[i].price; } });
                }
                if (!this.worlds[0].locations) {
                    this.worlds.forEach(w => w.locations = generateLocations());
                }
                if (!this.slotPets || this.slotPets.length < this.activeSlots) {
                    this.slotPets = Array(this.activeSlots).fill(null);
                }
            }
        }
        
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }`;
        document.head.appendChild(style);
        
        const game = new PetSimulator99();
        window.game = game;
    </script>
</body>
</html>
