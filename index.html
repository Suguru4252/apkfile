<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 10px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 12px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 10px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 3px;
            border-radius: 10px;
            flex: 1;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 9px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: white;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        /* Главная страница */
        #home-content {
            min-height: 100%;
            cursor: pointer;
        }
        
        .clicker-area {
            text-align: center;
            pointer-events: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            pointer-events: none;
        }
        
        .click-btn span {
            font-size: 18px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
            animation: pulse 2s infinite;
            text-align: center;
        }
        
        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 8px;
        }
        
        /* Кнопки */
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 16px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-small {
            padding: 10px 15px;
            font-size: 14px;
        }
        
        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .nav-item span {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        /* Магазин */
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .item-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 15px;
        }
        
        .item-level {
            color: #ff9800;
            font-size: 13px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Сетка недвижимости */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
        }
        
        .property-category:active {
            transform: scale(0.95);
            background: rgba(255, 215, 0, 0.15);
        }
        
        .property-category span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* Список имущества */
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 36px;
            width: 60px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 3px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 13px;
        }
        
        .property-owned {
            background: #2e7d32;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #ffd700;
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .business-item:active {
            transform: scale(0.98);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 15px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 13px;
            color: #ff9800;
            font-weight: bold;
            text-align: center;
            margin: 5px 0;
        }
        
        .upgrade-cost {
            font-size: 13px;
            color: #4CAF50;
            text-align: center;
            margin: 5px 0;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 25px;
            padding: 25px;
            max-width: 320px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .modal-stat {
            font-size: 16px;
            margin: 12px 0;
            text-align: center;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            border: none;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        /* Статистика */
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 16px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">IMPERIA</div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <!-- Контент -->
        <div class="content" id="content"></div>
        
        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>МОЙ БИЗНЕС</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <!-- Модальное окно бизнеса -->
    <div class="modal" id="businessModal">
        <div class="modal-content">
            <div class="modal-title" id="businessModalTitle">УПРАВЛЕНИЕ БИЗНЕСОМ</div>
            <div id="businessModalContent"></div>
            <div class="close-btn" onclick="closeBusinessModal()">ЗАКРЫТЬ</div>
        </div>
    </div>
    
    <!-- Модальное окно сообщений -->
    <div class="modal" id="messageModal">
        <div class="modal-content">
            <div class="modal-title" id="messageModalTitle">СООБЩЕНИЕ</div>
            <div id="messageModalContent" style="text-align:center; font-size:18px; margin:20px;"></div>
            <div class="close-btn" onclick="closeMessageModal()">ОК</div>
        </div>
    </div>

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let gameState = {
            // Ресурсы
            balance: 0,
            diamonds: 10,
            exp: 0,
            level: 1,
            
            // Улучшения
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            
            // Статистика
            totalClicks: 0,
            totalEarned: 0,
            playTime: 0,
            lastOnlineTime: Date.now(),
            
            // БИЗНЕСЫ (10 штук, максимум 20 уровней)
            businesses: [
                { id: 0, name: "🚕 ТАКСОПАРК", level: 0, maxLevel: 20, baseIncome: 1, upgradeCost: 100, upgradeTime: 30, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 1, name: "🍔 РЕСТОРАН", level: 0, maxLevel: 20, baseIncome: 2, upgradeCost: 500, upgradeTime: 60, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 2, name: "⛽ ЗАПРАВКА", level: 0, maxLevel: 20, baseIncome: 5, upgradeCost: 2500, upgradeTime: 120, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 3, name: "🏭 ЗАВОД", level: 0, maxLevel: 20, baseIncome: 10, upgradeCost: 10000, upgradeTime: 180, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 4, name: "🏨 ОТЕЛЬ", level: 0, maxLevel: 20, baseIncome: 20, upgradeCost: 50000, upgradeTime: 300, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 5, name: "🎰 КАЗИНО", level: 0, maxLevel: 20, baseIncome: 50, upgradeCost: 250000, upgradeTime: 600, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 6, name: "🏦 БАНК", level: 0, maxLevel: 20, baseIncome: 100, upgradeCost: 1000000, upgradeTime: 1200, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 7, name: "🛳️ ПОРТ", level: 0, maxLevel: 20, baseIncome: 200, upgradeCost: 5000000, upgradeTime: 2400, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 8, name: "✈️ АЭРОПОРТ", level: 0, maxLevel: 20, baseIncome: 500, upgradeCost: 25000000, upgradeTime: 4800, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 9, name: "🏛️ ИМПЕРИЯ", level: 0, maxLevel: 20, baseIncome: 1000, upgradeCost: 100000000, upgradeTime: 9600, upgradeEnd: 0, owned: false, totalEarned: 0 }
            ],
            
            // НЕДВИЖИМОСТЬ
            houses: [
                { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 50000, income: 5, owned: false },
                { id: 1, name: "ДОМ", emoji: "🏠", price: 500000, income: 50, owned: false },
                { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 5000000, income: 500, owned: false },
                { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 50000000, income: 5000, owned: false }
            ],
            cars: [
                { id: 0, name: "ЛАДА", emoji: "🚗", price: 20000, income: 2, owned: false },
                { id: 1, name: "МЕРСЕДЕС", emoji: "🚘", price: 200000, income: 20, owned: false },
                { id: 2, name: "ФЕРРАРИ", emoji: "🏎️", price: 2000000, income: 200, owned: false },
                { id: 3, name: "БУГАТТИ", emoji: "🚀", price: 20000000, income: 2000, owned: false }
            ],
            planes: [
                { id: 0, name: "КУКУРУЗНИК", emoji: "✈️", price: 100000, income: 10, owned: false },
                { id: 1, name: "БОИНГ", emoji: "🛩️", price: 1000000, income: 100, owned: false },
                { id: 2, name: "ЧАСТНЫЙ", emoji: "🛫", price: 10000000, income: 1000, owned: false },
                { id: 3, name: "РЕАКТИВНЫЙ", emoji: "🛬", price: 100000000, income: 10000, owned: false }
            ],
            ships: [
                { id: 0, name: "ЛОДКА", emoji: "🛶", price: 30000, income: 3, owned: false },
                { id: 1, name: "КАРТЕР", emoji: "⛵", price: 300000, income: 30, owned: false },
                { id: 2, name: "ЯХТА", emoji: "🛥️", price: 3000000, income: 300, owned: false },
                { id: 3, name: "ЛАЙНЕР", emoji: "🚢", price: 30000000, income: 3000, owned: false }
            ]
        };
        
        // Цены улучшений
        const upgradePrices = {
            clickPower: [1000, 5000, 25000, 125000, 625000],
            autoClicker: [2000, 10000, 50000, 250000, 1250000],
            crit: [5000, 25000, 125000, 625000, 3125000]
        };
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaFull2026');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {}
            }
            
            // Оффлайн доход
            const now = Date.now();
            const secondsPassed = Math.floor((now - gameState.lastOnlineTime) / 1000);
            
            if (secondsPassed > 30) {
                let offlineIncome = gameState.autoClickerLevel * secondsPassed;
                
                gameState.businesses.forEach(b => {
                    if (b.owned && b.level > 0) {
                        offlineIncome += b.baseIncome * b.level * secondsPassed;
                        b.totalEarned += b.baseIncome * b.level * secondsPassed;
                    }
                });
                
                if (offlineIncome > 0) {
                    gameState.balance += Math.floor(offlineIncome);
                    gameState.totalEarned += Math.floor(offlineIncome);
                    showMessage(`⏱️ ОФФЛАЙН ДОХОД: +${Math.floor(offlineIncome)}💰`);
                }
            }
            
            gameState.lastOnlineTime = now;
            updateUI();
            checkBusinessUpgrades();
        }
        
        function saveGame() {
            gameState.lastOnlineTime = Date.now();
            localStorage.setItem('imperiaFull2026', JSON.stringify(gameState));
        }
        
        function showMessage(text) {
            const modal = document.getElementById('messageModal');
            const content = document.getElementById('messageModalContent');
            content.textContent = text;
            modal.classList.add('active');
        }
        
        function closeMessageModal() {
            document.getElementById('messageModal').classList.remove('active');
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(gameState.balance).toLocaleString();
            document.getElementById('diamonds').textContent = gameState.diamonds;
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 1000;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            const activeTab = document.querySelector('.nav-item.active')?.dataset.tab || 'home';
            renderTab(activeTab);
        }
        
        // ========== КЛИК ==========
        function handleClick() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance += earned;
            gameState.totalClicks++;
            gameState.totalEarned += earned;
            gameState.exp += earned / 100;
            
            // Проверка уровня
            while (gameState.exp >= gameState.level * 1000) {
                gameState.exp -= gameState.level * 1000;
                gameState.level++;
                gameState.diamonds += gameState.level * 5;
                showMessage(`🎉 УРОВЕНЬ ${gameState.level}! +${gameState.level * 5}💎`);
            }
            
            updateUI();
            saveGame();
        }
        
        // ========== ОТОБРАЖЕНИЕ ВКЛАДОК ==========
        function renderTab(tab) {
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                const power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
                const totalIncome = gameState.autoClickerLevel + 
                    gameState.businesses.filter(b => b.owned).reduce((sum, b) => sum + (b.baseIncome * b.level), 0);
                
                content.innerHTML = `
                    <div id="home-content">
                        <div class="clicker-area">
                            <div class="per-second">⏱️ ДОХОД/СЕК: ${totalIncome}</div>
                            <div class="click-btn">
                                👆
                                <span>+${Math.floor(power)}</span>
                            </div>
                            <div class="offline-earnings">
                                💰 ОФФЛАЙН ДОХОД РАБОТАЕТ
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('home-content').addEventListener('click', handleClick);
                
            } else if (tab === 'mybusiness') {
                renderMyBusiness(content);
            } else if (tab === 'property') {
                renderProperty(content);
            } else if (tab === 'shop') {
                renderShop(content);
            } else if (tab === 'stats') {
                renderStats(content);
            }
        }
        
        // ========== БИЗНЕСЫ ==========
        function renderMyBusiness(content) {
            let html = '<div class="card"><div class="card-title">💼 МОИ БИЗНЕСЫ</div>';
            
            const owned = gameState.businesses.filter(b => b.owned);
            
            if (owned.length === 0) {
                html += '<div style="text-align:center; padding:30px;">У ВАС НЕТ БИЗНЕСОВ</div>';
            } else {
                owned.forEach(b => {
                    const upgrading = b.upgradeEnd > Date.now();
                    const timeLeft = upgrading ? Math.ceil((b.upgradeEnd - Date.now()) / 1000) : 0;
                    
                    html += `
                        <div class="business-item" onclick="openBusiness(${b.id})">
                            <div class="business-header">
                                <span class="business-name">${b.name}</span>
                                <span class="business-level">${b.level}/${b.maxLevel}</span>
                            </div>
                            <div class="business-stats">
                                <span>💰 +${b.baseIncome * b.level}/сек</span>
                                <span>📈 ${Math.floor(b.totalEarned).toLocaleString()}</span>
                            </div>
                            ${upgrading ? `
                                <div class="business-progress">
                                    <div class="business-bar" style="width: ${((Date.now() - b.lastUpgrade) / (b.upgradeEnd - b.lastUpgrade) * 100)}%"></div>
                                </div>
                                <div class="upgrade-time">⏱️ УЛУЧШЕНИЕ: ${timeLeft}С</div>
                            ` : b.level < b.maxLevel ? `
                                <div class="upgrade-cost">💰 УЛУЧШИТЬ: ${Math.floor(b.upgradeCost).toLocaleString()}</div>
                            ` : '<div style="color:#ffd700; text-align:center;">МАКСИМАЛЬНЫЙ УРОВЕНЬ</div>'}
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn btn-gold" onclick="renderTab(\'buybusiness\')">➕ КУПИТЬ НОВЫЙ БИЗНЕС</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function renderBuyBusiness(content) {
            let html = '<div class="card"><div class="card-title">🏪 КУПИТЬ БИЗНЕС</div>';
            
            const notOwned = gameState.businesses.filter(b => !b.owned);
            
            if (notOwned.length === 0) {
                html += '<div style="text-align:center; padding:30px;">ВСЕ БИЗНЕСЫ КУПЛЕНЫ</div>';
            } else {
                notOwned.forEach(b => {
                    html += `
                        <div class="business-item" onclick="buyBusiness(${b.id})">
                            <div class="business-header">
                                <span class="business-name">${b.name}</span>
                            </div>

                                <span>💰 ДОХОД: +${b.baseIncome}/сек</span>
                                <span>⏱️ АПГРЕЙД: ${b.upgradeTime}С</span>
                            </div>
                            <div class="upgrade-cost">💰 ЦЕНА: ${b.upgradeCost.toLocaleString()}</div>
                            <div class="btn btn-small" style="margin-top:10px;">КУПИТЬ</div>
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn" onclick="renderTab(\'mybusiness\')">◀ НАЗАД</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function buyBusiness(id) {
            const b = gameState.businesses.find(b => b.id === id);
            if (!b || b.owned) return;
            
            if (gameState.balance >= b.upgradeCost) {
                gameState.balance -= b.upgradeCost;
                b.owned = true;
                b.level = 1;
                saveGame();
                updateUI();
                showMessage(`✅ ВЫ КУПИЛИ ${b.name}!`);
                renderTab('mybusiness');
            } else {
                showMessage('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function startUpgrade(id) {
            const b = gameState.businesses.find(b => b.id === id);
            if (!b || !b.owned) return;
            if (b.level >= b.maxLevel) {
                showMessage('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            if (b.upgradeEnd > Date.now()) {
                showMessage('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
                return;
            }
            
            const cost = b.upgradeCost;
            if (gameState.balance < cost) {
                showMessage('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= cost;
            b.lastUpgrade = Date.now();
            b.upgradeEnd = Date.now() + (b.upgradeTime * 1000);
            
            saveGame();
            updateUI();
            closeBusinessModal();
        }
        
        function openBusiness(id) {
            const b = gameState.businesses.find(b => b.id === id);
            if (!b) return;
            
            const modal = document.getElementById('businessModal');
            const modalTitle = document.getElementById('businessModalTitle');
            const modalContent = document.getElementById('businessModalContent');
            
            modalTitle.textContent = b.name;
            
            let content = `
                <div style="text-align:center;">
                    <div style="font-size:48px; margin:15px;">${b.name[0]}</div>
                    <div class="modal-stat">📊 УРОВЕНЬ: ${b.level}/${b.maxLevel}</div>
                    <div class="modal-stat">💰 ДОХОД: ${b.baseIncome * b.level}/сек</div>
                    <div class="modal-stat">📈 ВСЕГО ЗАРАБОТАНО: ${Math.floor(b.totalEarned).toLocaleString()}</div>
                    <div class="modal-stat">⏱️ ВРЕМЯ АПГРЕЙДА: ${b.upgradeTime}С</div>
            `;
            
            if (b.level < b.maxLevel) {
                const upgrading = b.upgradeEnd > Date.now();
                if (upgrading) {
                    const timeLeft = Math.ceil((b.upgradeEnd - Date.now()) / 1000);
                    content += `<div class="modal-stat" style="color:#ff9800;">⏱️ УЛУЧШЕНИЕ: ${timeLeft}С</div>`;
                } else {
                    content += `
                        <div class="btn btn-gold" onclick="startUpgrade(${b.id})" style="margin:20px 0;">
                            🚀 УЛУЧШИТЬ (${b.upgradeCost.toLocaleString()}💰)
                        </div>
                    `;
                }
            } else {
                content += '<div style="color:#ffd700; font-size:18px; margin:20px;">✅ МАКСИМАЛЬНЫЙ УРОВЕНЬ</div>';
            }
            
            content += '</div>';
            modalContent.innerHTML = content;
            modal.classList.add('active');
        }
        
        function closeBusinessModal() {
            document.getElementById('businessModal').classList.remove('active');
        }
        
        function checkBusinessUpgrades() {
            gameState.businesses.forEach(b => {
                if (b.upgradeEnd > 0 && b.upgradeEnd < Date.now() && b.level < b.maxLevel) {
                    b.level++;
                    b.totalEarned += b.baseIncome * b.level * 10; // Бонус за завершение апгрейда
                    b.upgradeCost = Math.floor(b.upgradeCost * 2.2);
                    b.upgradeEnd = 0;
                    if (b.level === b.maxLevel) {
                        showMessage(`🎉 ${b.name} ДОСТИГ МАКСИМАЛЬНОГО УРОВНЯ!`);
                    }
                }
            });
        }

        function showPropertyCategory(category) {
            const items = gameState[category];
            const titles = {
                houses: '🏠 ДОМА',
                cars: '🚗 МАШИНЫ',
                planes: '✈️ САМОЛЕТЫ',
                ships: '🚢 КОРАБЛИ'
            };
            
            let html = `<div class="card"><div class="card-title">${titles[category]}</div>`;
            
            items.forEach(item => {
                html += `
                    <div class="property-item">
                        <div class="property-emoji">${item.emoji}</div>
                        <div class="property-details">
                            <div class="property-title">${item.name}</div>
                            <div class="property-price">💰 ${item.price.toLocaleString()}</div>
                            <div class="property-income">⏱️ +${item.income}/ЧАС</div>
                        </div>
                        ${item.owned ? 
                            '<span class="property-owned">ВЛАДЕЮ</span>' : 
                            `<div class="btn btn-small" style="width:auto;" onclick="buyProperty('${category}', ${item.id})">КУПИТЬ</div>`
                        }
                    </div>
                `;
            });
            
            html += '<div class="btn" onclick="renderTab(\'property\')">◀ НАЗАД</div></div>';
            document.getElementById('content').innerHTML = html;
        }
        
        function buyProperty(category, id) {
            const item = gameState[category][id];
            if (item.owned) return;
            
            if (gameState.balance >= item.price) {
                gameState.balance -= item.price;
                item.owned = true;
                saveGame();
                updateUI();
                showMessage(`✅ ВЫ КУПИЛИ ${item.name}!`);
                showPropertyCategory(category);
            } else {
                showMessage('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }

        function renderShop(content) {
            let html = '<div class="card"><div class="card-title">🏪 МАГАЗИН УЛУЧШЕНИЙ</div>';
            
            // Сила клика
            if (gameState.clickPowerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">💪 СИЛА КЛИКА +${gameState.clickPowerLevel + 1}</div>
                            <div class="item-desc">Увеличивает доход с клика</div>
                            <div class="item-price">💰 ${upgradePrices.clickPower[gameState.clickPowerLevel].toLocaleString()}</div>
                            <div class="item-level">УРОВЕНЬ: ${gameState.clickPowerLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('clickPower')">↑</button>
                    </div>
                `;
            }
            
            // Автокликер
            if (gameState.autoClickerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">🤖 АВТОКЛИКЕР +${gameState.autoClickerLevel + 1}</div>
                            <div class="item-desc">Автоматический доход в секунду</div>
                            <div class="item-price">💰 ${upgradePrices.autoClicker[gameState.autoClickerLevel].toLocaleString()}</div>
                            <div class="item-level">УРОВЕНЬ: ${gameState.autoClickerLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('autoClicker')">↑</button>
                    </div>

            if (gameState.critLevel < 5) {
                html += `

                            <div class="item-desc">Шанс умножить доход x10</div>
                            <div class="item-price">💰 ${upgradePrices.crit[gameState.critLevel].toLocaleString()}</div>
                            <div class="item-level">УРОВЕНЬ: ${gameState.critLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('crit')">↑</button>
                    </div>

                    <div class="item-info">
                        <div class="item-name">💰 ОБМЕН АЛМАЗОВ</div>

                </div>
            `;
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'];
            if (level >= 5) {
                showMessage('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            const price = upgradePrices[type][level];
            if (gameState.balance >= price) {
                gameState.balance -= price;
                gameState[type + 'Level']++;
                saveGame();
                updateUI();
                showMessage(`✅ УЛУЧШЕНИЕ ПРИОБРЕТЕНО!`);
            } else {
                showMessage('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function exchangeDiamonds() {
            if (gameState.diamonds >= 1) {
                gameState.diamonds--;
                gameState.balance += 1000;
                saveGame();
                updateUI();
                showMessage('✅ +1000💰');
            } else {
                showMessage('❌ НЕТ АЛМАЗОВ!');
            }
        }
        
        // ========== СТАТИСТИКА ==========
        function renderStats(content) {
            const totalIncome = gameState.autoClickerLevel + 
                gameState.businesses.filter(b => b.owned).reduce((sum, b) => sum + (b.baseIncome * b.level), 0);
            
            const ownedBusinesses = gameState.businesses.filter(b => b.owned).length;
            const ownedProperties = [
                ...gameState.houses.filter(h => h.owned),
                ...gameState.cars.filter(c => c.owned),
                ...gameState.planes.filter(p => p.owned),
                ...gameState.ships.filter(s => s.owned)
            ].length;
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 СТАТИСТИКА ИГРОКА</div>
                    
                    <div class="stat-item">
                        <div>👆 ВСЕГО КЛИКОВ: ${gameState.totalClicks.toLocaleString()}</div>
                    </div>
                    <div class="stat-item">
                        <div>💰 ЗАРАБОТАНО ВСЕГО: ${Math.floor(gameState.totalEarned).toLocaleString()}</div>
                    </div>
                    <div class="stat-item">
                        <div>⏱️ ДОХОД В СЕКУНДУ: ${totalIncome}</div>
                    </div>
                    <div class="stat-item">
                        <div>💼 БИЗНЕСОВ: ${ownedBusinesses}/10</div>
                    </div>
                    <div class="stat-item">
                        <div>🏠 ИМУЩЕСТВА: ${ownedProperties}/16</div>
                    </div>
                    <div class="stat-item">
                        <div>🎮 В ИГРЕ: ${Math.floor(gameState.playTime / 60)} МИН ${gameState.playTime % 60} СЕК</div>
                    </div>
                    <div class="stat-item">
                        <div>💎 АЛМАЗОВ: ${gameState.diamonds}</div>
                    </div>
                </div>
            `;
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        setInterval(() => {
            // Автокликер
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            // Бизнесы
            gameState.businesses.forEach(b => {
                if (b.owned && b.level > 0) {
                    const income = b.baseIncome * b.level;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                    b.totalEarned += income;
                }
            });
            
            gameState.playTime++;
            updateUI();
            saveGame();
        }, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            loadGame();
            
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('username').textContent = `👑 ${(user.first_name || 'IMPERIA').toUpperCase()}`;
                }
            }
            
            // Добавляем вкладку покупки бизнесов
            window.renderTab = renderTab;
            window.showPropertyCategory = showPropertyCategory;
            window.buyProperty = buyProperty;
            window.openBusiness = openBusiness;
            window.buyBusiness = buyBusiness;
            window.startUpgrade = startUpgrade;
            window.closeBusinessModal = closeBusinessModal;
            window.closeMessageModal = closeMessageModal;
            window.renderGarage = renderGarage;
            window.renderMyHouses = renderMyHouses;
            window.renderMyPlanes = renderMyPlanes;
            window.renderMyShips = renderMyShips;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            
            renderTab('home');
            
            // Проверка улучшений каждую секунду
            setInterval(checkBusinessUpgrades, 1000);
        };
    </script>
</body>
</html>
