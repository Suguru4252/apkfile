<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 10px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 12px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 10px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 3px;
            border-radius: 10px;
            flex: 1;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 9px;
        }
        
        .balance-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: white;
            scrollbar-width: none;
        }
        
        /* Главная */
        #home-content {
            min-height: 100%;
            cursor: pointer;
        }
        
        .clicker-area {
            text-align: center;
            pointer-events: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        
        .click-btn span {
            font-size: 16px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 10px 0;
        }
        
        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 8px;
        }
        
        /* Кнопки */
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 16px;
            text-transform: uppercase;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
        }
        
        .btn-small {
            padding: 10px 15px;
            font-size: 14px;
            width: auto;
            display: inline-block;
        }
        
        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            cursor: pointer;
            font-size: 10px;
        }
        
        .nav-item span {
            font-size: 20px;
            display: block;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 15px;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 8px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            color: #ff9800;
            font-size: 13px;
            text-align: center;
        }
        
        /* Недвижимость */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
        }
        
        .property-category span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 36px;
            width: 60px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 14px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 13px;
        }
        
        .property-owned {
            background: #2e7d32;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #ffd700;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 25px;
            padding: 25px;
            max-width: 340px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid #ffd700;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="username" id="username">IMPERIA</div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box"><div class="balance-label">💰</div><div class="balance-value" id="balance">0</div></div>
                <div class="balance-box"><div class="balance-label">💎</div><div class="balance-value" id="diamonds">0</div></div>
                <div class="balance-box"><div class="balance-label">📊</div><div class="balance-value" id="level">1</div></div>
            </div>
            
            <div class="level-bar"><div class="level-progress" id="levelProgress"></div></div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <!-- Модальное окно для покупки бизнеса -->
    <div class="modal" id="buyBusinessModal">
        <div class="modal-content" id="buyBusinessContent"></div>
    </div>
    
    <!-- Модальное окно для управления бизнесом -->
    <div class="modal" id="manageBusinessModal">
        <div class="modal-content" id="manageBusinessContent"></div>
    </div>
    
    <!-- Модальное окно для недвижимости -->
    <div class="modal" id="propertyModal">
        <div class="modal-content" id="propertyModalContent"></div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // Состояние игры
        let gameState = {
            balance: 0,
            diamonds: 0,
            exp: 0,
            level: 1,
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            totalClicks: 0,
            totalEarned: 0,
            playTime: 0,
            lastOnlineTime: Date.now(),
            
            businesses: [
                { id: 0, name: "🚕 ТАКСОПАРК", level: 0, maxLevel: 20, baseIncome: 1, upgradeCost: 100, upgradeTime: 30, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 1, name: "🍔 РЕСТОРАН", level: 0, maxLevel: 20, baseIncome: 2, upgradeCost: 500, upgradeTime: 60, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 2, name: "⛽ ЗАПРАВКА", level: 0, maxLevel: 20, baseIncome: 5, upgradeCost: 2500, upgradeTime: 120, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 3, name: "🏭 ЗАВОД", level: 0, maxLevel: 20, baseIncome: 10, upgradeCost: 10000, upgradeTime: 180, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 4, name: "🏨 ОТЕЛЬ", level: 0, maxLevel: 20, baseIncome: 20, upgradeCost: 50000, upgradeTime: 300, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 5, name: "🎰 КАЗИНО", level: 0, maxLevel: 20, baseIncome: 50, upgradeCost: 250000, upgradeTime: 600, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 6, name: "🏦 БАНК", level: 0, maxLevel: 20, baseIncome: 100, upgradeCost: 1000000, upgradeTime: 1200, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 7, name: "🛳️ ПОРТ", level: 0, maxLevel: 20, baseIncome: 200, upgradeCost: 5000000, upgradeTime: 2400, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 8, name: "✈️ АЭРОПОРТ", level: 0, maxLevel: 20, baseIncome: 500, upgradeCost: 25000000, upgradeTime: 4800, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 9, name: "🏛️ ИМПЕРИЯ", level: 0, maxLevel: 20, baseIncome: 1000, upgradeCost: 100000000, upgradeTime: 9600, upgradeEnd: 0, owned: false, totalEarned: 0 }
            ],
            
            houses: [
                { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 50000, income: 5, owned: false },
                { id: 1, name: "ДОМ", emoji: "🏠", price: 500000, income: 50, owned: false },
                { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 5000000, income: 500, owned: false },
                { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 50000000, income: 5000, owned: false }
            ],
            cars: [
                { id: 0, name: "ЛАДА", emoji: "🚗", price: 20000, income: 2, owned: false },
                { id: 1, name: "МЕРСЕДЕС", emoji: "🚘", price: 200000, income: 20, owned: false },
                { id: 2, name: "ФЕРРАРИ", emoji: "🏎️", price: 2000000, income: 200, owned: false },
                { id: 3, name: "БУГАТТИ", emoji: "🚀", price: 20000000, income: 2000, owned: false }
            ],
            planes: [
                { id: 0, name: "КУКУРУЗНИК", emoji: "✈️", price: 100000, income: 10, owned: false },
                { id: 1, name: "БОИНГ", emoji: "🛩️", price: 1000000, income: 100, owned: false },
                { id: 2, name: "ЧАСТНЫЙ", emoji: "🛫", price: 10000000, income: 1000, owned: false },
                { id: 3, name: "РЕАКТИВНЫЙ", emoji: "🛬", price: 100000000, income: 10000, owned: false }
            ],
            ships: [
                { id: 0, name: "ЛОДКА", emoji: "🛶", price: 30000, income: 3, owned: false },
                { id: 1, name: "КАРТЕР", emoji: "⛵", price: 300000, income: 30, owned: false },
                { id: 2, name: "ЯХТА", emoji: "🛥️", price: 3000000, income: 300, owned: false },
                { id: 3, name: "ЛАЙНЕР", emoji: "🚢", price: 30000000, income: 3000, owned: false }
            ]
        };
        
        const upgradePrices = {
            clickPower: [1000, 5000, 25000, 125000, 625000],
            autoClicker: [2000, 10000, 50000, 250000, 1250000],
            crit: [5000, 25000, 125000, 625000, 3125000]
        };
        
        function loadGame() {
            const saved = localStorage.getItem('imperiaFinal2026');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {}
            }
            
            const now = Date.now();
            const secondsPassed = Math.floor((now - gameState.lastOnlineTime) / 1000);
            
            if (secondsPassed > 30) {
                let offlineIncome = gameState.autoClickerLevel * secondsPassed;
                gameState.businesses.forEach(b => {
                    if (b.owned && b.level > 0) {
                        offlineIncome += b.baseIncome * b.level * secondsPassed;
                        b.totalEarned += b.baseIncome * b.level * secondsPassed;
                    }
                });
                if (offlineIncome > 0) {
                    gameState.balance += Math.floor(offlineIncome);
                    gameState.totalEarned += Math.floor(offlineIncome);
                }
            }
            
            gameState.lastOnlineTime = now;
            updateUI();
            checkBusinessUpgrades();
        }
        
        function saveGame() {
            gameState.lastOnlineTime = Date.now();
            localStorage.setItem('imperiaFinal2026', JSON.stringify(gameState));
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(gameState.balance);
            document.getElementById('diamonds').textContent = gameState.diamonds;
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 1000;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            const activeTab = document.querySelector('.nav-item.active').dataset.tab;
            renderTab(activeTab);
        }
        
        function renderTab(tab) {
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                const power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
                content.innerHTML = `
                    <div id="home-content">
                        <div class="clicker-area">
                            <div class="per-second">⏱️ АВТО: +${gameState.autoClickerLevel}/сек</div>
                            <div class="click-btn">👆<span>+${Math.floor(power)}</span></div>
                        </div>
                    </div>
                `;
                document.getElementById('home-content').addEventListener('click', handleClick);
            } else if (tab === 'mybusiness') {
                renderMyBusiness(content);
            } else if (tab === 'property') {
                renderProperty(content);
            } else if (tab === 'shop') {
                renderShop(content);
            } else if (tab === 'stats') {
                renderStats(content);
            }
        }
        
        function handleClick() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            if (Math.random() * 100 < gameState.critLevel * 10) power *= 10;
            
            gameState.balance += Math.floor(power);
            gameState.totalClicks++;
            gameState.totalEarned += Math.floor(power);
            gameState.exp += power / 100;
            
            while (gameState.exp >= gameState.level * 1000) {
                gameState.exp -= gameState.level * 1000;
                gameState.level++;
            }
            
            updateUI();
            saveGame();
        }
        
        // БИЗНЕСЫ
        function renderMyBusiness(content) {
            let html = '<div class="card"><div class="card-title">💼 МОИ БИЗНЕСЫ</div>';
            
            const owned = gameState.businesses.filter(b => b.owned);
            if (owned.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ БИЗНЕСОВ</div>';
            } else {
                owned.forEach(b => {
                    const upgrading = b.upgradeEnd > Date.now();
                    const timeLeft = upgrading ? Math.ceil((b.upgradeEnd - Date.now()) / 1000) : 0;
                    
                    html += `
                        <div class="business-item" onclick="openManageBusiness(${b.id})">
                            <div class="business-header">
                                <span class="business-name">${b.name}</span>
                                <span class="business-level">${b.level}/20</span>
                            </div>
                            <div class="business-stats">
                                <span>💰 +${b.baseIncome * b.level}/сек</span>
                                <span>📈 ${Math.floor(b.totalEarned)}</span>
                            </div>
                            ${upgrading ? `
                                <div class="business-progress"><div class="business-bar" style="width:${((Date.now() - b.lastUpgrade) / (b.upgradeEnd - b.lastUpgrade) * 100)}%"></div></div>
                                <div class="upgrade-time">⏱️ ОСТАЛОСЬ: ${timeLeft}С</div>
                            ` : ''}
                        </div>
                    `;
                });
            }
            
            html += '<div class="btn btn-gold" onclick="openBuyBusiness()">➕ КУПИТЬ НОВЫЙ БИЗНЕС</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function openBuyBusiness() {
            const modal = document.getElementById('buyBusinessModal');
            const modalContent = document.getElementById('buyBusinessContent');
            
            let html = '<div class="modal-title">🏪 КУПИТЬ БИЗНЕС</div>';
            
            const notOwned = gameState.businesses.filter(b => !b.owned);
            notOwned.forEach(b => {
                html += `
                    <div class="business-item" style="cursor:pointer;" onclick="buyBusiness(${b.id})">
                        <div class="business-header">
                            <span class="business-name">${b.name}</span>
                        </div>
                        <div class="business-stats">
                            <span>💰 ДОХОД: +${b.baseIncome}/сек</span>
                            <span>⏱️ ВРЕМЯ: ${b.upgradeTime}С</span>
                        </div>
                        <div style="color:#4CAF50; margin:5px 0;">ЦЕНА: ${b.upgradeCost}💰</div>
                    </div>
                `;
            });
            
            html += '<div class="close-btn" onclick="closeBuyBusiness()">◀ НАЗАД</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function buyBusiness(id) {
            const b = gameState.businesses.find(b => b.id === id);
            if (!b || b.owned) return;
            
            if (gameState.balance >= b.upgradeCost) {
                gameState.balance -= b.upgradeCost;
                b.owned = true;
                b.level = 1;
                saveGame();
                updateUI();
                closeBuyBusiness();
                openManageBusiness(id);
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function closeBuyBusiness() {
            document.getElementById('buyBusinessModal').classList.remove('active');
        }
        
        function openManageBusiness(id) {
            const b = gameState.businesses.find(b => b.id === id);
            const modal = document.getElementById('manageBusinessModal');
            const modalContent = document.getElementById('manageBusinessContent');
            
            let html = `<div class="modal-title">${b.name}</div>`;
            html += `<div style="text-align:center; font-size:18px; margin:10px;">УРОВЕНЬ: ${b.level}/20</div>`;
            html += `<div style="text-align:center; margin:10px;">💰 ДОХОД: +${b.baseIncome * b.level}/сек</div>`;
            html += `<div style="text-align:center; margin:10px;">📈 ЗАРАБОТАНО: ${Math.floor(b.totalEarned)}</div>`;
            html += `<div style="text-align:center; margin:10px;">⏱️ ВРЕМЯ: ${b.upgradeTime}С</div>`;
            
            if (b.level < 20) {
                const upgrading = b.upgradeEnd > Date.now();
                if (upgrading) {
                    const timeLeft = Math.ceil((b.upgradeEnd - Date.now()) / 1000);
                    html += `<div style="color:#ff9800; text-align:center; margin:10px;">⏱️ УЛУЧШЕНИЕ: ${timeLeft}С</div>`;
                } else {
                    html += `<div class="btn btn-gold" onclick="upgradeBusiness(${b.id})">🚀 УЛУЧШИТЬ (${b.upgradeCost}💰)</div>`;
                }
            } else {
                html += `<div style="color:#ffd700; text-align:center; margin:10px;">✅ МАКСИМАЛЬНЫЙ УРОВЕНЬ</div>`;
            }
            
            html += '<div class="close-btn" onclick="closeManageBusiness()">ЗАКРЫТЬ</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function upgradeBusiness(id) {
            const b = gameState.businesses.find(b => b.id === id);
            if (b.level >= 20) return;
            if (gameState.balance < b.upgradeCost) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= b.upgradeCost;
            b.lastUpgrade = Date.now();
            b.upgradeEnd = Date.now() + (b.upgradeTime * 1000);
            
            saveGame();
            updateUI();
            closeManageBusiness();
            
            setTimeout(() => {
                if (b.upgradeEnd <= Date.now()) {
                    b.level++;
                    b.upgradeCost = Math.floor(b.upgradeCost * 2);
                    b.upgradeEnd = 0;
                    saveGame();
                }
            }, b.upgradeTime * 1000);
        }
        
        function closeManageBusiness() {
            document.getElementById('manageBusinessModal').classList.remove('active');
        }
        
        function checkBusinessUpgrades() {
            gameState.businesses.forEach(b => {
                if (b.upgradeEnd > 0 && b.upgradeEnd < Date.now() && b.level < 20) {
                    b.level++;
                    b.upgradeCost = Math.floor(b.upgradeCost * 2);
                    b.upgradeEnd = 0;
                    saveGame();
                }
            });
        }
        
        // НЕДВИЖИМОСТЬ
        function renderProperty(content) {
            const housesOwned = gameState.houses.filter(h => h.owned).length;
            const carsOwned = gameState.cars.filter(c => c.owned).length;
            const planesOwned = gameState.planes.filter(p => p.owned).length;
            const shipsOwned = gameState.ships.filter(s => s.owned).length;
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">🏰 НЕДВИЖИМОСТЬ</div>
                    <div class="property-grid">
                        <div class="property-category" onclick="openPropertyCategory('houses')">
                            <span>🏠</span><div class="category-name">ДОМА</div><div>${housesOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="openPropertyCategory('cars')">
                            <span>🚗</span><div class="category-name">МАШИНЫ</div><div>${carsOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="openPropertyCategory('planes')">
                            <span>✈️</span><div class="category-name">САМОЛЕТЫ</div><div>${planesOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="openPropertyCategory('ships')">
                            <span>🚢</span><div class="category-name">КОРАБЛИ</div><div>${shipsOwned}/4</div>
                        </div>
                    </div>
                    <div class="btn btn-gold" onclick="openGarage()">🚗 МОЙ ГАРАЖ</div>
                    <div class="btn btn-gold" onclick="openMyHouses()">🏠 МОИ ДОМА</div>
                    <div class="btn btn-gold" onclick="openMyPlanes()">✈️ МОИ САМОЛЕТЫ</div>
                    <div class="btn btn-gold" onclick="openMyShips()">🚢 МОИ КОРАБЛИ</div>
                </div>
            `;
        }
        
        function openPropertyCategory(category) {
            const items = gameState[category];
            const titles = { houses: '🏠 ДОМА', cars: '🚗 МАШИНЫ', planes: '✈️ САМОЛЕТЫ', ships: '🚢 КОРАБЛИ' };
            
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = `<div class="modal-title">${titles[category]}</div>`;
            
            items.forEach(item => {
                html += `
                    <div class="property-item">
                        <div class="property-emoji">${item.emoji}</div>
                        <div class="property-details">
                            <div class="property-title">${item.name}</div>
                            <div class="property-price">💰 ${item.price}</div>
                            <div class="property-income">⏱️ +${item.income}/ЧАС</div>
                        </div>
                        ${item.owned ? 
                            '<span class="property-owned">ВЛАДЕЮ</span>' : 
                            `<div class="btn btn-small" onclick="buyProperty('${category}', ${item.id})">КУПИТЬ</div>`
                        }
                    </div>
                `;
            });
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function buyProperty(category, id) {
            const item = gameState[category][id];
            if (item.owned) return;
            
            if (gameState.balance >= item.price) {
                gameState.balance -= item.price;
                item.owned = true;
                saveGame();
                updateUI();
                openPropertyCategory(category);
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function openGarage() {
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = '<div class="modal-title">🚗 МОЙ ГАРАЖ</div>';
            
            const ownedCars = gameState.cars.filter(c => c.owned);
            if (ownedCars.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ МАШИН</div>';
            } else {
                ownedCars.forEach(car => {
                    html += `
                        <div class="property-item">
                            <div class="property-emoji">${car.emoji}</div>
                            <div class="property-details">
                                <div class="property-title">${car.name}</div>
                                <div class="property-income">⏱️ +${car.income}/ЧАС</div>
                            </div>
                            <span class="property-owned">ВЛАДЕЮ</span>
                        </div>
                    `;
                });
            }
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function openMyHouses() {
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = '<div class="modal-title">🏠 МОИ ДОМА</div>';
            
            const ownedHouses = gameState.houses.filter(h => h.owned);
            if (ownedHouses.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ ДОМОВ</div>';
            } else {
                ownedHouses.forEach(house => {
                    html += `
                        <div class="property-item">
                            <div class="property-emoji">${house.emoji}</div>
                            <div class="property-details">
                                <div class="property-title">${house.name}</div>
                                <div class="property-income">⏱️ +${house.income}/ЧАС</div>
                            </div>
                            <span class="property-owned">ВЛАДЕЮ</span>
                        </div>
                    `;
                });
            }
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function openMyPlanes() {
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = '<div class="modal-title">✈️ МОИ САМОЛЕТЫ</div>';
            
            const ownedPlanes = gameState.planes.filter(p => p.owned);
            if (ownedPlanes.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ САМОЛЕТОВ</div>';
            } else {
                ownedPlanes.forEach(plane => {
                    html += `
                        <div class="property-item">
                            <div class="property-emoji">${plane.emoji}</div>
                            <div class="property-details">
                                <div class="property-title">${plane.name}</div>
                                <div class="property-income">⏱️ +${plane.income}/ЧАС</div>
                            </div>
                            <span class="property-owned">ВЛАДЕЮ</span>
                        </div>
                    `;
                });
            }
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function openMyShips() {
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = '<div class="modal-title">🚢 МОИ КОРАБЛИ</div>';
            
            const ownedShips = gameState.ships.filter(s => s.owned);
            if (ownedShips.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ КОРАБЛЕЙ</div>';
            } else {
                ownedShips.forEach(ship => {
                    html += `
                        <div class="property-item">
                            <div class="property-emoji">${ship.emoji}</div>
                            <div class="property-details">
                                <div class="property-title">${ship.name}</div>
                                <div class="property-income">⏱️ +${ship.income}/ЧАС</div>
                            </div>
                            <span class="property-owned">ВЛАДЕЮ</span>
                        </div>
                    `;
                });
            }
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function closePropertyModal() {
            document.getElementById('propertyModal').classList.remove('active');
        }
        
        // МАГАЗИН
        function renderShop(content) {
            let html = '<div class="card"><div class="card-title">🏪 МАГАЗИН</div>';
            
            if (gameState.clickPowerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">💪 СИЛА КЛИКА Lv.${gameState.clickPowerLevel+1}</div>
                            <div class="item-price">💰 ${upgradePrices.clickPower[gameState.clickPowerLevel]}</div>
                        </div>
                        <button class="btn btn-small" onclick="buyUpgrade('clickPower')">↑</button>
                    </div>
                `;
            }
            if (gameState.autoClickerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">🤖 АВТОКЛИКЕР Lv.${gameState.autoClickerLevel+1}</div>
                            <div class="item-price">💰 ${upgradePrices.autoClicker[gameState.autoClickerLevel]}</div>
                        </div>
                        <button class="btn btn-small" onclick="buyUpgrade('autoClicker')">↑</button>
                    </div>
                `;
            }
            if (gameState.critLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">⚡ КРИТ Lv.${gameState.critLevel+1}</div>
                            <div class="item-price">💰 ${upgradePrices.crit[gameState.critLevel]}</div>
                        </div>
                        <button class="btn btn-small" onclick="buyUpgrade('crit')">↑</button>
                    </div>
                `;
            }
            
            html += '<div class="btn btn-gold" onclick="exchangeDiamonds()">💎 ОБМЕН АЛМАЗОВ (1💎=1000💰)</div>';
            html += '</div>';
            content.innerHTML = html;
        }
        
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'];
            if (level >= 5) return;
            const price = upgradePrices[type][level];
            
            if (gameState.balance >= price) {
                gameState.balance -= price;
                gameState[type + 'Level']++;
                saveGame();
                updateUI();
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function exchangeDiamonds() {
            if (gameState.diamonds >= 1) {
                gameState.diamonds--;
                gameState.balance += 1000;
                saveGame();
                updateUI();
            } else {
                alert('❌ НЕТ АЛМАЗОВ!');
            }
        }
        
        // СТАТИСТИКА
        function renderStats(content) {
            const totalIncome = gameState.autoClickerLevel + 
                gameState.businesses.filter(b => b.owned).reduce((sum, b) => sum + (b.baseIncome * b.level), 0);
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 СТАТИСТИКА</div>
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">
                        <div style="margin:10px;">👆 КЛИКОВ: ${gameState.totalClicks}</div>
                        <div style="margin:10px;">💰 ЗАРАБОТАНО: ${Math.floor(gameState.totalEarned)}</div>
                        <div style="margin:10px;">⏱️ ДОХОД/СЕК: ${totalIncome}</div>
                        <div style="margin:10px;">🎮 В ИГРЕ: ${Math.floor(gameState.playTime / 60)} МИН</div>
                        <div style="margin:10px;">💎 АЛМАЗЫ: ${gameState.diamonds}</div>
                    </div>
                </div>
            `;
        }
        
        // АВТОДОХОД
        setInterval(() => {
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            gameState.businesses.forEach(b => {
                if (b.owned && b.level > 0) {
                    const income = b.baseIncome * b.level;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                    b.totalEarned += income;
                }
            });
            
            gameState.playTime++;
            updateUI();
            saveGame();
        }, 1000);
        
        // НАВИГАЦИЯ
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ЗАПУСК
        window.onload = function() {
            loadGame();
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('username').textContent = `👑 ${user.first_name || 'IMPERIA'}`;
                }
            }
            renderTab('home');
            setInterval(checkBusinessUpgrades, 1000);
        };
    </script>
</body>
</html>
