    <script>
        // Telegram WebApp инициализация
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Показываем приветствие при первом запуске
        if (!localStorage.getItem('init')) {
            tg.showPopup({
                title: '🎮 IMPERIA CLICKER',
                message: 'Добро пожаловать!\n\nКликай, зарабатывай, прокачивайся!',
                buttons: [{
                    id: 'start',
                    type: 'default',
                    text: 'Начать игру'
                }]
            });
            localStorage.setItem('init', 'true');
        }
    </script>
