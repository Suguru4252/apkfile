<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | Космическое Издание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #0a0f2a 0%, #050510 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 15px;
            overflow-x: hidden;
            transition: background 0.5s ease;
            position: relative;
        }

        /* Stars Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(3px 3px at 60px 80px, #ffd700, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 120px 150px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 200px 250px, #ff88ff, rgba(0,0,0,0));
            background-size: 400px 400px;
            background-repeat: repeat;
            animation: starsMove 60s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes starsMove {
            0% { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        /* Main Container */
        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(15, 20, 45, 0.85), rgba(8, 12, 30, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(100, 150, 255, 0.4);
            position: relative;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* World Themes */
        .game-container[data-theme="forest"] { background: linear-gradient(135deg, rgba(20, 40, 20, 0.9), rgba(10, 25, 10, 0.95)); border-color: #4caf50; }
        .game-container[data-theme="volcano"] { background: linear-gradient(135deg, rgba(60, 25, 15, 0.9), rgba(40, 15, 10, 0.95)); border-color: #ff5722; }
        .game-container[data-theme="ice"] { background: linear-gradient(135deg, rgba(25, 45, 65, 0.9), rgba(15, 30, 45, 0.95)); border-color: #00bcd4; }
        .game-container[data-theme="sky"] { background: linear-gradient(135deg, rgba(30, 40, 70, 0.9), rgba(20, 25, 55, 0.95)); border-color: #ffd700; }
        .game-container[data-theme="hell"] { background: linear-gradient(135deg, rgba(50, 15, 25, 0.9), rgba(35, 10, 20, 0.95)); border-color: #ff3366; }
        .game-container[data-theme="paradise"] { background: linear-gradient(135deg, rgba(70, 40, 90, 0.9), rgba(50, 25, 70, 0.95)); border-color: #ff88ff; }

        /* Resources Bar */
        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        .resource-card:hover { transform: translateY(-2px); border-color: #ffd700; }
        .resource-icon { font-size: 40px; }
        .resource-info { flex: 1; }
        .resource-name { color: rgba(255,255,255,0.7); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .resource-value { color: #ffd700; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        /* Game Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1000px) { .game-layout { grid-template-columns: 1fr; } }

        /* Pet Area */
        .pet-area {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,100,0,0.05));
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.5);
            transition: transform 0.1s;
            backdrop-filter: blur(10px);
        }

        .pet-area:active { transform: scale(0.98); }

        .pet-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
            animation: rotateGlow 15s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGlow {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .current-pet {
            font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .pet-name {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff88ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
        }

        .pet-power { color: #ffd700; font-size: 18px; margin-top: 8px; }

        /* World Selector */
        .world-selector {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .world-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .world-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border-color: #fff;
            transform: scale(1.05);
        }

        .world-btn:hover { transform: translateY(-2px); border-color: #ffd700; }

        /* Boost Section */
        .boost-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .boost-timer {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 10px;
        }

        /* Eggs Section */
        .eggs-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .eggs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .egg-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .egg-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }

        .egg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .egg-emoji { font-size: 48px; }
        .egg-title { font-size: 20px; font-weight: bold; color: #ffd700; }
        .egg-price {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            margin: 8px 0;
            font-weight: bold;
        }

        .pet-list {
            margin-top: 12px;
            border-top: 1px solid rgba(255,215,0,0.3);
            padding-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .pet-chance {
            font-size: 11px;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pet-chance span:first-child { color: #ffd700; font-weight: bold; }
        .chance-badge { background: rgba(255,215,0,0.2); padding: 2px 8px; border-radius: 12px; font-size: 10px; }

        /* Pets Collection */
        .pets-collection {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .pet-card.active-pet {
            border: 2px solid #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .pet-card-emoji { font-size: 48px; }
        .pet-card-name { font-size: 12px; color: white; font-weight: bold; margin: 5px 0; }
        .pet-card-power { font-size: 11px; color: #ffd700; }
        .pet-card-rarity { font-size: 10px; margin-top: 5px; padding: 2px 6px; border-radius: 10px; display: inline-block; }

        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            width: 100%;
        }

        .sell-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(255,68,68,0.5); }

        /* Upgrades Section */
        .upgrades-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .upgrade-card:hover { transform: translateY(-2px); border-color: #ffd700; }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #1a0f24;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }

        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 5px black;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }

        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer" data-theme="forest">
        <!-- Resources -->
        <div class="resources-bar">

            <div class="side-panel">

        <!-- Pets Collection -->

                <span>💰 Стоимость продажи: <span id="totalSellValue">0</span>💰</span>
            </div>
            <div class="pets-grid" id="petsContainer"></div>
            <button class="btn" id="sellAllBtn" style="background: linear-gradient(135deg, #ff4444, #aa2222); margin-top: 15px;">💰 ПРОДАТЬ ВСЕХ (КРОМЕ АКТИВНОГО) 💰</button>
        </div>

        <!-- Upgrades -->
        <div class="upgrades-section">
            <div class="section-title">✨ УЛУЧШЕНИЯ ✨</div>
            <div class="upgrades-grid" id="upgradesContainer"></div>
        </div>
    </div>

                eggs: [
                    { id: "common", name: "💀 Тёмное яйцо", price: 300, icon: "💀🥚", pets: ["🦇 Летучая мышь(6)", "🕷️ Паук(5)", "🐍 Змей(7)"] },
                    { id: "rare", name: "🔮 Проклятое яйцо", price: 1200, icon: "🔮🥚", pets: ["👻 Призрак(22)", "🧟 Зомби(20)", "🐺 Адский волк(25)"] },
                    { id: "epic", name: "💀 Яйцо тьмы", price: 5000, icon: "💀🥚", pets: ["😈 Демон(55)", "🔥 Адский пес(52)", "🦴 Скелет-рыцарь(58)"] },
                    { id: "legendary", name: "👁️ Яйцо ужаса", price: 20000, icon: "👁️🥚", pets: ["🐉 Некродракон(120)", "👑 Король демонов(115)", "💀 Жнец(125)"] },
                    { id: "mythic", name: "🌑 Яйцо бездны", price: 70000, icon: "🌑🥚", pets: ["👁️ Древний ужас(450)", "💀 Повелитель бездны(480)", "🔥 Адский архангел(500)"] }
                ]
            },
            paradise: {
                theme: "👑 Райский",
                eggs: [
                    { id: "common", name: "✨ Святое яйцо", price: 400, icon: "✨🥚", pets: ["🕊️ Ангел(8)", "⭐ Золотая рыбка(7)", "🌸 Цветочный эльф(9)"] },
                    { id: "rare", name: "💫 Яйцо чудес", price: 1500, icon: "💫🥚", pets: ["🦄 Золотой единорог(30)", "🧚 Светлая фея(28)", "✨ Святой зверь(32)"] },
                    { id: "epic", name: "🌟 Яйцо света", price: 6000, icon: "🌟🥚", pets: ["🦁 Святой лев(70)", "🐉 Светлый дракон(75)", "⚜️ Хранитель(68)"] },
                    { id: "legendary", name: "👑 Божественное яйцо", price: 25000, icon: "👑🥚", pets: ["😇 Архангел(150)", "🐉 Райский дракон(160)", "✨ Серафим(145)"] },
                    { id: "mythic", name: "🌌 Космическое яйцо", price: 100000, icon: "🌌🥚", pets: ["🌌 Космический дракон(600)", "⭐ Звездный создатель(650)", "👑 Бог-император(700)"] }
                ]
            }
        };

        class PetSimulator {
            constructor() {
                this.coins = 5000;
                this.gems = 100;
                this.clickPower = 1;
                this.totalClicks = 0;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌿 Лесная чаща", multiplier: 1, unlocked: true, cost: 0, icon: "🌿", theme: "forest" },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 5000, icon: "🔥", theme: "volcano" },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 20000, icon: "❄️", theme: "ice" },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 80000, icon: "⚡", theme: "sky" },
                    { name: "💀 Преисподняя", multiplier: 8, unlocked: false, cost: 250000, icon: "💀", theme: "hell" },
                    { name: "👑 Райский сад", multiplier: 12, unlocked: false, cost: 1000000, icon: "👑", theme: "paradise" }
                ];
                this.pets = [];
                this.currentPet = null;
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                this.upgrades = [
                    { id: "click", name: "💪 Усиление клика", desc: "+5 к силе", price: 500, priceType: "coins", effect: () => { this.clickPower += 5; }, level: 0, basePrice: 500 },
                    { id: "auto", name: "🤖 Авто-кликер", desc: "+1 клик/сек", price: 800, priceType: "coins", effect: () => { this.autoClickerLevel++; this.startAutoClicker(); }, level: 0, basePrice: 800 },
                    { id: "multiplier", name: "✨ Множитель", desc: "+0.5x доход", price: 1500, priceType: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, basePrice: 1500 }
                ];
                this.init();
            }

            init() {
                this.loadGame();
                this.renderWorlds();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAutoClicker();
                this.startBoostTimer();
                this.setupEventListeners();
                this.updateTheme();
            }

            setupEventListeners() {
                document.getElementById('petArea').addEventListener('click', (e) => this.clickPet(e));
                document.getElementById('buyBoostBtn').addEventListener('click', () => this.buyBoost());
                document.getElementById('sellAllBtn').addEventListener('click', () => this.sellAllPets());
            }

            getRandomPetFromEgg(eggData) {
                const petsList = eggData.pets;
                const randomPet = petsList[Math.floor(Math.random() * petsList.length)];
                const match = randomPet.match(/([^\d]+)\((\d+)\)/);
                if (match) {
                    return { emoji: match[1].charAt(0) + match[1].charAt(1) || "🐉", name: match[1], power: parseInt(match[2]), rarity: eggData.id };
                }
                return { emoji: "🐣", name: "Питомец", power: 1, rarity: eggData.id };
            }

            openEgg(eggData) {
                if (this.coins >= eggData.price) {
                    this.coins -= eggData.price;
                } else {
                    this.showMessage("❌ Недостаточно монет!");
                    return;
                }

                const newPetData = this.getRandomPetFromEgg(eggData);
                const newPet = { ...newPetData, id: Date.now() + Math.random() };
                this.pets.push(newPet);

                if (!this.currentPet) this.selectPet(newPet);
                else this.updateClickPower();

                this.showMessage(`🎉 ВЫ ПОЛУЧИЛИ: ${newPet.name}! ⭐ Сила: ${newPet.power} ⭐`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            selectPet(pet) {
                this.currentPet = pet;
                this.updateClickPower();
                this.renderPets();
                this.saveGame();
            }

            sellPet(petId) {
                const petIndex = this.pets.findIndex(p => p.id === petId);
                if (petIndex === -1) return;
                const pet = this.pets[petIndex];
                if (this.currentPet && this.currentPet.id === petId) {
                    this.showMessage("❌ Нельзя продать активного питомца!");
                    return;
                }
                const sellValue = Math.floor(pet.power * 10);
                this.coins += sellValue;
                this.pets.splice(petIndex, 1);
                this.showMessage(`💰 Продано: ${pet.name} за ${sellValue} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            sellAllPets() {
                if (this.pets.length <= 1) {
                    this.showMessage("❌ Нет питомцев для продажи или только один активный!");
                    return;
                }
                let totalSell = 0;
                const toSell = this.pets.filter(p => !(this.currentPet && p.id === this.currentPet.id));
                for (const pet of toSell) totalSell += Math.floor(pet.power * 10);
                this.coins += totalSell;
                this.pets = this.pets.filter(p => this.currentPet && p.id === this.currentPet.id);
                this.showMessage(`💰 Продано ${toSell.length} питомцев! Получено: ${totalSell} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            updateClickPower() {
                if (this.currentPet) this.clickPower = 5 + this.currentPet.power;
                else this.clickPower = 1;
                this.updateUI();
            }

            clickPet(event) {
                const worldBonus = this.worlds[this.currentWorld].multiplier;
                const boostBonus = this.boostActive ? 2 : 1;
                let earned = Math.floor(this.clickPower * worldBonus * this.multiplier * boostBonus);
                this.coins += earned;
                this.totalClicks++;
                
                // Шанс 5% на получение алмазов (1-100)
                const diamondChance = Math.random() * 100;
                if (diamondChance <= 5) {
                    const diamondsEarned = Math.floor(Math.random() * 100) + 1;
                    this.gems += diamondsEarned;
                    this.showFloatingText(`💎 +${diamondsEarned} АЛМАЗОВ! 💎`, event.clientX, event.clientY, '#ff88ff');
                }
                
                this.showFloatingNumber(`+${earned}💰`, event.clientX, event.clientY);
                document.getElementById('petArea').classList.add('shake');
                setTimeout(() => document.getElementById('petArea').classList.remove('shake'), 300);
                this.updateUI();
                this.saveGame();
            }

            showFloatingText(text, x, y, color = '#ffd700') {
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.textContent = text;
                div.style.left = `${x - 60}px`;
                div.style.top = `${y - 50}px`;
                div.style.color = color;
                div.style.fontSize = '24px';
                div.style.whiteSpace = 'nowrap';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 1500);
            }

            buyUpgrade(upgrade) {
                if (upgrade.priceType === "coins" && this.coins >= upgrade.price) this.coins -= upgrade.price;
                else if (upgrade.priceType === "gems" && this.gems >= upgrade.price) this.gems -= upgrade.price;
                else { this.showMessage("Недостаточно!"); return; }
                upgrade.effect();
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.basePrice * Math.pow(1.5, upgrade.level));
                this.updateUI();
                this.renderUpgrades();
                this.saveGame();
            }

            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.showMessage("⚡ БУСТ АКТИВИРОВАН! x2 доход на 5 минут!");
                    this.renderBoosts();
                    this.saveGame();
                } else this.showMessage("Нужно 100 алмазов!");
            }

            unlockWorld(index) {
                const world = this.worlds[index];
                if (!world.unlocked && this.coins >= world.cost) {
                    this.coins -= world.cost;
                    world.unlocked = true;
                    this.showMessage(`🌍 Открыт мир: ${world.name}!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                } else if (!world.unlocked) this.showMessage(`Нужно ${world.cost} монет!`);
            }

            changeWorld(index) {
                if (this.worlds[index].unlocked) {
                    this.currentWorld = index;
                    this.renderWorlds();
                    this.renderEggs();
                    this.updateTheme();
                    this.updateUI();
                    this.saveGame();
                }
            }

            updateTheme() {
                const world = this.worlds[this.currentWorld];
                const container = document.getElementById('gameContainer');
                container.setAttribute('data-theme', world.theme);
                
                // Меняем фон body
                const themes = {
                    forest: 'radial-gradient(ellipse at top, #0a2a0a 0%, #051005 100%)',
                    volcano: 'radial-gradient(ellipse at top, #4a1a0a 0%, #2a0a05 100%)',
                    ice: 'radial-gradient(ellipse at top, #1a3a5a 0%, #0a1a2a 100%)',
                    sky: 'radial-gradient(ellipse at top, #2a2a5a 0%, #0a0a2a 100%)',
                    hell: 'radial-gradient(ellipse at top, #4a0a2a 0%, #2a050a 100%)',
                    paradise: 'radial-gradient(ellipse at top, #4a2a6a 0%, #2a0a4a 100%)'
                };
                document.body.style.background = themes[world.theme] || themes.forest;
            }

            renderWorlds() {
                const container = document.getElementById('worldsContainer');
                container.innerHTML = '';
                this.worlds.forEach((world, i) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${i === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `<div style="font-size: 24px;">${world.icon}</div><div style="font-size: 11px;">${world.name}</div><div style="font-size: 10px;">x${world.multiplier}</div>${!world.unlocked ? `<div style="font-size: 10px; color:#ffd700;">💰${world.cost}</div>` : ''}`;
                    btn.onclick = () => world.unlocked ? this.changeWorld(i) : this.unlockWorld(i);
                    container.appendChild(btn);
                });
            }

            renderEggs() {
                const container = document.getElementById('eggsContainer');
                const world = this.worlds[this.currentWorld];
                const eggsData = WORLD_EGGS[world.theme].eggs;
                
                container.innerHTML = '';
                eggsData.forEach(egg => {
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header"><div class="egg-emoji">${egg.icon}</div><div class="egg-title">${egg.name}</div></div>
                        <div class="egg-price">💰 ${egg.price} монет</div>
                        <div class="pet-list"><div class="pet-list-title">📋 Кто может выпасть:</div>
                        ${egg.pets.map(p => `<div class="pet-chance"><span>${p}</span></div>`).join('')}
                        </div>
                    `;
                    card.onclick = () => this.openEgg(egg);
                    container.appendChild(card);
                });
                
                // Меняем заголовок секции яиц
                const eggsSection = document.getElementById('eggsSection');
                const title = eggsSection.querySelector('.section-title');
                if (title) title.innerHTML = `🥚 ${world.name} ЯЙЦА 🥚`;
            }

            renderPets() {
                const container = document.getElementById('petsContainer');
                container.innerHTML = '';
                const sortedPets = [...this.pets].sort((a,b) => b.power - a.power);
                sortedPets.forEach(pet => {
                    const card = document.createElement('div');
                    card.className = `pet-card ${this.currentPet && this.currentPet.id === pet.id ? 'active-pet' : ''}`;
                    card.innerHTML = `
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡ ${pet.power}</div>
                        <div class="pet-card-rarity" style="background: ${pet.rarity === 'mythic' ? '#e91e63' : pet.rarity === 'legendary' ? '#f39c12' : pet.rarity === 'epic' ? '#9b59b6' : pet.rarity === 'rare' ? '#3498db' : '#95a5a6'}">${pet.rarity.toUpperCase()}</div>
                        <button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 Продать за ${Math.floor(pet.power * 10)}💰</button>
                    `;
                    card.onclick = (e) => { if(e.target !== card.querySelector('.sell-btn')) this.selectPet(pet); };
                    container.appendChild(card);
                });
                document.getElementById('totalPets').textContent = this.pets.length;
                const totalPower = this.pets.reduce((sum, p) => sum + p.power, 0);
                document.getElementById('totalPower').textContent = totalPower;
                const totalSell = this.pets.reduce((sum, p) => sum + Math.floor(p.power * 10), 0);
                document.getElementById('totalSellValue').textContent = totalSell;
            }

            renderUpgrades() {
                const container = document.getElementById('upgradesContainer');
                container.innerHTML = '';
                this.upgrades.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<div class="upgrade-name">${up.name}</div><div class="upgrade-desc">${up.desc}</div><div class="upgrade-price">${up.priceType === 'coins' ? '💰' : '💎'} ${up.price}</div><div>Уровень: ${up.level}</div>`;
                    card.onclick = () => this.buyUpgrade(up);
                    container.appendChild(card);
                });
            }

            renderBoosts() {
                const container = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const remaining = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;
                    container.innerHTML = `<div class="boost-timer"><div style="color:#ffd700;">⚡ АКТИВЕН x2 ⚡</div><div>Осталось: ${minutes}:${seconds.toString().padStart(2,'0')}</div></div>`;
                } else container.innerHTML = `<div class="boost-timer"><div style="color:#b87cff;">💤 Нет бустов</div><div style="font-size:12px;">Купи за 100💎</div></div>`;
            }

            updateUI() {
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('gems').textContent = Math.floor(this.gems);
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
                if (this.currentPet) {
                    document.getElementById('currentPetEmoji').textContent = this.currentPet.emoji;
                    document.getElementById('currentPetName').textContent = this.currentPet.name;
                    document.getElementById('currentPetPower').textContent = `⭐ Сила: ${this.currentPet.power} ⭐`;
                }
            }

            showFloatingNumber(text, x, y) {
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.textContent = text;
                div.style.left = `${x - 30}px`;
                div.style.top = `${y - 40}px`;
                div.style.color = '#ffd700';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 1000);
            }

            showMessage(text) {
                const msg = document.createElement('div');
                msg.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:12px 24px;border-radius:40px;z-index:1000;animation:fadeOut 2s forwards;font-weight:bold;border:1px solid #ffd700;`;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }

            startAutoClicker() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        const worldBonus = this.worlds[this.currentWorld].multiplier;
                        const boostBonus = this.boostActive ? 2 : 1;
                        const earned = Math.floor(this.autoClickerLevel * 8 * worldBonus * this.multiplier * boostBonus);
                        this.coins += earned;
                        this.updateUI();
                        this.saveGame();
                    }
                }, 1000);
            }

            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.showMessage("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.saveGame();
                    }
                    this.updateUI();
                }, 1000);
            }

            saveGame() {
                const save = { 
                    coins: this.coins, gems: this.gems, clickPower: this.clickPower, totalClicks: this.totalClicks, 
                    multiplier: this.multiplier, currentWorld: this.currentWorld, worlds: this.worlds, 
                    pets: this.pets, currentPet: this.currentPet, autoClickerLevel: this.autoClickerLevel, 
                    boostActive: this.boostActive, boostEndTime: this.boostEndTime,
                    upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price }))
                };
                localStorage.setItem('petSimulatorUltimateV2', JSON.stringify(save));
            }

            loadGame() {
                const save = localStorage.getItem('petSimulatorUltimateV2');
                if (save) {
                    const data = JSON.parse(save);
                    this.coins = data.coins; this.gems = data.gems; this.clickPower = data.clickPower;
                    this.totalClicks = data.totalClicks; this.multiplier = data.multiplier;
                    this.currentWorld = data.currentWorld; this.worlds = data.worlds;
                    this.pets = data.pets; this.currentPet = data.currentPet;
                    this.autoClickerLevel = data.autoClickerLevel;
                    this.boostActive = data.boostActive; this.boostEndTime = data.boostEndTime;
                    if (data.upgrades) this.upgrades.forEach((u, i) => { if (data.upgrades[i]) { u.level = data.upgrades[i].level; u.price = data.upgrades[i].price; } });
                }
            }
        }

        const game = new PetSimulator();
        window.game = game;
    </script>
