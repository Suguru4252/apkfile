<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        /* Шапка - СТАРЫЙ ДИЗАЙН */
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 10px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 12px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 10px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 3px;
            border-radius: 10px;
            flex: 1;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 9px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: white;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        /* Главная - СТАРЫЙ ДИЗАЙН */
        #home-content {
            min-height: 100%;
            cursor: pointer;
        }
        
        .clicker-area {
            text-align: center;
            pointer-events: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            pointer-events: none;
        }
        
        .click-btn span {
            font-size: 16px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
            animation: pulse 2s infinite;
            text-align: center;
        }
        
        /* Карточки - СТАРЫЙ ДИЗАЙН */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 5px;
        }
        
        /* Кнопки - СТАРЫЙ ДИЗАЙН */
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 12px 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 14px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            display: inline-block;
        }
        
        /* Нижняя навигация - СТАРЫЙ ДИЗАЙН */
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.3s;
        }
        
        .nav-item span {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        /* Магазин - СТАРЫЙ ДИЗАЙН */
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 3px;
        }
        
        .item-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 13px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Недвижимость - СТАРЫЙ ДИЗАЙН */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);
        }
        
        .property-category span {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 14px;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 32px;
            width: 50px;
            text-align: center;
        }
        
        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 14px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 13px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 12px;
        }
        
        .property-owned {
            background: #2e7d32;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
        }
        
        /* Бизнес - СТАРЫЙ ДИЗАЙН */
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 14px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 12px;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin: 5px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 11px;
            color: #ff9800;
            text-align: center;
        }
        
        /* Модальные окна - СТАРЫЙ ДИЗАЙН */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 20px;
            padding: 20px;
            max-width: 300px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            text-align: center;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">IMPERIA</div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <!-- Контент -->
        <div class="content" id="content"></div>
        
        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>
    </div>

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // Состояние игры
        let gameState = {
            balance: 0,
            diamonds: 10,
            exp: 0,
            level: 1,
            
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            
            totalClicks: 0,
            totalEarned: 0,
            playTime: 0,
            lastOnlineTime: Date.now(),
            
            // БИЗНЕСЫ (10 штук, 20 уровней) - ЦЕНЫ УВЕЛИЧЕНЫ
            businesses: [
                { id: 0, name: "🚕 ТАКСОПАРК", level: 0, maxLevel: 20, baseIncome: 1, upgradeCost: 5.000, owned: false, totalEarned: 0, upgradeTime: 30, upgradeEnd: 0 },
                { id: 1, name: "🍔 РЕСТОРАН", level: 0, maxLevel: 20, baseIncome: 2, upgradeCost: 25.000, owned: false, totalEarned: 0, upgradeTime: 60, upgradeEnd: 0 },
                { id: 2, name: "⛽ ЗАПРАВКА", level: 0, maxLevel: 20, baseIncome: 5, upgradeCost: 125.000, owned: false, totalEarned: 0, upgradeTime: 120, upgradeEnd: 0 },
                { id: 3, name: "🏭 ЗАВОД", level: 0, maxLevel: 20, baseIncome: 10, upgradeCost: 625.000, owned: false, totalEarned: 0, upgradeTime: 180, upgradeEnd: 0 },
                { id: 4, name: "🏨 ОТЕЛЬ", level: 0, maxLevel: 20, baseIncome: 20, upgradeCost: 3.125.000, owned: false, totalEarned: 0, upgradeTime: 300, upgradeEnd: 0 },
                { id: 5, name: "🎰 КАЗИНО", level: 0, maxLevel: 20, baseIncome: 50, upgradeCost: 15.625.000, owned: false, totalEarned: 0, upgradeTime: 600, upgradeEnd: 0 },
                { id: 6, name: "🏦 БАНК", level: 0, maxLevel: 20, baseIncome: 100, upgradeCost: 78.125.000, owned: false, totalEarned: 0, upgradeTime: 1200, upgradeEnd: 0 },
                { id: 7, name: "🛳️ ПОРТ", level: 0, maxLevel: 20, baseIncome: 200, upgradeCost: 390.625.000, owned: false, totalEarned: 0, upgradeTime: 2400, upgradeEnd: 0 },
                { id: 8, name: "✈️ АЭРОПОРТ", level: 0, maxLevel: 20, baseIncome: 500, upgradeCost: 1.953.125.000, owned: false, totalEarned: 0, upgradeTime: 4800, upgradeEnd: 0 },
                { id: 9, name: "🏛️ ИМПЕРИЯ", level: 0, maxLevel: 20, baseIncome: 1000, upgradeCost: 9.765.625.000, owned: false, totalEarned: 0, upgradeTime: 9600, upgradeEnd: 0 }
            ],
            
            // НЕДВИЖИМОСТЬ (ЦЕНЫ УВЕЛИЧЕНЫ)
            houses: [
                { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 150.000, income: 15, owned: false },
                { id: 1, name: "ДОМ", emoji: "🏠", price: 1.500.000, income: 150, owned: false },
                { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 15.000.000, income: 1.500, owned: false },
                { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 150.000.000, income: 15.000, owned: false }
            ],
            cars: [
                { id: 0, name: "ЛАДА", emoji: "🚗", price: 75.000, income: 8, owned: false },
                { id: 1, name: "МЕРСЕДЕС", emoji: "🚘", price: 750.000, income: 75, owned: false },
                { id: 2, name: "ФЕРРАРИ", emoji: "🏎️", price: 7.500.000, income: 750, owned: false },
                { id: 3, name: "БУГАТТИ", emoji: "🚀", price: 75.000.000, income: 7.500, owned: false }
            ],
            planes: [
                { id: 0, name: "КУКУРУЗНИК", emoji: "✈️", price: 300.000, income: 30, owned: false },
                { id: 1, name: "БОИНГ", emoji: "🛩️", price: 3.000.000, income: 300, owned: false },
                { id: 2, name: "ЧАСТНЫЙ", emoji: "🛫", price: 30.000.000, income: 3.000, owned: false },
                { id: 3, name: "РЕАКТИВНЫЙ", emoji: "🛬", price: 300.000.000, income: 30.000, owned: false }
            ],
            ships: [
                { id: 0, name: "ЛОДКА", emoji: "🛶", price: 90.000, income: 9, owned: false },
                { id: 1, name: "КАРТЕР", emoji: "⛵", price: 900.000, income: 90, owned: false },
                { id: 2, name: "ЯХТА", emoji: "🛥️", price: 9.000.000, income: 900, owned: false },
                { id: 3, name: "ЛАЙНЕР", emoji: "🚢", price: 90.000.000, income: 9.000, owned: false }
            ]
        };
        
        // Цены улучшений (УВЕЛИЧЕНЫ)
        const upgradePrices = {
            clickPower: [25.000, 125.000, 625.000, 3.125.000, 15.625.000],
            autoClicker: [50.000, 250.000, 1.250.000, 6.250.000, 31.250.000],
            crit: [100.000, 500.000, 2.500.000, 12.500.000, 62.500.000]
        };
        
        // Функция для форматирования чисел с точками
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        // Функция для парсинга чисел с точками
        function parseNumber(str) {
            if (typeof str === 'number') return str;
            return parseFloat(str.replace(/\./g, '')) || 0;
        }
        
        // Загрузка
        function loadGame() {
            const saved = localStorage.getItem('imperiaClicker');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {}
            }
            
            const now = Date.now();
            const secondsPassed = Math.floor((now - gameState.lastOnlineTime) / 1000);
            
            if (secondsPassed > 30) {
                let offlineIncome = gameState.autoClickerLevel * secondsPassed;
                
                gameState.businesses.forEach(b => {
                    if (b.owned && b.level > 0) {
                        const income = parseNumber(b.baseIncome) * b.level;
                        offlineIncome += income * secondsPassed;
                        b.totalEarned = parseNumber(b.totalEarned) + income * secondsPassed;
                    }
                });
                
                if (offlineIncome > 0) {
                    gameState.balance = parseNumber(gameState.balance) + Math.floor(offlineIncome);
                    gameState.totalEarned = parseNumber(gameState.totalEarned) + Math.floor(offlineIncome);
                    setTimeout(() => {
                        document.getElementById('offlineBadge').style.display = 'inline-block';
                        document.getElementById('offlineBadge').textContent = `⏱️ +${formatNumber(Math.floor(offlineIncome))}💰`;
                        setTimeout(() => {
                            document.getElementById('offlineBadge').style.display = 'none';
                        }, 5000);
                    }, 500);
                }
            }
            
            gameState.lastOnlineTime = now;
            updateUI();
            checkBusinessUpgrades();
        }
        
        function saveGame() {
            gameState.lastOnlineTime = Date.now();
            localStorage.setItem('imperiaClicker', JSON.stringify(gameState));
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = formatNumber(Math.floor(parseNumber(gameState.balance)));
            document.getElementById('diamonds').textContent = gameState.diamonds;
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 1000;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            const activeTab = document.querySelector('.nav-item.active').dataset.tab;
            renderTab(activeTab);
        }
        
        function renderTab(tab) {
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                renderHome(content);
            } else if (tab === 'mybusiness') {
                renderBusinesses(content);
            } else if (tab === 'property') {
                renderProperty(content);
            } else if (tab === 'shop') {
                renderShop(content);
            } else if (tab === 'stats') {
                renderStats(content);
            }
        }
        
        function renderHome(content) {
            const power = parseNumber(gameState.clickPower) * (1 + gameState.clickPowerLevel * 0.5);
            const totalIncome = gameState.autoClickerLevel + 
                gameState.businesses.filter(b => b.owned).reduce((sum, b) => sum + (parseNumber(b.baseIncome) * b.level), 0);
            
            content.innerHTML = `
                <div id="home-content">
                    <div class="clicker-area">
                        <div class="per-second">⏱️ ДОХОД/СЕК: ${totalIncome}</div>
                        <div class="click-btn">
                            👆
                            <span>+${formatNumber(Math.floor(power))}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('home-content').addEventListener('click', handleClick);
        }
        
        function handleClick() {
            let power = parseNumber(gameState.clickPower) * (1 + gameState.clickPowerLevel * 0.5);
            
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance = parseNumber(gameState.balance) + earned;
            gameState.totalClicks++;
            gameState.totalEarned = parseNumber(gameState.totalEarned) + earned;
            gameState.exp += earned / 100;
            
            while (gameState.exp >= gameState.level * 1000) {
                gameState.exp -= gameState.level * 1000;
                gameState.level++;
                gameState.diamonds += gameState.level * 5;
            }
            
            updateUI();
            saveGame();
        }
        
        // Остальные функции рендера...
        // (они остаются такими же, как в предыдущей версии)
        
        // Проверка улучшений
        function checkBusinessUpgrades() {
            gameState.businesses.forEach(b => {
                if (b.upgradeEnd > 0 && b.upgradeEnd < Date.now() && b.level < b.maxLevel) {
                    b.level++;
                    b.upgradeCost = formatNumber(parseNumber(b.upgradeCost) * 2.2);
                    b.upgradeEnd = 0;
                    saveGame();
                }
            });
        }
        
        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // Запуск
        window.onload = function() {
            loadGame();
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('username').textContent = `👑 ${user.first_name || 'IMPERIA'}`;
                }
            }
            renderTab('home');
            setInterval(checkBusinessUpgrades, 1000);
        };
    </script>
</body>
</html>
