<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | Ultimate Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0615 0%, #120b1f 50%, #080412 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Main Container */
        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1326 0%, #0f0a1a 100%);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        /* Resources Bar */
        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(45, 20, 70, 0.8));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(156, 39, 176, 0.5);
            transition: all 0.3s;
        }

        .resource-card:hover {
            border-color: #9c27b0;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(156, 39, 176, 0.3);
        }

        .resource-icon { font-size: 40px; }
        .resource-info { flex: 1; }
        .resource-name { color: #b87cff; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .resource-value { color: #ffd966; font-size: 26px; font-weight: bold; text-shadow: 0 0 10px rgba(255,217,102,0.3); }

        /* Main Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1000px) {
            .game-layout { grid-template-columns: 1fr; }
        }

        /* Pet Area */
        .pet-area {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15), rgba(103, 58, 183, 0.2));
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(156, 39, 176, 0.6);
            transition: transform 0.1s;
            backdrop-filter: blur(10px);
        }

        .pet-area:active { transform: scale(0.98); }

        .pet-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(156,39,176,0.2), transparent);
            animation: rotateGlow 15s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGlow {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .current-pet {
            font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(156, 39, 176, 0.6));
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .pet-name {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd966, #b87cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
        }

        .pet-power { color: #b87cff; font-size: 18px; margin-top: 8px; }

        /* Side Panel */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        /* World Selector */
        .world-selector {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        .world-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .world-btn {
            background: linear-gradient(135deg, rgba(156,39,176,0.2), rgba(103,58,183,0.2));
            border: 1px solid rgba(156,39,176,0.4);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
            border-color: #ffd966;
            box-shadow: 0 0 15px rgba(156,39,176,0.5);
        }

        .world-btn:hover { transform: translateY(-2px); border-color: #b87cff; }

        /* Boost Section */
        .boost-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        .boost-timer {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 10px;
        }

        /* Eggs Section */
        .eggs-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #ffd966;
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .eggs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .egg-card {
            background: linear-gradient(135deg, rgba(156,39,176,0.15), rgba(103,58,183,0.15));
            border: 2px solid rgba(156,39,176,0.5);
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .egg-card:hover {
            transform: translateY(-5px);
            border-color: #b87cff;
            box-shadow: 0 10px 25px rgba(156,39,176,0.3);
        }

        .egg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .egg-emoji { font-size: 48px; }
        .egg-title { font-size: 20px; font-weight: bold; color: #ffd966; }
        .egg-price {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            margin: 8px 0;
            font-weight: bold;
        }

        .pet-list {
            margin-top: 12px;
            border-top: 1px solid rgba(156,39,176,0.3);
            padding-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .pet-chance {
            font-size: 11px;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pet-chance span:first-child { color: #ffd966; font-weight: bold; }
        .pet-chance .chance-badge { 
            background: rgba(156,39,176,0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        /* Pets Collection */
        .pets-collection {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(156,39,176,0.2), rgba(103,58,183,0.15));
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 1px solid rgba(156,39,176,0.3);
        }

        .pet-card.active-pet {
            border: 2px solid #ffd966;
            background: linear-gradient(135deg, rgba(156,39,176,0.4), rgba(103,58,183,0.3));
            box-shadow: 0 0 15px rgba(255,217,102,0.3);
        }

        .pet-card-emoji { font-size: 48px; }
        .pet-card-name { font-size: 12px; color: white; font-weight: bold; margin: 5px 0; }
        .pet-card-power { font-size: 11px; color: #ffd966; }
        .pet-card-rarity { font-size: 10px; margin-top: 5px; padding: 2px 6px; border-radius: 10px; display: inline-block; }

        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            width: 100%;
        }

        .sell-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }

        /* Upgrades Section */
        .upgrades-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(156, 39, 176, 0.4);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, rgba(156,39,176,0.2), rgba(103,58,183,0.15));
            border: 1px solid rgba(156,39,176,0.4);
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .upgrade-card:hover {
            transform: translateY(-2px);
            border-color: #b87cff;
        }

        .btn {
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }

        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 5px black;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }

        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #9c27b0; border-radius: 10px; }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Resources -->
        <div class="resources-bar">
            <div class="resource-card"><div class="resource-icon">💰</div><div class="resource-info"><div class="resource-name">Монеты</div><div class="resource-value" id="coins">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">💎</div><div class="resource-info"><div class="resource-name">Алмазы</div><div class="resource-value" id="gems">0</div></div></div>
            <div class="resource-card"><div class="resource-icon">⚡</div><div class="resource-info"><div class="resource-name">Сила клика</div><div class="resource-value" id="clickPower">1</div></div></div>
            <div class="resource-card"><div class="resource-icon">🚀</div><div class="resource-info"><div class="resource-name">Множитель</div><div class="resource-value" id="multiplier">1x</div></div></div>
        </div>

        <div class="game-layout">
            <div class="pet-area" id="petArea">
                <div class="pet-glow"></div>
                <div class="current-pet" id="currentPetEmoji">🐣</div>
                <div class="pet-name" id="currentPetName">Маленький питомец</div>
                <div class="pet-power" id="currentPetPower">⭐ Сила: 1 ⭐</div>
            </div>

            <div class="side-panel">
                <div class="world-selector">
                    <div class="section-title" style="font-size: 18px;">🌍 МИРЫ 🌍</div>
                    <div class="world-buttons" id="worldsContainer"></div>
                </div>
                <div class="boost-section">
                    <div class="section-title" style="font-size: 18px;">⚡ БУСТЫ ⚡</div>
                    <div id="boostsContainer"></div>
                    <button class="btn" id="buyBoostBtn">💪 Купить буст x2 (100💎)</button>
                </div>
            </div>
        </div>

        <!-- Eggs -->
        <div class="eggs-section">
            <div class="section-title">🥚 МАГИЧЕСКИЕ ЯЙЦА 🥚</div>
            <div class="eggs-grid" id="eggsContainer"></div>
        </div>

        <!-- Pets Collection -->
        <div class="pets-collection">
            <div class="section-title">🐕 МОИ ПИТОМЦЫ 🐈</div>
            <div class="pets-stats">
                <span>📊 Всего: <span id="totalPets">0</span></span>
                <span>⭐ Общая сила: <span id="totalPower">0</span></span>
                <span>💰 Стоимость продажи всех: <span id="totalSellValue">0</span>💰</span>
            </div>
            <div class="pets-grid" id="petsContainer"></div>
            <button class="btn" id="sellAllBtn" style="background: linear-gradient(135deg, #ff4444, #aa2222); margin-top: 15px;">💰 ПРОДАТЬ ВСЕХ ПИТОМЦЕВ КРОМЕ АКТИВНОГО 💰</button>
        </div>

        <!-- Upgrades -->
        <div class="upgrades-section">
            <div class="section-title">✨ УЛУЧШЕНИЯ ✨</div>
            <div class="upgrades-grid" id="upgradesContainer"></div>
        </div>
    </div>

    <script>
        // ==================== ПИТОМЦЫ С ШАНСАМИ ====================
        const ALL_PETS = {
            common: [
                { emoji: "🐣", name: "Цыпленок", power: 1, chance: 30 },
                { emoji: "🐥", name: "Утенок", power: 2, chance: 25 },
                { emoji: "🐦", name: "Птичка", power: 3, chance: 20 },
                { emoji: "🐌", name: "Улитка", power: 1, chance: 25 }
            ],
            rare: [
                { emoji: "🐱", name: "Котенок", power: 5, chance: 20 },
                { emoji: "🐶", name: "Щенок", power: 6, chance: 18 },
                { emoji: "🐭", name: "Мышонок", power: 4, chance: 22 },
                { emoji: "🐹", name: "Хомяк", power: 5, chance: 20 },
                { emoji: "🐰", name: "Зайчик", power: 7, chance: 12 },
                { emoji: "🦊", name: "Лисенок", power: 8, chance: 8 }
            ],
            epic: [
                { emoji: "🐼", name: "Панда", power: 15, chance: 25 },
                { emoji: "🐨", name: "Коала", power: 12, chance: 30 },
                { emoji: "🐸", name: "Лягушонок", power: 10, chance: 25 },
                { emoji: "🐧", name: "Пингвин", power: 18, chance: 12 },
                { emoji: "🦝", name: "Енот", power: 20, chance: 8 }
            ],
            legendary: [
                { emoji: "🐉", name: "Дракон", power: 50, chance: 25 },
                { emoji: "🦄", name: "Единорог", power: 45, chance: 25 },
                { emoji: "🐲", name: "Восточный дракон", power: 55, chance: 20 },
                { emoji: "🦅", name: "Орел", power: 40, chance: 20 },
                { emoji: "🐺", name: "Волк", power: 48, chance: 10 }
            ],
            mythic: [
                { emoji: "👑🐉", name: "Король драконов", power: 200, chance: 20 },
                { emoji: "⭐🦄", name: "Звездный единорог", power: 180, chance: 20 },
                { emoji: "🌙🐺", name: "Лунный волк", power: 160, chance: 20 },
                { emoji: "🔥🐦‍🔥", name: "Феникс", power: 220, chance: 15 },
                { emoji: "💀🐉", name: "Некродракон", power: 250, chance: 10 },
                { emoji: "👁️", name: "Всевидящее око", power: 300, chance: 8 },
                { emoji: "🌈🐉", name: "Радужный дракон", power: 350, chance: 5 },
                { emoji: "✨🐉", name: "Космический дракон", power: 400, chance: 2 }
            ]
        };

        const EGGS_DATA = [
            { id: "common", name: "🥚 Обычное яйцо", price: 100, priceType: "coins", rarity: "common", icon: "🥚", color: "#brown" },
            { id: "rare", name: "💙 Редкое яйцо", price: 50, priceType: "gems", rarity: "rare", icon: "💙🥚", color: "#4a90e2" },
            { id: "epic", name: "💜 Эпическое яйцо", price: 150, priceType: "gems", rarity: "epic", icon: "💜🥚", color: "#9b59b6" },
            { id: "legendary", name: "⭐ Легендарное яйцо", price: 400, priceType: "gems", rarity: "legendary", icon: "⭐🥚", color: "#f39c12" },
            { id: "mythic", name: "💎 Мифическое яйцо", price: 1000, priceType: "gems", rarity: "mythic", icon: "💎🥚", color: "#e91e63" }
        ];

        class PetSimulator {
            constructor() {
                this.coins = 5000;
                this.gems = 200;
                this.clickPower = 1;
                this.totalClicks = 0;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌿 Лесная чаща", multiplier: 1, unlocked: true, cost: 0, icon: "🌿" },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 5000, icon: "🔥" },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 20000, icon: "❄️" },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 80000, icon: "⚡" },
                    { name: "💀 Преисподняя", multiplier: 8, unlocked: false, cost: 250000, icon: "💀" },
                    { name: "👑 Райский сад", multiplier: 12, unlocked: false, cost: 1000000, icon: "👑" }
                ];
                this.pets = [];
                this.currentPet = null;
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                this.upgrades = [
                    { id: "click", name: "💪 Усиление клика", desc: "+5 к силе", price: 500, priceType: "coins", effect: () => { this.clickPower += 5; }, level: 0, basePrice: 500 },
                    { id: "auto", name: "🤖 Авто-кликер", desc: "+1 клик/сек", price: 800, priceType: "coins", effect: () => { this.autoClickerLevel++; this.startAutoClicker(); }, level: 0, basePrice: 800 },
                    { id: "multiplier", name: "✨ Множитель", desc: "+0.5x доход", price: 1500, priceType: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, basePrice: 1500 }
                ];
                this.init();
            }

            init() {
                this.loadGame();
                this.renderWorlds();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAutoClicker();
                this.startBoostTimer();
                this.setupEventListeners();
            }

            setupEventListeners() {
                document.getElementById('petArea').addEventListener('click', (e) => this.clickPet(e));
                document.getElementById('buyBoostBtn').addEventListener('click', () => this.buyBoost());
                document.getElementById('sellAllBtn').addEventListener('click', () => this.sellAllPets());
            }

            getRandomPet(rarity) {
                const pets = ALL_PETS[rarity];
                const totalChance = pets.reduce((sum, p) => sum + p.chance, 0);
                let random = Math.random() * totalChance;
                let accumulated = 0;
                for (const pet of pets) {
                    accumulated += pet.chance;
                    if (random <= accumulated) return { ...pet, rarity };
                }
                return { ...pets[0], rarity };
            }

            openEgg(eggData) {
                if (eggData.priceType === "coins" && this.coins >= eggData.price) {
                    this.coins -= eggData.price;
                } else if (eggData.priceType === "gems" && this.gems >= eggData.price) {
                    this.gems -= eggData.price;
                } else {
                    this.showMessage("❌ Недостаточно ресурсов!");
                    return;
                }

                const newPet = this.getRandomPet(eggData.rarity);
                const petWithId = { ...newPet, id: Date.now() + Math.random() };
                this.pets.push(petWithId);

                if (!this.currentPet) this.selectPet(petWithId);
                else this.updateClickPower();

                this.showMessage(`🎉 ВЫ ПОЛУЧИЛИ: ${petWithId.name}! ⭐ Сила: ${petWithId.power} ⭐`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            selectPet(pet) {
                this.currentPet = pet;
                this.updateClickPower();
                this.renderPets();
                this.saveGame();
            }

            sellPet(petId) {
                const petIndex = this.pets.findIndex(p => p.id === petId);
                if (petIndex === -1) return;
                const pet = this.pets[petIndex];
                if (this.currentPet && this.currentPet.id === petId) {
                    this.showMessage("❌ Нельзя продать активного питомца!");
                    return;
                }
                const sellValue = Math.floor(pet.power * 10);
                this.coins += sellValue;
                this.pets.splice(petIndex, 1);
                this.showMessage(`💰 Продано: ${pet.name} за ${sellValue} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            sellAllPets() {
                if (this.pets.length <= 1) {
                    this.showMessage("❌ Нет питомцев для продажи или только один активный!");
                    return;
                }
                let totalSell = 0;
                const toSell = this.pets.filter(p => !(this.currentPet && p.id === this.currentPet.id));
                for (const pet of toSell) {
                    totalSell += Math.floor(pet.power * 10);
                }
                this.coins += totalSell;
                this.pets = this.pets.filter(p => this.currentPet && p.id === this.currentPet.id);
                this.showMessage(`💰 Продано ${toSell.length} питомцев! Получено: ${totalSell} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }

            updateClickPower() {
                if (this.currentPet) this.clickPower = 5 + this.currentPet.power;
                else this.clickPower = 1;
                this.updateUI();
            }

            clickPet(event) {
                const worldBonus = this.worlds[this.currentWorld].multiplier;
                const boostBonus = this.boostActive ? 2 : 1;
                let earned = Math.floor(this.clickPower * worldBonus * this.multiplier * boostBonus);
                this.coins += earned;
                this.totalClicks++;
                this.showFloatingNumber(`+${earned}💰`, event.clientX, event.clientY);
                document.getElementById('petArea').classList.add('shake');
                setTimeout(() => document.getElementById('petArea').classList.remove('shake'), 300);
                this.updateUI();
                this.saveGame();
            }

            buyUpgrade(upgrade) {
                if (upgrade.priceType === "coins" && this.coins >= upgrade.price) this.coins -= upgrade.price;
                else if (upgrade.priceType === "gems" && this.gems >= upgrade.price) this.gems -= upgrade.price;
                else { this.showMessage("Недостаточно!"); return; }
                upgrade.effect();
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.basePrice * Math.pow(1.5, upgrade.level));
                this.updateUI();
                this.renderUpgrades();
                this.saveGame();
            }

            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.showMessage("⚡ БУСТ АКТИВИРОВАН! x2 доход на 5 минут!");
                    this.renderBoosts();
                    this.saveGame();
                } else this.showMessage("Нужно 100 алмазов!");
            }

            unlockWorld(index) {
                const world = this.worlds[index];
                if (!world.unlocked && this.coins >= world.cost) {
                    this.coins -= world.cost;
                    world.unlocked = true;
                    this.showMessage(`🌍 Открыт мир: ${world.name}!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                } else if (!world.unlocked) this.showMessage(`Нужно ${world.cost} монет!`);
            }

            changeWorld(index) {
                if (this.worlds[index].unlocked) {
                    this.currentWorld = index;
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                }
            }

            startAutoClicker() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        const worldBonus = this.worlds[this.currentWorld].multiplier;
                        const boostBonus = this.boostActive ? 2 : 1;
                        const earned = Math.floor(this.autoClickerLevel * 8 * worldBonus * this.multiplier * boostBonus);
                        this.coins += earned;
                        this.updateUI();
                        this.saveGame();
                    }
                }, 1000);
            }

            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.showMessage("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.saveGame();
                    }
                    this.updateUI();
                }, 1000);
            }

            renderWorlds() {
                const container = document.getElementById('worldsContainer');
                container.innerHTML = '';
                this.worlds.forEach((world, i) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${i === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `<div style="font-size: 20px;">${world.icon}</div><div style="font-size: 11px;">${world.name}</div><div style="font-size: 10px;">x${world.multiplier}</div>${!world.unlocked ? `<div style="font-size: 10px; color:#ffd966;">💰${world.cost}</div>` : ''}`;
                    btn.onclick = () => world.unlocked ? this.changeWorld(i) : this.unlockWorld(i);
                    container.appendChild(btn);
                });
            }

            renderEggs() {
                const container = document.getElementById('eggsContainer');
                container.innerHTML = '';
                EGGS_DATA.forEach(egg => {
                    const petsList = ALL_PETS[egg.rarity];
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header"><div class="egg-emoji">${egg.icon}</div><div class="egg-title">${egg.name}</div></div>
                        <div class="egg-price">${egg.priceType === 'coins' ? '💰' : '💎'} ${egg.price}</div>
                        <div class="pet-list"><div class="pet-list-title">📋 Кто может выпасть:</div>
                        ${petsList.map(p => `<div class="pet-chance"><span>${p.emoji} ${p.name} (сила ${p.power})</span><span class="chance-badge">${p.chance}%</span></div>`).join('')}
                        </div>
                    `;
                    card.onclick = () => this.openEgg(egg);
                    container.appendChild(card);
                });
            }

            renderPets() {
                const container = document.getElementById('petsContainer');
                container.innerHTML = '';
                const sortedPets = [...this.pets].sort((a,b) => b.power - a.power);
                sortedPets.forEach(pet => {
                    const card = document.createElement('div');
                    card.className = `pet-card ${this.currentPet && this.currentPet.id === pet.id ? 'active-pet' : ''}`;
                    card.innerHTML = `
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡ ${pet.power}</div>
                        <div class="pet-card-rarity" style="background: ${pet.rarity === 'mythic' ? '#e91e63' : pet.rarity === 'legendary' ? '#f39c12' : pet.rarity === 'epic' ? '#9b59b6' : pet.rarity === 'rare' ? '#3498db' : '#95a5a6'}">${pet.rarity.toUpperCase()}</div>
                        <button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 Продать за ${Math.floor(pet.power * 10)}💰</button>
                    `;
                    card.onclick = (e) => { if(e.target !== card.querySelector('.sell-btn')) this.selectPet(pet); };
                    container.appendChild(card);
                });
                document.getElementById('totalPets').textContent = this.pets.length;
                const totalPower = this.pets.reduce((sum, p) => sum + p.power, 0);
                document.getElementById('totalPower').textContent = totalPower;
                const totalSell = this.pets.reduce((sum, p) => sum + Math.floor(p.power * 10), 0);
                document.getElementById('totalSellValue').textContent = totalSell;
            }

            renderUpgrades() {
                const container = document.getElementById('upgradesContainer');
                container.innerHTML = '';
                this.upgrades.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<div class="upgrade-name">${up.name}</div><div class="upgrade-desc">${up.desc}</div><div class="upgrade-price">${up.priceType === 'coins' ? '💰' : '💎'} ${up.price}</div><div>Уровень: ${up.level}</div>`;
                    card.onclick = () => this.buyUpgrade(up);
                    container.appendChild(card);
                });
            }

            renderBoosts() {
                const container = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const remaining = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;
                    container.innerHTML = `<div class="boost-timer"><div style="color:#ffd966;">⚡ АКТИВЕН x2 ⚡</div><div>Осталось: ${minutes}:${seconds.toString().padStart(2,'0')}</div></div>`;
                } else container.innerHTML = `<div class="boost-timer"><div style="color:#b87cff;">💤 Нет бустов</div><div style="font-size:12px;">Купи за 100💎</div></div>`;
            }

            updateUI() {
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('gems').textContent = Math.floor(this.gems);
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
                if (this.currentPet) {
                    document.getElementById('currentPetEmoji').textContent = this.currentPet.emoji;
                    document.getElementById('currentPetName').textContent = this.currentPet.name;
                    document.getElementById('currentPetPower').textContent = `⭐ Сила: ${this.currentPet.power} ⭐`;
                }
            }

            showFloatingNumber(text, x, y) {
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.textContent = text;
                div.style.left = `${x - 30}px`;
                div.style.top = `${y - 40}px`;
                div.style.color = '#ffd966';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 1000);
            }

            showMessage(text) {
                const msg = document.createElement('div');
                msg.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd966;padding:12px 24px;border-radius:40px;z-index:1000;animation:fadeOut 2s forwards;font-weight:bold;border:1px solid #9c27b0;`;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }

            saveGame() {
                const save = { coins: this.coins, gems: this.gems, clickPower: this.clickPower, totalClicks: this.totalClicks, multiplier: this.multiplier, currentWorld: this.currentWorld, worlds: this.worlds, pets: this.pets, currentPet: this.currentPet, autoClickerLevel: this.autoClickerLevel, boostActive: this.boostActive, boostEndTime: this.boostEndTime, upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price })) };
                localStorage.setItem('petSimulatorUltimate', JSON.stringify(save));
            }

            loadGame() {
                const save = localStorage.getItem('petSimulatorUltimate');
                if (save) {
                    const data = JSON.parse(save);
                    this.coins = data.coins; this.gems = data.gems; this.clickPower = data.clickPower; this.totalClicks = data.totalClicks; this.multiplier = data.multiplier; this.currentWorld = data.currentWorld; this.worlds = data.worlds; this.pets = data.pets; this.currentPet = data.currentPet; this.autoClickerLevel = data.autoClickerLevel; this.boostActive = data.boostActive; this.boostEndTime = data.boostEndTime;
                    if (data.upgrades) this.upgrades.forEach((u, i) => { if (data.upgrades[i]) { u.level = data.upgrades[i].level; u.price = data.upgrades[i].price; } });
                }
            }
        }

        const game = new PetSimulator();
        window.game = game;
    </script>
</body>
</html>
