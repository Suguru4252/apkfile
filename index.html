<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Management · вход в систему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #000000;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* заголовок BR Management */
        .main-title {
            background-color: #1e2b3c;
            color: white;
            padding: 16px 24px;
            border-bottom: 2px solid #0f1a24;
        }

        .main-title h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .main-title .subtitle {
            font-size: 13px;
            color: #a0b3c9;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* основная часть */
        .content {
            padding: 30px 24px 24px 24px;
        }

        /* приветствие */
        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            color: #000;
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 15px;
            color: #333;
            margin-bottom: 30px;
        }

        /* форма */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #111;
            margin-bottom: 8px;
        }

        .input-field, .select-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #ccc;
            border-radius: 0;
            background: white;
            font-family: inherit;
            transition: 0.2s;
        }

        .input-field:focus, .select-field:focus {
            outline: none;
            border-color: #1e2b3c;
        }

        .input-field::placeholder {
            color: #999;
            font-size: 14px;
        }

        /* дропдаун (стрелка сохраняется) */
        .select-field {
            appearance: auto;
            -webkit-appearance: menulist;
            background: white;
            color: #333;
        }

        /* кнопка входа */
        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: #1e2b3c;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            margin: 30px 0 35px 0;
            border-radius: 0;
            transition: 0.15s;
        }

        .login-btn:hover {
            background: #2a3b50;
        }

        /* раздел BR SYSTEM */
        .system-block {
            border-top: 2px solid #eaeef2;
            padding-top: 25px;
            margin-top: 5px;
        }

        .system-title {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            margin-bottom: 15px;
            letter-spacing: 0.3px;
        }

        .system-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .system-list li {
            font-size: 16px;
            padding: 10px 0 10px 28px;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
            color: #222;
        }

        .system-list li:before {
            content: "•";
            position: absolute;
            left: 8px;
            color: #1e2b3c;
            font-size: 20px;
            top: 7px;
        }

        /* нижняя строка */
        .footer-note {
            margin-top: 25px;
            font-size: 14px;
            color: #444;
            padding: 15px 0 0 0;
            border-top: 1px dashed #aaa;
        }

        /* точное соответствие элементам из скриншота */
        .placeholder-text {
            color: #555;
            font-style: normal;
        }

        /* эмуляция дропдауна "Введите пароль..." */
        select.select-field option {
            color: #333;
        }

        select.select-field option:first-child {
            color: #777;
        }

        /* стрелка у селекта сохраняется браузерная */
    </style>
</head>
<body>
    <div class="login-container">
        <!-- верх: BR Management / СИСТЕМА УПРАВЛЕНИЯ -->
        <div class="main-title">
            <h1>BR Management</h1>
            <div class="subtitle">СИСТЕМА УПРАВЛЕНИЯ</div>
        </div>

        <div class="content">
            <!-- приветствие точь-в-точь -->
            <div class="welcome">
                <h2>Добро пожаловать</h2>
                <p>Войдите в свой аккаунт для продолжения</p>
            </div>

            <!-- форма входа: TELEGRAM ID / ПАРОЛЬ (дропдаун) -->
            <div class="form-group">
                <label>TELEGRAM ID</label>
                <input type="text" class="input-field" placeholder="Ваш Telegram ID..." value="">
            </div>

            <div class="form-group">
                <label>ПАРОЛЬ</label>
                <!-- выпадающий список "Введите пароль..." как на скриншоте -->
                <select class="select-field">
                    <option value="" disabled selected>Введите пароль...</option>
                    <option value="option1">••••••••</option>
                    <option value="option2">(поле для ввода)</option>
                    <!-- технически это селект, но выглядит как дропдаун с плейсхолдером -->
                </select>
                <!-- маленькое пояснение: если нужно именно поле ввода, но на скриншоте показан именно дропдаун с текстом "Введите пароль..." -->
            </div>

            <!-- кнопка Войти (жирная, темная) -->
            <button class="login-btn">Войти</button>

            <!-- BR SYSTEM и три пункта -->
            <div class="system-block">
                <div class="system-title">BR SYSTEM</div>
                <ul class="system-list">
                    <li>Управление составом</li>
                    <li>Подача заявлений</li>
                    <li>Статистика и отчёты</li>
                </ul>
            </div>

            <!-- футер: обращение к куратору -->
            <div class="footer-note">
                Нет доступа? Обратитесь к вашему куратору.
            </div>
        </div>
    </div>

    <!-- скрытый комментарий для полной идентичности фраз (все уже выведено) -->
</body>
</html>
