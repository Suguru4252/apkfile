<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Main Game Container */
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(46, 34, 59, 0.95), rgba(26, 15, 36, 0.95));
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        /* World Themes */
        .game-container[data-theme="forest"] { background: linear-gradient(135deg, rgba(30, 50, 30, 0.95), rgba(15, 30, 15, 0.95)); border-color: #4caf50; }
        .game-container[data-theme="volcano"] { background: linear-gradient(135deg, rgba(70, 35, 20, 0.95), rgba(45, 20, 10, 0.95)); border-color: #ff5722; }
        .game-container[data-theme="ice"] { background: linear-gradient(135deg, rgba(30, 55, 75, 0.95), rgba(15, 35, 50, 0.95)); border-color: #00bcd4; }
        .game-container[data-theme="sky"] { background: linear-gradient(135deg, rgba(40, 45, 85, 0.95), rgba(25, 30, 65, 0.95)); border-color: #ffd700; }
        .game-container[data-theme="hell"] { background: linear-gradient(135deg, rgba(70, 25, 40, 0.95), rgba(45, 15, 25, 0.95)); border-color: #ff3366; }
        .game-container[data-theme="paradise"] { background: linear-gradient(135deg, rgba(80, 45, 100, 0.95), rgba(55, 30, 75, 0.95)); border-color: #ff88ff; }

        /* Resources Bar */
        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: transform 0.3s ease;
        }

        .resource-card:hover {
            transform: translateY(-2px);
        }

        .resource-icon {
            font-size: 40px;
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-transform: uppercase;
        }

        .resource-value {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        /* Main Game Area */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }

        /* Pet Area */
        .pet-area {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .pet-area:active {
            transform: scale(0.98);
        }

        .current-pet {
            font-size: 120px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .pet-name {
            font-size: 24px;
            font-weight: bold;
            color: #2a1a3a;
            margin-top: 10px;
        }

        .pet-power {
            color: #ff6600;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Side Panel */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* World Selector */
        .world-selector {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
        }

        .world-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .world-btn {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border-color: #fff;
            transform: scale(1.05);
        }

        .world-btn:hover {
            transform: translateY(-2px);
        }

        /* Boost Section */
        .boost-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
        }

        .boost-timer {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
        }

        /* Eggs Section */
        .eggs-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .eggs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .egg-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .egg-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .egg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .egg-emoji {
            font-size: 48px;
        }

        .egg-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .egg-price {
            color: #ffd700;
            font-size: 16px;
            margin: 8px 0;
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .pet-list {
            margin-top: 10px;
            border-top: 1px solid rgba(255,215,0,0.3);
            padding-top: 10px;
            max-height: 180px;
            overflow-y: auto;
        }

        .pet-chance {
            font-size: 11px;
            padding: 3px 0;
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
        }

        .pet-chance span:first-child {
            color: #ffd700;
        }

        /* Pets Collection */
        .pets-collection {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .pet-card.active-pet {
            border: 2px solid #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
            transform: scale(1.02);
        }

        .pet-card-emoji {
            font-size: 40px;
        }

        .pet-card-name {
            font-size: 11px;
            color: white;
            font-weight: bold;
        }

        .pet-card-power {
            font-size: 10px;
            color: #ffd700;
        }

        .pet-card-rarity {
            font-size: 9px;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
        }

        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 4px 8px;
            border-radius: 15px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
            width: 100%;
        }

        .sell-btn:hover {
            transform: scale(1.02);
        }

        /* Upgrades Section */
        .upgrades-section {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .upgrade-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .upgrade-card:hover {
            transform: translateY(-2px);
            border-color: #ffd700;
        }

        /* Floating Numbers */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-70px) scale(1.1);
            }
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #2a1a3a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .shake {
            animation: shake 0.2s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
    </style>
</head>

                    { id: "epic", name: "🌟 Яйцо света", price: 6000, icon: "🌟🥚", pets: ["🦁 Святой лев(70)", "🐉 Светлый дракон(75)", "⚜️ Хранитель(68)"] },
                    { id: "legendary", name: "👑 Божественное яйцо", price: 25000, icon: "👑🥚", pets: ["😇 Архангел(150)", "🐉 Райский дракон(160)", "✨ Серафим(145)"] },
                    { id: "mythic", name: "🌌 Космическое яйцо", price: 100000, icon: "🌌🥚", pets: ["🌌 Космический дракон(600)", "⭐ Звездный создатель(650)", "👑 Бог-император(700)"] }
                ]
            }
        };

        class PetSimulator99 {
            constructor() {
                // Resources
                this.coins = 5000;
                this.gems = 100;
                this.clickPower = 1;
                this.totalClicks = 0;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                
                // World
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌳 Лесная чаща", multiplier: 1, unlocked: true, cost: 0, icon: "🌳", theme: "forest" },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 5000, icon: "🔥", theme: "volcano" },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 20000, icon: "❄️", theme: "ice" },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 80000, icon: "⚡", theme: "sky" },
                    { name: "💀 Преисподняя", multiplier: 8, unlocked: false, cost: 250000, icon: "💀", theme: "hell" },
                    { name: "👑 Райский сад", multiplier: 12, unlocked: false, cost: 1000000, icon: "👑", theme: "paradise" }
                ];
                
                // Pets
                this.pets = [];
                this.currentPet = null;
                
                // Upgrades
                this.upgrades = [
                    { id: "click", name: "💪 Усиление клика", desc: "+5 к силе", price: 500, priceType: "coins", effect: () => { this.clickPower += 5; }, level: 0, basePrice: 500 },
                    { id: "auto", name: "🤖 Авто-кликер", desc: "+1 клик/сек", price: 800, priceType: "coins", effect: () => { this.autoClickerLevel++; this.startAutoClicker(); }, level: 0, basePrice: 800 },
                    { id: "multiplier", name: "✨ Множитель монет", desc: "+0.5x к множителю", price: 1500, priceType: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, basePrice: 1500 }
                ];
                
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                
                this.init();
            }
            
            init() {
                this.loadGame();
                this.renderWorlds();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAutoClicker();
                this.setupEventListeners();
                this.startBoostTimer();
                this.updateTheme();
            }
            
            setupEventListeners() {
                document.getElementById('petArea').addEventListener('click', (e) => this.clickPet(e));
                document.getElementById('buyBoostBtn').addEventListener('click', () => this.buyBoost());
                document.getElementById('sellAllBtn').addEventListener('click', () => this.sellAllPets());
            }
            
            clickPet(event) {
                let worldBonus = this.worlds[this.currentWorld].multiplier;
                let boostBonus = this.boostActive ? 2 : 1;
                let earned = Math.floor(this.clickPower * worldBonus * this.multiplier * boostBonus);
                
                this.coins += earned;
                this.totalClicks++;
                
                // Шанс 5% на получение алмазов (1-100)
                if (Math.random() < 0.05) {
                    const diamondsEarned = Math.floor(Math.random() * 100) + 1;
                    this.gems += diamondsEarned;
                    this.showFloatingNumber(`💎 +${diamondsEarned}💎`, event.clientX, event.clientY, '#ff88ff');
                }
                
                this.showFloatingNumber(`+${earned}💰`, event.clientX, event.clientY, '#ffd700');
                
                // Animation
                const petArea = document.getElementById('petArea');
                petArea.classList.add('shake');
                setTimeout(() => petArea.classList.remove('shake'), 200);
                
                this.updateUI();
                this.saveGame();
            }
            
            openEgg(egg) {
                if (this.coins >= egg.price) {
                    this.coins -= egg.price;
                } else {
                    this.showMessage("❌ Недостаточно монет!");
                    return;
                }
                
                // Get random pet from egg
                const randomPetStr = egg.pets[Math.floor(Math.random() * egg.pets.length)];
                const match = randomPetStr.match(/(.+?)\((\d+)\)/);
                const petName = match[1];
                const petPower = parseInt(match[2]);
                let petEmoji = match[1].charAt(0);
                if (match[1].length > 1) petEmoji += match[1].charAt(1);
                
                const newPet = {
                    id: Date.now() + Math.random(),
                    emoji: petEmoji || "🐣",
                    name: petName,
                    power: petPower,
                    rarity: egg.id
                };
                
                this.pets.push(newPet);
                
                // Auto-select first pet if none
                if (!this.currentPet) {
                    this.currentPet = newPet;
                    this.updateClickPower();
                }
                
                this.showMessage(`🎉 Вы получили ${newPet.name}! Сила: ${newPet.power} 🎉`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            selectPet(pet) {
                this.currentPet = pet;
                this.updateClickPower();
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            sellPet(petId) {
                const petIndex = this.pets.findIndex(p => p.id === petId);
                if (petIndex === -1) return;
                const pet = this.pets[petIndex];
                if (this.currentPet && this.currentPet.id === petId) {
                    this.showMessage("❌ Нельзя продать активного питомца!");
                    return;
                }
                const sellValue = Math.floor(pet.power * 10);
                this.coins += sellValue;
                this.pets.splice(petIndex, 1);
                this.showMessage(`💰 Продано: ${pet.name} за ${sellValue} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            sellAllPets() {
                if (this.pets.length <= 1) {
                    this.showMessage("❌ Нет питомцев для продажи или только один активный!");
                    return;
                }
                let totalSell = 0;
                const toSell = this.pets.filter(p => !(this.currentPet && p.id === this.currentPet.id));
                for (const pet of toSell) {
                    totalSell += Math.floor(pet.power * 10);
                }
                this.coins += totalSell;
                this.pets = this.pets.filter(p => this.currentPet && p.id === this.currentPet.id);
                this.showMessage(`💰 Продано ${toSell.length} питомцев! Получено: ${totalSell} монет!`);
                this.renderPets();
                this.updateUI();
                this.saveGame();
            }
            
            updateClickPower() {
                if (this.currentPet) {
                    this.clickPower = 1 + this.currentPet.power;
                } else {
                    this.clickPower = 1;
                }
                this.updateUI();
            }
            
            buyUpgrade(upgrade) {
                let cost = upgrade.price;
                if (upgrade.priceType === "coins" && this.coins >= cost) {
                    this.coins -= cost;
                } else if (upgrade.priceType === "gems" && this.gems >= cost) {
                    this.gems -= cost;
                } else {
                    this.showMessage("Недостаточно ресурсов!");
                    return;
                }
                
                upgrade.effect();
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.basePrice * Math.pow(1.5, upgrade.level));
                
                this.updateUI();
                this.renderUpgrades();
                this.saveGame();
            }
            
            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.showMessage("⚡ Буст активирован на 5 минут! x2 к доходу ⚡");
                    this.renderBoosts();
                    this.saveGame();
                } else {
                    this.showMessage("Нужно 100 алмазов!");
                }
            }
            
            unlockWorld(worldIndex) {
                const world = this.worlds[worldIndex];
                if (!world.unlocked && this.coins >= world.cost) {
                    this.coins -= world.cost;
                    world.unlocked = true;
                    this.showMessage(`🌍 Мир "${world.name}" открыт!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.saveGame();
                } else if (!world.unlocked) {
                    this.showMessage(`Нужно ${world.cost} монет!`);
                }
            }
            
            changeWorld(worldIndex) {
                if (this.worlds[worldIndex].unlocked) {
                    this.currentWorld = worldIndex;
                    this.renderWorlds();
                    this.renderEggs();
                    this.updateTheme();
                    this.updateUI();
                    this.saveGame();
                }
            }
            
            updateTheme() {
                const theme = this.worlds[this.currentWorld].theme;
                const container = document.getElementById('gameContainer');
                container.setAttribute('data-theme', theme);
                
                const themes = {
                    forest: 'linear-gradient(135deg, #0a2a0a 0%, #051005 100%)',
                    volcano: 'linear-gradient(135deg, #4a1a0a 0%, #2a0a05 100%)',
                    ice: 'linear-gradient(135deg, #1a3a5a 0%, #0a1a2a 100%)',
                    sky: 'linear-gradient(135deg, #2a2a5a 0%, #0a0a2a 100%)',
                    hell: 'linear-gradient(135deg, #4a0a2a 0%, #2a050a 100%)',
                    paradise: 'linear-gradient(135deg, #4a2a6a 0%, #2a0a4a 100%)'
                };
                document.body.style.background = themes[theme] || 'linear-gradient(135deg, #1a0f1c 0%, #0a050c 100%)';
            }
            
            startAutoClicker() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        let worldBonus = this.worlds[this.currentWorld].multiplier;
                        let boostBonus = this.boostActive ? 2 : 1;
                        let earned = Math.floor(this.autoClickerLevel * 8 * worldBonus * this.multiplier * boostBonus);
                        this.coins += earned;
                        this.updateUI();
                        this.saveGame();
                    }
                }, 1000);
            }
            
            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.showMessage("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.saveGame();
                    }
                    this.updateUI();
                }, 1000);
            }
            
            showFloatingNumber(text, x, y, color = '#ffd700') {
                const floating = document.createElement('div');
                floating.className = 'floating-number';
                floating.textContent = text;
                floating.style.left = `${x - 30}px`;
                floating.style.top = `${y - 30}px`;
                floating.style.color = color;
                document.body.appendChild(floating);
                setTimeout(() => floating.remove(), 800);
            }
            
            showMessage(text) {
                const msg = document.createElement('div');
                msg.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(0,0,0,0.9);
                    color: #ffd700;
                    padding: 12px 24px;
                    border-radius: 40px;
                    z-index: 1000;
                    animation: fadeOut 2s forwards;
                    font-weight: bold;
                    border: 1px solid #ffd700;
                `;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
            
            renderWorlds() {
                const container = document.getElementById('worldsContainer');
                container.innerHTML = '';
                this.worlds.forEach((world, index) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${index === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `
                        <div style="font-size: 24px;">${world.icon}</div>
                        <div style="font-size: 11px;">${world.name}</div>
                        <div style="font-size: 10px;">x${world.multiplier}</div>
                        ${!world.unlocked ? `<div style="font-size: 10px; color: #ffd700;">💰${world.cost}</div>` : ''}
                    `;
                    btn.onclick = () => {
                        if (world.unlocked) {
                            this.changeWorld(index);
                        } else {
                            this.unlockWorld(index);
                        }
                    };
                    container.appendChild(btn);
                });
            }
            
            renderEggs() {
                const container = document.getElementById('eggsContainer');
                const worldTheme = this.worlds[this.currentWorld].theme;
                const eggsData = WORLD_PETS[worldTheme].eggs;
                
                container.innerHTML = '';
                eggsData.forEach(egg => {
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header">
                            <div class="egg-emoji">${egg.icon}</div>
                            <div class="egg-title">${egg.name}</div>
                        </div>
                        <div class="egg-price">💰 ${egg.price} монет</div>
                        <div class="pet-list">
                            <div style="font-size: 11px; color: #ffd700; margin-bottom: 5px;">📋 Кто может выпасть:</div>
                            ${egg.pets.map(p => `<div class="pet-chance"><span>${p}</span></div>`).join('')}
                        </div>
                    `;
                    card.onclick = () => this.openEgg(egg);
                    container.appendChild(card);
                });
                
                document.getElementById('eggsTitle').innerHTML = `🥚 ${this.worlds[this.currentWorld].name} ЯЙЦА 🥚`;
            }
            
            renderPets() {
                const container = document.getElementById('petsContainer');
                container.innerHTML = '';
                const sortedPets = [...this.pets].sort((a,b) => b.power - a.power);
                sortedPets.forEach(pet => {
                    const card = document.createElement('div');
                    card.className = `pet-card ${this.currentPet && this.currentPet.id === pet.id ? 'active-pet' : ''}`;
                    const rarityColors = {
                        common: '#95a5a6',
                        rare: '#3498db',
                        epic: '#9b59b6',
                        legendary: '#f39c12',
                        mythic: '#e91e63'
                    };
                    card.innerHTML = `
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡${pet.power}</div>
                        <div class="pet-card-rarity" style="background: ${rarityColors[pet.rarity] || '#95a5a6'}">${pet.rarity.toUpperCase()}</div>
                        <button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 Продать за ${Math.floor(pet.power * 10)}💰</button>
                    `;
                    card.onclick = (e) => {
                        if (e.target !== card.querySelector('.sell-btn')) {
                            this.selectPet(pet);
                        }
                    };
                    container.appendChild(card);
                });
                
                document.getElementById('totalPets').textContent = this.pets.length;
                const totalPower = this.pets.reduce((sum, p) => sum + p.power, 0);
                document.getElementById('totalPower').textContent = totalPower;
                const totalSell = this.pets.reduce((sum, p) => sum + Math.floor(p.power * 10), 0);
                document.getElementById('totalSellValue').textContent = totalSell;
            }
            
            renderUpgrades() {
                const container = document.getElementById('upgradesContainer');
                container.innerHTML = '';
                this.upgrades.forEach(upgrade => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `
                        <div class="upgrade-name">${upgrade.name}</div>
                        <div class="upgrade-desc">${upgrade.desc}</div>
                        <div class="upgrade-price">${upgrade.priceType === 'coins' ? '💰' : '💎'} ${upgrade.price}</div>
                        <div style="font-size: 12px;">Уровень: ${upgrade.level}</div>
                    `;
                    card.onclick = () => this.buyUpgrade(upgrade);
                    container.appendChild(card);
                });
            }
            
            renderBoosts() {
                const container = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const remaining = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;
                    container.innerHTML = `
                        <div class="boost-timer">
                            <div style="color: #ffd700;">⚡ Активен x2 ⚡</div>
                            <div>Осталось: ${minutes}:${seconds.toString().padStart(2, '0')}</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="boost-timer">
                            <div style="color: #ffaa00;">Нет активных бустов</div>
                            <div style="font-size: 12px;">Купи буст за 100💎</div>
                        </div>
                    `;
                }
            }
            
            updateUI() {
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('gems').textContent = Math.floor(this.gems);
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
                
                if (this.currentPet) {
                    document.getElementById('currentPetEmoji').textContent = this.currentPet.emoji;
                    document.getElementById('currentPetName').textContent = this.currentPet.name;
                    document.getElementById('currentPetPower').textContent = `Сила: ${this.currentPet.power}`;
                }
                
                this.renderBoosts();
            }
            
            saveGame() {
                const save = {
                    coins: this.coins,
                    gems: this.gems,
                    clickPower: this.clickPower,
                    totalClicks: this.totalClicks,
                    multiplier: this.multiplier,
                    currentWorld: this.currentWorld,
                    worlds: this.worlds,
                    pets: this.pets,
                    currentPet: this.currentPet,
                    upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price })),
                    autoClickerLevel: this.autoClickerLevel,
                    boostActive: this.boostActive,
                    boostEndTime: this.boostEndTime
                };
                localStorage.setItem('petSimulator99Full', JSON.stringify(save));
            }
            
            loadGame() {
                const save = localStorage.getItem('petSimulator99Full');
                if (save) {
                    const data = JSON.parse(save);
                    this.coins = data.coins;
                    this.gems = data.gems;
                    this.clickPower = data.clickPower;
                    this.totalClicks = data.totalClicks;
                    this.multiplier = data.multiplier;
                    this.currentWorld = data.currentWorld;
                    this.worlds = data.worlds;
                    this.pets = data.pets;
                    this.currentPet = data.currentPet;
                    this.autoClickerLevel = data.autoClickerLevel;
                    this.boostActive = data.boostActive;
                    this.boostEndTime = data.boostEndTime;
                    
                    if (data.upgrades) {
                        this.upgrades.forEach((upgrade, index) => {
                            if (data.upgrades[index]) {
                                upgrade.level = data.upgrades[index].level;
                                upgrade.price = data.upgrades[index].price;
                            }
                        });
                    }
                }
            }
        }
        
        // Add fadeOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                70% { opacity: 1; }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
        
        // Start game
        const game = new PetSimulator99();
        window.game = game;
    </script>
</body>
