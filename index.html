<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Management · вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a; /* темный фон вокруг */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            background: #000000; /* черный фон контейнера */
            border: 2px solid #8b0000; /* темно-красная рамка */
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.3);
        }

        /* верх: BR Management / СИСТЕМА УПРАВЛЕНИЯ */
        .main-title {
            background-color: #8b0000; /* темно-красный */
            color: white;
            padding: 16px 24px;
            border-bottom: 2px solid #4a0000;
        }

        .main-title h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            color: #ffffff;
        }

        .main-title .subtitle {
            font-size: 13px;
            color: #ffcccc; /* светло-красный для контраста */
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* основная часть */
        .content {
            padding: 30px 24px 24px 24px;
            background: #000000; /* черный */
        }

        /* приветствие */
        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 15px;
            color: #cccccc; /* светло-серый */
            margin-bottom: 30px;
        }

        /* форма */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #ff9999; /* красноватый */
            margin-bottom: 8px;
        }

        .input-field, .select-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #8b0000;
            border-radius: 0;
            background: #1a1a1a; /* темно-серый, почти черный */
            color: #ffffff;
            font-family: inherit;
            transition: 0.2s;
        }

        .input-field:focus, .select-field:focus {
            outline: none;
            border-color: #ff3333; /* ярко-красный при фокусе */
            background: #000000;
        }

        .input-field::placeholder {
            color: #666666;
            font-size: 14px;
        }

        /* дропдаун */
        .select-field {
            appearance: auto;
            -webkit-appearance: menulist;
            background: #1a1a1a;
            color: #ffffff;
        }

        .select-field option {
            background: #1a1a1a;
            color: #ffffff;
        }

        /* кнопка входа */
        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: #8b0000; /* темно-красный */
            border: 2px solid #4a0000;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            margin: 30px 0 35px 0;
            border-radius: 0;
            transition: 0.15s;
        }

        .login-btn:hover {
            background: #a52a2a; /* более яркий красный при наведении */
            border-color: #8b0000;
        }

        /* раздел BR SYSTEM */
        .system-block {
            border-top: 2px solid #8b0000; /* красная линия */
            padding-top: 25px;
            margin-top: 5px;
        }

        .system-title {
            font-size: 20px;
            font-weight: 700;
            color: #ff9999; /* красноватый */
            margin-bottom: 15px;
            letter-spacing: 0.3px;
        }

        .system-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .system-list li {
            font-size: 16px;
            padding: 10px 0 10px 28px;
            position: relative;
            border-bottom: 1px solid #330000; /* темно-красная линия */
            color: #ffffff;
        }

        .system-list li:before {
            content: "•";
            position: absolute;
            left: 8px;
            color: #8b0000; /* красные точки */
            font-size: 20px;
            top: 7px;
        }

        /* нижняя строка */
        .footer-note {
            margin-top: 25px;
            font-size: 14px;
            color: #ff9999; /* красноватый текст */
            padding: 15px 0 0 0;
            border-top: 1px dashed #8b0000;
        }

        .placeholder-text {
            color: #666666;
        }

        select.select-field option:first-child {
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- верх: BR Management / СИСТЕМА УПРАВЛЕНИЯ (красное на черном) -->
        <div class="main-title">
            <h1>BR Management</h1>
            <div class="subtitle">СИСТЕМА УПРАВЛЕНИЯ</div>
        </div>

        <div class="content">
            <!-- приветствие -->
            <div class="welcome">
                <h2>Добро пожаловать</h2>
                <p>Войдите в свой аккаунт для продолжения</p>
            </div>

            <!-- форма входа -->
            <div class="form-group">
                <label>TELEGRAM ID</label>
                <input type="text" class="input-field" placeholder="Ваш Telegram ID..." value="">
            </div>

            <div class="form-group">
                <label>ПАРОЛЬ</label>
                <select class="select-field">
                    <option value="" disabled selected>Введите пароль...</option>
                    <option value="option1">••••••••</option>
                    <option value="option2">(введите пароль)</option>
                </select>
            </div>

            <!-- кнопка Войти (красная) -->
            <button class="login-btn">Войти</button>

            <!-- BR SYSTEM и три пункта -->
            <div class="system-block">
                <div class="system-title">BR SYSTEM</div>
                <ul class="system-list">
                    <li>Управление составом</li>
                    <li>Подача заявлений</li>
                    <li>Статистика и отчёты</li>
                </ul>
            </div>

            <!-- футер -->
            <div class="footer-note">
                Нет доступа? Обратитесь к вашему куратору.
            </div>
        </div>
    </div>
</body>
</html>
