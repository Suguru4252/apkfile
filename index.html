<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pet Simulator 99 | МАКСИМАЛЬНО БЫСТРЫЕ КЛИКИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #0a0f2a 0%, #050510 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 15px;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Stars Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(3px 3px at 60px 80px, #ffd700, rgba(0,0,0,0));
            background-size: 400px 400px;
            background-repeat: repeat;
            animation: starsMove 60s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes starsMove {
            0% { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        /* Main Container */
        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(15, 20, 45, 0.85), rgba(8, 12, 30, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(100, 150, 255, 0.4);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* World Themes */
        .game-container[data-theme="forest"] { background: linear-gradient(135deg, rgba(20, 40, 20, 0.9), rgba(10, 25, 10, 0.95)); border-color: #4caf50; }
        .game-container[data-theme="volcano"] { background: linear-gradient(135deg, rgba(60, 25, 15, 0.9), rgba(40, 15, 10, 0.95)); border-color: #ff5722; }
        .game-container[data-theme="ice"] { background: linear-gradient(135deg, rgba(25, 45, 65, 0.9), rgba(15, 30, 45, 0.95)); border-color: #00bcd4; }
        .game-container[data-theme="sky"] { background: linear-gradient(135deg, rgba(30, 40, 70, 0.9), rgba(20, 25, 55, 0.95)); border-color: #ffd700; }
        .game-container[data-theme="hell"] { background: linear-gradient(135deg, rgba(50, 15, 25, 0.9), rgba(35, 10, 20, 0.95)); border-color: #ff3366; }
        .game-container[data-theme="paradise"] { background: linear-gradient(135deg, rgba(70, 40, 90, 0.9), rgba(50, 25, 70, 0.95)); border-color: #ff88ff; }

        /* Resources Bar */
        .resources-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .resource-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            transition: 0.1s;
        }

        .resource-icon { font-size: 40px; }
        .resource-info { flex: 1; }
        .resource-name { color: rgba(255,255,255,0.7); font-size: 11px; text-transform: uppercase; }
        .resource-value { color: #ffd700; font-size: 28px; font-weight: bold; }

        /* Game Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1000px) { .game-layout { grid-template-columns: 1fr; } }

        /* Pet Area - МАКСИМАЛЬНО БЫСТРЫЙ КЛИК */
        .pet-area {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,100,0,0.05));
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.5);
            backdrop-filter: blur(10px);
            will-change: transform;
        }

        .pet-area:active {
            transform: scale(0.99);
        }

        .current-pet {
            font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .pet-name {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff88ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 15px;
            pointer-events: none;
        }

        .pet-power { color: #ffd700; font-size: 18px; margin-top: 8px; pointer-events: none; }

        /* World Selector */
        .world-selector, .boost-section, .eggs-section, .pets-collection, .upgrades-section {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .world-buttons, .eggs-grid, .upgrades-grid {
            display: grid;
            gap: 10px;
        }

        .world-buttons { grid-template-columns: repeat(2, 1fr); margin-top: 12px; }
        .eggs-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .upgrades-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-top: 15px; }

        .world-btn, .egg-card, .upgrade-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
        }

        .world-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            transform: scale(1.02);
        }

        .egg-card { padding: 15px; }
        .egg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .egg-emoji { font-size: 40px; }
        .egg-title { font-size: 18px; font-weight: bold; color: #ffd700; }
        .egg-price { display: inline-block; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; margin: 5px 0; font-size: 14px; }
        .pet-list { margin-top: 10px; border-top: 1px solid rgba(255,215,0,0.3); padding-top: 10px; max-height: 180px; overflow-y: auto; }
        .pet-chance { font-size: 11px; padding: 3px 0; display: flex; justify-content: space-between; }

        /* Pets Collection */
        .pets-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .pet-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .pet-card.active-pet {
            border: 2px solid #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.2));
        }

        .pet-card-emoji { font-size: 48px; }
        .pet-card-name { font-size: 12px; color: white; font-weight: bold; }
        .pet-card-power { font-size: 11px; color: #ffd700; }
        .pet-card-rarity { font-size: 10px; margin-top: 5px; padding: 2px 6px; border-radius: 10px; display: inline-block; }

        .sell-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #1a0f24;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .boost-timer {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 10px;
        }

        /* МАКСИМАЛЬНО БЫСТРЫЕ АНИМАЦИИ */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            animation: floatFast 0.4s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 5px black;
        }

        @keyframes floatFast {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-40px) scale(1); }
        }

        .click-ripple {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
            animation: ripple 0.2s ease-out forwards;
            z-index: 999;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

        class PetSimulator {
            constructor() {
                this.coins = 5000;
                this.gems = 100;
                this.clickPower = 1;
                this.multiplier = 1;
                this.boostActive = false;
                this.boostEndTime = 0;
                this.currentWorld = 0;
                this.worlds = [
                    { name: "🌿 Лес", multiplier: 1, unlocked: true, cost: 0, icon: "🌿", theme: "forest" },
                    { name: "🔥 Вулкан", multiplier: 2, unlocked: false, cost: 5000, icon: "🔥", theme: "volcano" },
                    { name: "❄️ Ледник", multiplier: 3, unlocked: false, cost: 20000, icon: "❄️", theme: "ice" },
                    { name: "⚡ Небеса", multiplier: 5, unlocked: false, cost: 80000, icon: "⚡", theme: "sky" },
                    { name: "💀 Ад", multiplier: 8, unlocked: false, cost: 250000, icon: "💀", theme: "hell" },
                    { name: "👑 Рай", multiplier: 12, unlocked: false, cost: 1000000, icon: "👑", theme: "paradise" }
                ];
                this.pets = [];
                this.currentPet = null;
                this.autoClickerLevel = 0;
                this.autoInterval = null;
                this.upgrades = [
                    { id: "click", name: "💪 Усиление", desc: "+5 силы", price: 500, type: "coins", effect: () => { this.clickPower += 5; }, level: 0, base: 500 },
                    { id: "auto", name: "🤖 Авто-клик", desc: "+1/сек", price: 800, type: "coins", effect: () => { this.autoClickerLevel++; this.startAuto(); }, level: 0, base: 800 },
                    { id: "multiplier", name: "✨ Множитель", desc: "+0.5x", price: 1500, type: "gems", effect: () => { this.multiplier += 0.5; }, level: 0, base: 1500 }
                ];
                this.init();
            }

            init() {
                this.load();
                this.renderWorlds();
                this.renderEggs();
                this.renderPets();
                this.renderUpgrades();
                this.renderBoosts();
                this.updateUI();
                this.startAuto();
                this.startBoostTimer();
                this.setupEvents();
                this.updateTheme();
            }

            setupEvents() {
                const petArea = document.getElementById('petArea');
                petArea.addEventListener('click', (e) => this.click(e));
                document.getElementById('buyBoostBtn').onclick = () => this.buyBoost();
                document.getElementById('sellAllBtn').onclick = () => this.sellAll();
            }

            click(e) {
                const worldBonus = this.worlds[this.currentWorld].multiplier;
                const boostBonus = this.boostActive ? 2 : 1;
                const earned = Math.floor(this.clickPower * worldBonus * this.multiplier * boostBonus);
                this.coins += earned;
                
                if (Math.random() < 0.05) {
                    const diamonds = Math.floor(Math.random() * 100) + 1;
                    this.gems += diamonds;
                    this.showFloat(`💎 +${diamonds}`, e.clientX, e.clientY, '#ff88ff');
                }
                
                this.showFloat(`+${earned}💰`, e.clientX, e.clientY, '#ffd700');
                this.showRipple(e.clientX, e.clientY);
                this.updateUI();
                this.save();
            }

            showFloat(text, x, y, color) {
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.textContent = text;
                div.style.left = `${x - 25}px`;
                div.style.top = `${y - 30}px`;
                div.style.color = color;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 400);
            }

            showRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'click-ripple';
                ripple.style.left = `${x - 15}px`;
                ripple.style.top = `${y - 15}px`;
                ripple.style.width = '30px';
                ripple.style.height = '30px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 200);
            }

            getRandomPet(egg) {
                const petStr = egg.pets[Math.floor(Math.random() * egg.pets.length)];
                const match = petStr.match(/(.+?)\((\d+)\)/);
                return { emoji: match[1].charAt(0) + (match[1].charAt(1) || ""), name: match[1], power: parseInt(match[2]), rarity: egg.id };
            }

            openEgg(egg) {
                if (this.coins >= egg.price) {
                    this.coins -= egg.price;
                } else {
                    this.msg("❌ Нет монет!");
                    return;
                }
                const pet = this.getRandomPet(egg);
                const newPet = { ...pet, id: Date.now() + Math.random() };
                this.pets.push(newPet);
                if (!this.currentPet) this.selectPet(newPet);
                else this.updateClickPower();
                this.msg(`🎉 +${newPet.name}! Сила: ${newPet.power}`);
                this.renderPets();
                this.updateUI();
                this.save();
            }

            selectPet(pet) {
                this.currentPet = pet;
                this.updateClickPower();
                this.renderPets();
                this.save();
            }

            sellPet(id) {
                const index = this.pets.findIndex(p => p.id === id);
                if (index === -1) return;
                const pet = this.pets[index];
                if (this.currentPet?.id === id) { this.msg("❌ Нельзя продать активного!"); return; }
                this.coins += Math.floor(pet.power * 10);
                this.pets.splice(index, 1);
                this.msg(`💰 Продал ${pet.name} за ${Math.floor(pet.power * 10)}💰`);
                this.renderPets();
                this.updateUI();
                this.save();
            }

            sellAll() {
                if (this.pets.length <= 1) { this.msg("❌ Некого продавать!"); return; }
                let total = 0;
                const toSell = this.pets.filter(p => this.currentPet?.id !== p.id);
                toSell.forEach(p => total += Math.floor(p.power * 10));
                this.coins += total;
                this.pets = this.pets.filter(p => this.currentPet?.id === p.id);
                this.msg(`💰 Продано ${toSell.length} питомцев за ${total}💰`);
                this.renderPets();
                this.updateUI();
                this.save();
            }

            updateClickPower() {
                this.clickPower = this.currentPet ? 5 + this.currentPet.power : 1;
                this.updateUI();
            }

            buyUpgrade(up) {
                if ((up.type === "coins" && this.coins >= up.price) || (up.type === "gems" && this.gems >= up.price)) {
                    if (up.type === "coins") this.coins -= up.price;
                    else this.gems -= up.price;
                    up.effect();
                    up.level++;
                    up.price = Math.floor(up.base * Math.pow(1.5, up.level));
                    this.renderUpgrades();
                    this.updateUI();
                    this.save();
                } else this.msg("❌ Недостаточно!");
            }

            buyBoost() {
                if (this.gems >= 100) {
                    this.gems -= 100;
                    this.boostActive = true;
                    this.boostEndTime = Date.now() + 300000;
                    this.msg("⚡ Буст x2 на 5 минут!");
                    this.renderBoosts();
                    this.save();
                } else this.msg("❌ Нужно 100 алмазов!");
            }

            unlockWorld(i) {
                const w = this.worlds[i];
                if (!w.unlocked && this.coins >= w.cost) {
                    this.coins -= w.cost;
                    w.unlocked = true;
                    this.msg(`🌍 Открыт мир: ${w.name}!`);
                    this.renderWorlds();
                    this.updateUI();
                    this.save();
                } else if (!w.unlocked) this.msg(`❌ Нужно ${w.cost} монет!`);
            }

            changeWorld(i) {
                if (this.worlds[i].unlocked) {
                    this.currentWorld = i;
                    this.renderWorlds();
                    this.renderEggs();
                    this.updateTheme();
                    this.save();
                }
            }

            updateTheme() {
                const theme = this.worlds[this.currentWorld].theme;
                document.getElementById('gameContainer').setAttribute('data-theme', theme);
                const themes = { forest: '#0a2a0a', volcano: '#4a1a0a', ice: '#1a3a5a', sky: '#2a2a5a', hell: '#4a0a2a', paradise: '#4a2a6a' };
                document.body.style.background = `radial-gradient(ellipse at top, ${themes[theme]} 0%, #050510 100%)`;
            }

            renderWorlds() {
                const cont = document.getElementById('worldsContainer');
                cont.innerHTML = '';
                this.worlds.forEach((w, i) => {
                    const btn = document.createElement('div');
                    btn.className = `world-btn ${i === this.currentWorld ? 'active' : ''}`;
                    btn.innerHTML = `<div style="font-size:24px;">${w.icon}</div><div>${w.name}</div><div>x${w.multiplier}</div>${!w.unlocked ? `<div>💰${w.cost}</div>` : ''}`;
                    btn.onclick = () => w.unlocked ? this.changeWorld(i) : this.unlockWorld(i);
                    cont.appendChild(btn);
                });
            }

            renderEggs() {
                const cont = document.getElementById('eggsContainer');
                const eggs = WORLD_EGGS[this.worlds[this.currentWorld].theme].eggs;
                cont.innerHTML = '';
                eggs.forEach(egg => {
                    const card = document.createElement('div');
                    card.className = 'egg-card';
                    card.innerHTML = `
                        <div class="egg-header"><div class="egg-emoji">${egg.icon}</div><div class="egg-title">${egg.name}</div></div>
                        <div class="egg-price">💰 ${egg.price}</div>
                        <div class="pet-list">${egg.pets.map(p => `<div class="pet-chance"><span>${p}</span></div>`).join('')}</div>
                    `;
                    card.onclick = () => this.openEgg(egg);
                    cont.appendChild(card);
                });
                document.getElementById('eggsSection').querySelector('.section-title').innerHTML = `🥚 ${this.worlds[this.currentWorld].name} ЯЙЦА`;
            }

            renderPets() {
                const cont = document.getElementById('petsContainer');
                cont.innerHTML = '';
                [...this.pets].sort((a,b) => b.power - a.power).forEach(pet => {
                    const card = document.createElement('div');
                    card.className = `pet-card ${this.currentPet?.id === pet.id ? 'active-pet' : ''}`;
                    card.innerHTML = `
                        <div class="pet-card-emoji">${pet.emoji}</div>
                        <div class="pet-card-name">${pet.name}</div>
                        <div class="pet-card-power">⚡${pet.power}</div>
                        <div class="pet-card-rarity" style="background:${pet.rarity === 'mythic' ? '#e91e63' : pet.rarity === 'legendary' ? '#f39c12' : pet.rarity === 'epic' ? '#9b59b6' : pet.rarity === 'rare' ? '#3498db' : '#95a5a6'}">${pet.rarity}</div>
                        <button class="sell-btn" onclick="game.sellPet(${pet.id})">💰 ${Math.floor(pet.power * 10)}💰</button>
                    `;
                    card.onclick = (e) => { if(e.target !== card.querySelector('.sell-btn')) this.selectPet(pet); };
                    cont.appendChild(card);
                });
                document.getElementById('totalPets').textContent = this.pets.length;
                document.getElementById('totalPower').textContent = this.pets.reduce((s,p) => s + p.power, 0);
                document.getElementById('totalSellValue').textContent = this.pets.reduce((s,p) => s + Math.floor(p.power * 10), 0);
            }

            renderUpgrades() {
                const cont = document.getElementById('upgradesContainer');
                cont.innerHTML = '';
                this.upgrades.forEach(up => {
                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<div class="upgrade-name">${up.name}</div><div>${up.desc}</div><div>${up.type === 'coins' ? '💰' : '💎'} ${up.price}</div><div>Ур.${up.level}</div>`;
                    card.onclick = () => this.buyUpgrade(up);
                    cont.appendChild(card);
                });
            }

            renderBoosts() {
                const cont = document.getElementById('boostsContainer');
                if (this.boostActive) {
                    const rem = Math.max(0, Math.ceil((this.boostEndTime - Date.now()) / 1000));
                    cont.innerHTML = `<div class="boost-timer"><div style="color:#ffd700;">⚡ АКТИВЕН x2</div><div>${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}</div></div>`;
                } else cont.innerHTML = `<div class="boost-timer"><div>💤 Нет бустов</div><div>Купи за 100💎</div></div>`;
            }

            updateUI() {
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('gems').textContent = Math.floor(this.gems);
                document.getElementById('clickPower').textContent = this.clickPower;
                document.getElementById('multiplier').textContent = `${this.multiplier}x`;
                if (this.currentPet) {
                    document.getElementById('currentPetEmoji').textContent = this.currentPet.emoji;
                    document.getElementById('currentPetName').textContent = this.currentPet.name;
                    document.getElementById('currentPetPower').textContent = `⭐ Сила: ${this.currentPet.power} ⭐`;
                }
            }

            msg(text) {
                const m = document.createElement('div');
                m.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#000c;color:#ffd700;padding:10px 20px;border-radius:40px;z-index:1000;animation:fadeOut 1.5s forwards;border:1px solid #ffd700;`;
                m.textContent = text;
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 1500);
            }

            startAuto() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickerLevel > 0) {
                        const earned = Math.floor(this.autoClickerLevel * 8 * this.worlds[this.currentWorld].multiplier * this.multiplier * (this.boostActive ? 2 : 1));
                        this.coins += earned;
                        this.updateUI();
                        this.save();
                    }
                }, 1000);
            }

            startBoostTimer() {
                setInterval(() => {
                    if (this.boostActive && Date.now() > this.boostEndTime) {
                        this.boostActive = false;
                        this.msg("⏰ Буст закончился!");
                        this.renderBoosts();
                        this.save();
                    }
                }, 1000);
            }

            save() {
                localStorage.setItem('petFast', JSON.stringify({
                    coins: this.coins, gems: this.gems, clickPower: this.clickPower,
                    multiplier: this.multiplier, currentWorld: this.currentWorld, worlds: this.worlds,
                    pets: this.pets, currentPet: this.currentPet, autoClickerLevel: this.autoClickerLevel,
                    boostActive: this.boostActive, boostEndTime: this.boostEndTime,
                    upgrades: this.upgrades.map(u => ({ level: u.level, price: u.price }))
                }));
            }

            load() {
                const s = localStorage.getItem('petFast');
                if (s) {
                    const d = JSON.parse(s);
                    this.coins = d.coins; this.gems = d.gems; this.clickPower = d.clickPower;
                    this.multiplier = d.multiplier; this.currentWorld = d.currentWorld; this.worlds = d.worlds;
                    this.pets = d.pets; this.currentPet = d.currentPet; this.autoClickerLevel = d.autoClickerLevel;
                    this.boostActive = d.boostActive; this.boostEndTime = d.boostEndTime;
                    if (d.upgrades) this.upgrades.forEach((u, i) => { if (d.upgrades[i]) { u.level = d.upgrades[i].level; u.price = d.upgrades[i].price; } });
                }
            }
        }

        const game = new PetSimulator();
        window.game = game;
    </script>
</body>
</html>
